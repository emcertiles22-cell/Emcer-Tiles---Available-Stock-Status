<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Emcer Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --matrix-gold: #dfb76c;
            --jet-black: #050608;
            --panel-dark: #0d0f12;
            --border-glow: #161a22;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--jet-black); 
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .main-container { max-width: 1400px; margin: auto; padding: 16px; }
        @media(min-width: 768px) { .main-container { padding: 30px; } }
        
        .matrix-panel {
            background-color: var(--panel-dark);
            border: 1px solid #1e2530;
            border-radius: 0px !important;
        }

        /* --- FORMAT 1: Row Specifications --- */
        .stock-card { 
            background: #090b0d;
            border: 2px solid var(--matrix-gold); 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 24px; 
            position: relative; 
            border-radius: 0px !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: all 0.25s ease-in-out;
        }
        @media(min-width: 768px) {
            .stock-card { flex-direction: row; min-height: 240px; }
        }
        .stock-card:hover {
            box-shadow: 0 12px 35px rgba(223, 183, 108, 0.15);
            background: #0c0e12;
        }

        .variant-badge { 
            position: absolute; top: 0; right: 0; 
            background: var(--matrix-gold); color: #000; 
            padding: 5px 16px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; z-index: 10; 
            letter-spacing: 0.05em;
        }
        @media(min-width: 768px) { .variant-badge { right: 20%; } }
        .variant-badge-grid { right: 0 !important; }
        
        .brand-tag { 
            font-size: 10px; background: rgba(59, 130, 246, 0.1); 
            color: #3b82f6; padding: 3px 10px; 
            font-weight: 800; display: inline-block; margin-bottom: 8px; 
            text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .card-img-frame { 
            width: 100%; 
            border-bottom: 1px solid #161a22;
            padding: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #020304;
            cursor: pointer;
        }
        @media(min-width: 768px) {
            .card-img-frame { width: 30%; border-bottom: none; border-right: 1px solid #161a22; padding: 14px; }
        }
        .card-img-frame img { 
            height: 180px;
            width: 135px;
            object-fit: cover; 
            display: block; 
            border: 1px solid #222b35;
        }

        .card-info { width: 100%; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        @media(min-width: 768px) { .card-info { width: 50%; padding: 24px; } }
        
        .design-name { font-size: 22px; font-weight: 800; text-transform: uppercase; line-height: 1.2; color: #fff; letter-spacing: -0.01em; }
        .design-meta { color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 3px; margin-bottom: 12px; }
        
        .lot-row { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px solid #161a22; 
            padding: 8px 0; font-size: 13px; font-weight: 600; color: #cbd5e1;
        }
        
        .card-total { 
            width: 100%; 
            border-top: 1px solid #161a22; 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            padding: 16px 20px;
            background: #040507; 
        }
        @media(min-width: 768px) {
            .card-total { width: 20%; border-top: none; border-left: 1px solid #161a22; flex-direction: column; justify-content: center; padding: 0; }
        }
        .total-val { font-size: 40px; font-weight: 900; line-height: 1; color: var(--matrix-gold); text-shadow: 0 0 15px rgba(223, 183, 108, 0.3); }
        
        .filter-grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 16px;
            margin-bottom: 24px;
            align-items: end;
        }
        @media(min-width: 768px) {
            .filter-grid-layout { grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; padding: 20px; }
        }
        
        .filter-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 6px; letter-spacing: 0.05em; }
        
        select, input { 
            background: #020304 !important; 
            color: #fff !important; 
            border: 1px solid #222b35 !important; 
            border-radius: 0px !important;
            padding: 12px; font-weight: 600; font-size: 13px; outline: none; 
            text-transform: uppercase;
            width: 100%;
        }
        select:focus, input:focus { border-color: var(--matrix-gold); }
        
        .btn-ui {
            border-radius: 0px !important;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }
        @media(min-width: 768px) { .btn-ui { width: auto; } }

        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
    </style>
</head>
<body>

<div id="imageModal" onclick="this.style.display='none'">
    <img id="modalImg" class="max-w-full max-h-[90vh] border border-neutral-700" src="">
</div>

<div class="main-container">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center pt-2 pb-6 gap-4">
        <div>
            <h1 class="text-xl md:text-2xl font-black text-white tracking-tight leading-none">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-[11px] text-blue-400 font-extrabold uppercase tracking-[0.2em] mt-1.5">Inventory Portal</p>
            <p id="lastUpdated" class="text-[10px] text-amber-500 font-medium uppercase mt-1">Establishing Direct Live Node Link...</p>
        </div>
        <div class="flex flex-col lg:flex-row items-stretch lg:items-center no-print gap-3 w-full lg:w-auto justify-between lg:justify-end">
            <!-- Format Segment Buttons -->
            <div class="flex border border-slate-800 bg-[#0a0d14] p-1 gap-1">
                <button onclick="changeLayout('format1')" id="btnFormat1" class="px-3 py-1.5 text-[10px] font-black uppercase transition-all bg-amber-500 text-black">Format 1: Row Spec</button>
                <button onclick="changeLayout('format2')" id="btnFormat2" class="px-3 py-1.5 text-[10px] font-black uppercase transition-all text-slate-400 hover:text-white">Format 2: Grid Card</button>
                <button onclick="changeLayout('format3')" id="btnFormat3" class="px-3 py-1.5 text-[10px] font-black uppercase transition-all text-slate-400 hover:text-white">Format 3: Matrix Table</button>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadPDF(this)" class="btn-ui bg-red-700 hover:bg-red-600 text-white px-5 py-2.5 text-[11px] font-bold uppercase">📄 Download PDF</button>
                <button onclick="location.reload()" class="btn-ui bg-neutral-800 hover:bg-neutral-700 text-white px-5 py-2.5 text-[11px] font-bold uppercase border border-neutral-700">🔄 Refresh</button>
            </div>
            <div class="border border-amber-500/40 px-4 py-2 text-amber-500 font-black text-[11px] uppercase tracking-wider bg-amber-500/5 text-center">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </div>

    <!-- Analytics Matrix Counters -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 no-print">
        <div class="matrix-panel p-4 text-center"><div class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Total Designs</div><div id="statDesigns" class="text-xl md:text-2xl font-black mt-1 text-white">0</div></div>
        <div class="matrix-panel p-4 text-center"><div class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Total Boxes</div><div id="statBoxes" class="text-xl md:text-2xl font-black mt-1 text-emerald-400">0</div></div>
        <div class="matrix-panel p-4 text-center"><div class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Active Brands</div><div id="statBrands" class="text-xl md:text-2xl font-black mt-1 text-white">0</div></div>
        <div class="matrix-panel p-4 text-center" style="border-color: rgba(223, 183, 108, 0.3);"><div class="text-amber-500 text-[10px] uppercase font-bold tracking-wider">Filtered View</div><div id="statFiltered" class="text-xl md:text-2xl font-black mt-1 text-amber-500">0</div></div>
    </div>

    <!-- Live Filters Layer -->
    <div class="matrix-panel filter-grid-layout no-print">
        <div class="filter-group"><label>Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type material name..."></div>
        <div class="filter-group"><label>Brand</label><select id="filterBrand" onchange="applyFilters()"></select></div>
        <div class="filter-group"><label>Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"></select></div>
        <div class="filter-group"><label>Series</label><select id="filterSeries" onchange="applyFilters()"></select></div>
        <div class="filter-group"><label>Variant</label><select id="filterVariant" onchange="applyFilters()"></select></div>
        <button onclick="resetFilters()" class="btn-ui bg-neutral-800 hover:bg-neutral-700 text-slate-300 p-3 border border-neutral-700" title="Reset Filters">
            <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
    </div>

    <!-- Active Cluster Injection Root -->
    <div id="reportList">
        <div class="text-center py-24 opacity-40 font-bold tracking-widest text-xs uppercase text-slate-500 animate-pulse">Syncing Active Matrix Database Cluster...</div>
    </div>
</div>

<script>
    let masterData = [];
    let currentLayout = 'format1';
    let globalFilteredItems = [];
    const fallbackImg = 'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=400&auto=format&fit=crop';

    // Direct initialization utilizing secure google script runner environment
    function initPortal() {
        google.script.run
            .withSuccessHandler(function(data) {
                if(data && data.length > 0) {
                    masterData = data;
                    document.getElementById('lastUpdated').innerText = "LIVE DATA LINK SUCCESS: " + new Date().toLocaleString();
                    setupFilters();
                    applyFilters();
                } else {
                    document.getElementById('reportList').innerHTML = `<div class='text-center text-amber-500 font-bold py-12'>Empty Cluster. Matrix Sheet contains zero stock objects.</div>`;
                }
            })
            .withFailureHandler(function(err) {
                console.error(err);
                document.getElementById('reportList').innerHTML = `<div class='text-center text-red-500 font-bold py-12'>Sync Interrupted. Connection Timed Out.</div>`;
            })
            .fetchLiveStockData();
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), variants = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); if(i.Variant) variants.add(i.Variant); });
        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">All</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('filterBrand', brands); fill('filterSize', sizes); fill('filterVariant', variants);
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const sz = document.getElementById('filterSize').value, srs = new Set();
        masterData.forEach(i => { if(sz==="" || i.Size===sz) if(i.Series) srs.add(i.Series); });
        document.getElementById('filterSeries').innerHTML = '<option value="">All</option>' + [...srs].sort().map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function resetFilters() {
        document.getElementById('searchName').value = '';
        document.getElementById('filterBrand').value = '';
        document.getElementById('filterSize').value = '';
        document.getElementById('filterVariant').value = '';
        updateSeriesOptions();
        applyFilters();
    }

    function changeLayout(layoutId) {
        currentLayout = layoutId;
        ['format1', 'format2', 'format3'].forEach(f => {
            const btn = document.getElementById('btn' + f.charAt(0).toUpperCase() + f.slice(1));
            if(f === layoutId) {
                btn.className = "px-3 py-1.5 text-[10px] font-black uppercase transition-all bg-amber-500 text-black";
            } else {
                btn.className = "px-3 py-1.5 text-[10px] font-black uppercase transition-all text-slate-400 hover:text-white";
            }
        });
        render(globalFilteredItems);
    }

    function processImgUrl(rawUrl) {
        if (!rawUrl) return fallbackImg;
        let url = rawUrl.trim();
        if (url.includes('drive.google.com')) {
            const fileId = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
            if (fileId) return `https://docs.google.com/uc?export=view&id=${fileId}`;
        }
        return url;
    }

    function applyFilters() {
        const f = { 
            n: document.getElementById('searchName').value.toLowerCase(), 
            b: document.getElementById('filterBrand').value, 
            sz: document.getElementById('filterSize').value, 
            s: document.getElementById('filterSeries').value, 
            v: document.getElementById('filterVariant').value 
        };
        
        const groups = {}; let total = 0, brands = new Set();
        
        masterData.forEach(item => {
            const desc = (item["Item Description"]||"").trim(), 
                  brand = (item.Brand||"").trim(), 
                  series = (item.Series||"").trim(), 
                  size = (item.Size||"").trim(), 
                  variant = (item.Variant||"").trim(), 
                  qty = Number(item.Total || 0);
            
            const imgUrl = processImgUrl(item.DesignURL || item.ImgUrl || item.Image);
            const lotNo = item["Lot No"] || item["Lot no."] || "N/A";

            if (desc.toLowerCase().includes(f.n) && (!f.b || brand===f.b) && (!f.sz || size===f.sz) && (!f.s || series===f.s) && (!f.v || variant===f.v)) {
                const k = `${desc}|${brand}|${series}|${size}|${variant}`.toLowerCase();
                if (!groups[k]) groups[k] = { desc, brand, series, size, variant, imgUrl, lots: [], total: 0 };
                groups[k].lots.push({ lot: lotNo, qty });
                groups[k].total += qty; total += qty; brands.add(brand);
            }
        });
        
        globalFilteredItems = Object.values(groups);
        document.getElementById('statDesigns').innerText = globalFilteredItems.length;
        document.getElementById('statBoxes').innerText = total.toLocaleString();
        document.getElementById('statBrands').innerText = brands.size;
        document.getElementById('statFiltered').innerText = globalFilteredItems.length;
        render(globalFilteredItems);
    }

    function render(items) {
        const container = document.getElementById('reportList');
        if(items.length === 0) {
            container.className = "block";
            container.innerHTML = `<div class="text-center py-20 opacity-30 font-bold uppercase tracking-widest text-xs text-slate-500">Zero Active Filter Matches Found</div>`;
            return;
        }

        // --- FORMAT 1: ROW PROFILE VIEW ---
        if (currentLayout === 'format1') {
            container.className = "block";
            container.innerHTML = items.map(item => `
                <div class="stock-card">
                    <div class="variant-badge">${item.variant || 'STD'}</div>
                    <div class="card-img-frame" onclick="document.getElementById('modalImg').src='${item.imgUrl}'; document.getElementById('imageModal').style.display='flex'">
                        <img src="${item.imgUrl}" loading="lazy" crossorigin="anonymous" onerror="this.onerror=null; this.src='${fallbackImg}';">
                    </div>
                    <div class="card-info">
                        <div><span class="brand-tag">${item.brand}</span></div>
                        <div class="design-name">${item.desc}</div>
                        <div class="design-meta">${item.series || 'REGULAR'} | ${item.size}</div>
                        <div class="w-full mt-2">
                            ${item.lots.map(l => `
                                <div class="lot-row">
                                    <span class="text-slate-400 text-xs font-semibold tracking-wider">LOT: ${l.lot}</span>
                                    <span class="font-bold text-slate-200">${l.qty} Bx</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="card-total">
                        <div class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest md:mb-1.5">Total Boxes</div>
                        <div class="total-val">${Math.round(item.total)}</div>
                    </div>
                </div>`).join('');

        // --- FORMAT 2: GALLERY GRID VIEW ---
        } else if (currentLayout === 'format2') {
            container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6";
            container.innerHTML = items.map(item => `
                <div class="bg-[#090b0d] border-2 border-[#dfb76c] relative flex flex-col justify-between p-0 shadow-xl h-full">
                    <div class="variant-badge variant-badge-grid">${item.variant || 'STD'}</div>
                    <div class="w-full bg-[#020304] border-b border-[#161a22] p-4 flex items-center justify-center cursor-pointer aspect-square" onclick="document.getElementById('modalImg').src='${item.imgUrl}'; document.getElementById('imageModal').style.display='flex'">
                        <img src="${item.imgUrl}" class="h-44 w-auto object-cover border border-[#222b35]" loading="lazy" crossorigin="anonymous" onerror="this.onerror=null; this.src='${fallbackImg}';">
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <div class="mb-1"><span class="brand-tag">${item.brand}</span></div>
                            <h3 class="text-lg font-black text-white uppercase tracking-tight line-clamp-1">${item.desc}</h3>
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mt-0.5 mb-3">${item.series || 'REGULAR'} | ${item.size}</p>
                            <div class="bg-black/40 border border-[#161a22] p-3 space-y-1.5 max-h-32 overflow-y-auto">
                                ${item.lots.map(l => `
                                    <div class="flex justify-between items-center text-xs font-medium text-slate-300">
                                        <span class="text-slate-500 font-semibold">■ LOT: ${l.lot}</span>
                                        <span class="text-white font-bold">${l.qty} BX</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex justify-between items-center pt-4 mt-4 border-t border-[#161a22]">
                            <span class="text-[9px] font-extrabold uppercase tracking-widest text-slate-500">TOTAL READY</span>
                            <span class="text-xl font-black text-[#dfb76c] font-mono">${Math.round(item.total)} <span class="text-[10px] font-bold text-slate-500">BX</span></span>
                        </div>
                    </div>
                </div>`).join('');

        // --- FORMAT 3: DATA MATRIX TABLE VIEW ---
        } else if (currentLayout === 'format3') {
            container.className = "block overflow-x-auto";
            let tableHtml = `
            <table class="w-full text-left border-collapse matrix-panel border border-slate-800">
                <thead>
                    <tr class="border-b border-slate-800 bg-[#020304] text-slate-400 text-[10px] font-black uppercase tracking-wider">
                        <th class="p-4 text-center w-24">Preview</th>
                        <th class="p-4">Design Profile Name</th>
                        <th class="p-4">Specifications</th>
                        <th class="p-4 w-72">Lot Wise Breakdown</th>
                        <th class="p-4 text-right w-36">Total Stock</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-900/60 text-xs">`;

            tableHtml += items.map(item => `
                <tr class="hover:bg-slate-900/30 transition duration-150">
                    <td class="p-3 text-center">
                        <img src="${item.imgUrl}" class="w-12 h-16 object-cover border border-slate-800 bg-black mx-auto cursor-pointer" onclick="document.getElementById('modalImg').src='${item.imgUrl}'; document.getElementById('imageModal').style.display='flex'" onerror="this.onerror=null; this.src='${fallbackImg}';">
                    </td>
                    <td class="p-3 font-bold text-sm text-white uppercase tracking-tight">
                        <div>${item.desc}</div>
                        <div class="text-[10px] text-amber-500/80 font-medium mt-0.5">${item.series || 'REGULAR'}</div>
                    </td>
                    <td class="p-3 uppercase tracking-wide">
                        <div class="text-slate-300 font-semibold">${item.size}</div>
                        <div class="text-[10px] text-slate-500 font-bold mt-0.5">${item.brand} | ${item.variant || 'STD'}</div>
                    </td>
                    <td class="p-3">
                        <div class="grid grid-cols-2 gap-x-3 gap-y-1 text-[11px]">
                            ${item.lots.map(l => `<div class="text-slate-400"><span class="text-slate-600 font-bold">L:</span> ${l.lot} <span class="text-slate-200 font-semibold">(${l.qty})</span></div>`).join('')}
                        </div>
                    </td>
                    <td class="p-3 text-right font-black text-base text-[#dfb76c] font-mono tracking-tight">
                        ${Math.round(item.total)} <span class="text-[10px] text-slate-500 font-bold">Bx</span>
                    </td>
                </tr>`).join('');

            tableHtml += `</tbody></table>`;
            container.innerHTML = tableHtml;
        }
    }

    // High performance server-side compiled dynamic print operation
    function downloadPDF(btn) {
        const originalText = btn.innerText;
        btn.innerText = "Processing PDF Report..."; 
        btn.disabled = true;

        // Clone current view HTML context element safely
        let targetList = document.getElementById('reportList').innerHTML;
        
        // Wrap structure within a clean presentation block for compilation
        let documentTemplate = `
            <html>
            <head>
                <style>
                    body { font-family: sans-serif; background-color: #ffffff !important; color: #000000 !important; padding: 10px; }
                    .stock-card { display: flex; flex-direction: row; border: 1px solid #000; margin-bottom: 15px; page-break-inside: avoid; }
                    .card-img-frame { width: 25%; padding: 10px; text-align: center; }
                    .card-img-frame img { height: 120px; width: auto; object-fit: cover; }
                    .card-info { width: 55%; padding: 10px; }
                    .card-total { width: 20%; padding: 10px; text-align: center; background: #f0f0f0; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #000; }
                    .variant-badge { font-weight: bold; background: #000; color: #fff; padding: 2px 5px; font-size: 10px; display: inline-block; }
                    .brand-tag { font-size: 10px; font-weight: bold; color: blue; }
                    .design-name { font-size: 16px; font-weight: bold; text-transform: uppercase; }
                    .lot-row { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 4px 0; font-size: 11px; }
                    .total-val { font-size: 24px; font-weight: bold; color: #000; }
                    table { w-full; border-collapse: collapse; margin-top: 20px; }
                    th { background: #eee; font-size: 11px; padding: 8px; border: 1px solid #000; }
                    td { padding: 8px; border: 1px solid #000; font-size: 11px; }
                </style>
            </head>
            <body>
                <h2 style="text-align:center; text-transform:uppercase;">Emcer Tiles Private Limited - Inventory Report</h2>
                <p style="text-align:center; font-size:10px;">Generated on: ${new Date().toLocaleString()}</p>
                <br/>
                ${targetList}
            </body>
            </html>
        `;

        // Push directly to execution server context
        google.script.run
            .withSuccessHandler(function(base64String) {
                btn.innerText = originalText; 
                btn.disabled = false;
                
                // Trigger download interface natively within browser pipeline
                const link = document.createElement('a');
                link.href = 'data:application/pdf;base64,' + base64String;
                link.download = 'NexTile_Live_Stock.pdf';
                link.click();
            })
            .withFailureHandler(function(err) {
                alert("PDF Generation Fault: " + err.message);
                btn.innerText = originalText; 
                btn.disabled = false;
            })
            .generateServerPdf(documentTemplate);
    }

    window.onload = initPortal;
</script>
</body>
</html>
