<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emcer Tiles | Inventory Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .glass-card {
      background: rgba(15, 15, 15, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #000;
    }
    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 3px;
    }
    
    /* 🖨️ PERFECT PDF PRINT STYLES */
    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      header, .grid, .glass-card:not(#report-container), button, footer, #status-link {
        display: none !important; /* પ્રિન્ટ કરતી વખતે ફિલ્ટર્સ અને બટનો સંતાડી દેશે */
      }
      .glass-card {
        background: transparent !important;
        border: none !important;
        backdrop-filter: none !important;
      }
      #report-container, #report-data {
        display: block !important;
        width: 100% !important;
      }
      table {
        width: 100% !important;
        border-collapse: collapse !important;
        color: black !important;
      }
      th, td {
        border-bottom: 1px solid #ddd !important;
        color: black !important;
        padding: 8px !important;
      }
      tr {
        page-break-inside: avoid !important; /* ટેબલની રો અધવચ્ચેથી કપાય નહીં */
      }
      img {
        max-width: 80px !important;
        height: auto !important;
        border: 1px solid #ccc !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .text-white { color: black !important; }
      .text-emerald-400, .text-emerald-500 { color: #047857 !important; }
      .text-zinc-400, .text-zinc-500 { color: #4b5563 !important; }
    }
  </style>
</head>
<body class="h-full text-gray-200 antialiased selection:bg-amber-500 selection:text-black">

  <div class="min-h-screen flex flex-col justify-between p-4 md:p-6 lg:p-8 space-y-6">
    
    <header class="glass-card rounded-xl p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-xl md:text-2xl font-bold tracking-wider text-white">EMCER TILES PRIVATE LIMITED</h1>
        <p class="text-xs font-semibold text-amber-500 tracking-widest mt-0.5">INVENTORY PORTAL</p>
        <div id="status-link" class="text-[10px] text-gray-500 mt-1 flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
          SYNCHRONIZING SECURE NODE ENGINE...
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
        <button onclick="switchLayout('format1')" id="btn-format1" class="px-3 py-1.5 text-xs font-bold rounded uppercase tracking-wider transition bg-amber-500 text-black">
          Format 1: Row Spec
        </button>
        <button onclick="switchLayout('format2')" id="btn-format2" class="px-3 py-1.5 text-xs font-bold rounded uppercase tracking-wider transition bg-zinc-900 text-gray-400 hover:text-white border border-zinc-800">
          Format 2: Grid Card
        </button>
        <button onclick="switchLayout('format3')" id="btn-format3" class="px-3 py-1.5 text-xs font-bold rounded uppercase tracking-wider transition bg-zinc-900 text-gray-400 hover:text-white border border-zinc-800">
          Format 3: Matrix Table
        </button>
        
        <button onclick="downloadPDF()" class="ml-auto md:ml-2 bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 text-xs font-bold rounded uppercase tracking-wider flex items-center gap-1.5 transition">
          🛑 Download PDF
        </button>
        <button onclick="initPortal()" class="bg-zinc-900 hover:bg-zinc-800 text-white border border-zinc-800 px-4 py-1.5 text-xs font-bold rounded uppercase tracking-wider flex items-center gap-1.5 transition">
          🔄 Refresh
        </button>
        <div class="border border-amber-500/30 bg-amber-500/10 text-amber-500 px-4 py-1.5 text-xs font-bold rounded uppercase tracking-widest hidden md:block">
          ✨ Yashdeep Jivani ✨
        </div>
      </div>
    </header>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="glass-card rounded-xl p-4 text-center">
        <p class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold">Total Designs</p>
        <h3 id="count-designs" class="text-2xl md:text-3xl font-bold text-white mt-1">0</h3>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <p class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold">Total Boxes</p>
        <h3 id="count-boxes" class="text-2xl md:text-3xl font-bold text-emerald-500 mt-1">0</h3>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <p class="text-[10px] uppercase tracking-widest text-gray-500 font-semibold">Active Brands</p>
        <h3 id="count-brands" class="text-2xl md:text-3xl font-bold text-white mt-1">0</h3>
      </div>
      <div class="glass-card rounded-xl p-4 text-center border-amber-500/20 bg-amber-500/[0.02]">
        <p class="text-[10px] uppercase tracking-widest text-amber-500/70 font-semibold">Filtered View</p>
        <h3 id="count-filtered" class="text-2xl md:text-3xl font-bold text-amber-500 mt-1">0</h3>
      </div>
    </div>

    <div class="glass-card rounded-xl p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 items-end">
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block mb-1.5">Search Design</label>
        <input type="text" id="search-design" oninput="applyFilters()" placeholder="TYPE MATERIAL NAME..." class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs focus:outline-none focus:border-amber-500 uppercase text-white placeholder-gray-600">
      </div>
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block mb-1.5">Brand</label>
        <select id="filter-brand" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs focus:outline-none focus:border-amber-500 text-white">
          <option value="">ALL BRANDS</option>
        </select>
      </div>
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block mb-1.5">Size</label>
        <select id="filter-size" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs focus:outline-none focus:border-amber-500 text-white">
          <option value="">ALL SIZES</option>
        </select>
      </div>
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block mb-1.5">Series</label>
        <select id="filter-series" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs focus:outline-none focus:border-amber-500 text-white">
          <option value="">ALL SERIES</option>
        </select>
      </div>
      <div class="flex gap-2">
        <div class="flex-1">
          <label class="text-[10px] font-bold uppercase tracking-wider text-gray-400 block mb-1.5">Variant (Grade)</label>
          <select id="filter-variant" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs focus:outline-none focus:border-amber-500 text-white">
            <option value="">ALL VARIANTS</option>
          </select>
        </div>
        <button onclick="clearFilters()" class="bg-zinc-900 border border-zinc-800 hover:bg-zinc-800 text-gray-400 hover:text-white p-2 rounded transition h-[34px] w-[38px] flex items-center justify-center" title="Clear Filters">
          🗑️
        </button>
      </div>
    </div>

    <div id="report-container" class="flex-1 glass-card rounded-xl p-4 min-h-[400px] flex flex-col justify-center items-center">
      <div class="w-full h-full">
        <div id="loading-view" class="text-center py-20">
          <div class="w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p id="loading-text" class="text-xs uppercase tracking-widest text-gray-500">Syncing Active Matrix Database Cluster...</p>
        </div>
        <div id="report-data" class="hidden w-full"></div>
      </div>
    </div>

    <footer class="text-center text-[10px] text-zinc-600 tracking-wider uppercase">
      Emcer Tiles Cloud Engine v2.6 • Secured Node Session • Image Mapping Activated
    </footer>

  </div>

  <script>
    let masterData = [];
    let designImages = {}; // design.json નો ડેટા અહીં સેવ થશે
    let currentLayout = 'format1';
    let globalFilteredItems = [];

    // 🛑 કોન્ફિગરેશન લિંક્સ
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzuBEiGXoJb_bqJcwpFn47cdijPU8kbkTghpSAOP7ICNVctIVUr1q_OnLi6Jax-dcKT/exec"; 
    const jsonUrl = "design.json"; // જો સેમ ફોલ્ડરમાં હોય તો 'design.json', અથવા પૂરી github raw લિંક નાખો

    const fallbackImg = "https://placehold.co/150x150/111/333?text=No+Image";

    window.addEventListener('DOMContentLoaded', () => {
      initPortal();
    });

    function initPortal() {
      showLoader(true, "Fetching data from live nodes...");
      
      // ૧. પહેલા GitHub માંથી design.json ડાઉનલોડ કરો
      fetch(jsonUrl)
        .then(res => res.json())
        .then(imgData => {
          // ધારો કે json ફોર્મેટ આ રીતનું છે: {"Design Name": "http...jpg"}
          // કીઝ ને સરળતાથી મેચ કરવા અપરકેસમાં મેપ કરીએ
          designImages = {};
          Object.keys(imgData).forEach(key => {
            designImages[key.toUpperCase().trim()] = imgData[key];
          });
          return fetch(webAppUrl); // ૨. પછી ગુગલ સીટનો સ્ટોક ડેટા ફેચ કરો
        })
        .then(response => response.json())
        .then(data => {
          if (data && data.length > 0 && !data.error) {
            masterData = data;
            document.getElementById('status-link').innerHTML = `
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              DIRECT LINK ACTIVE (${masterData.length} ROWS SYNCED WITH IMAGES)
            `;
            setupFilters();
            applyFilters();
            showLoader(false);
          } else {
            showLoader(false);
            alert("No data found or sheet error: " + (data.error || 'Empty'));
          }
        })
        .catch(err => {
          console.error("Initialization Error:", err);
          showLoader(false);
          document.getElementById('status-link').innerHTML = `
            <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
            NODE DISCONNECTED (JSON OR WEBAPP ERROR)
          `;
        });
    }

    function showLoader(show, message = "") {
      const loader = document.getElementById('loading-view');
      const dataView = document.getElementById('report-data');
      if(show) {
        if(message) document.getElementById('loading-text').innerText = message;
        loader.classList.remove('hidden');
        dataView.classList.add('hidden');
      } else {
        loader.classList.add('hidden');
        dataView.classList.remove('hidden');
      }
    }

    function setupFilters() {
      const brands = new Set();
      const sizes = new Set();
      const series = new Set();
      const variants = new Set();

      masterData.forEach(item => {
        if(item.Brand) brands.add(item.Brand.toString().trim());
        if(item.Size) sizes.add(item.Size.toString().trim());
        if(item.Series) series.add(item.Series.toString().trim());
        if(item.Variant) variants.add(item.Variant.toString().trim());
      });

      populateDropdown('filter-brand', brands, 'ALL BRANDS');
      populateDropdown('filter-size', sizes, 'ALL SIZES');
      populateDropdown('filter-series', series, 'ALL SERIES');
      populateDropdown('filter-variant', variants, 'ALL VARIANTS');
    }

    function populateDropdown(id, set, defaultText) {
      const select = document.getElementById(id);
      select.innerHTML = `<option value="">${defaultText}</option>`;
      Array.from(set).sort().forEach(val => {
        select.innerHTML += `<option value="${val}">${val}</option>`;
      });
    }

    function applyFilters() {
      const search = document.getElementById('search-design').value.toUpperCase().trim();
      const brand = document.getElementById('filter-brand').value;
      const size = document.getElementById('filter-size').value;
      const series = document.getElementById('filter-series').value;
      const variant = document.getElementById('filter-variant').value;

      globalFilteredItems = masterData.filter(item => {
        const matchSearch = !search || (item.Design && item.Design.toString().toUpperCase().includes(search));
        const matchBrand = !brand || item.Brand === brand;
        const matchSize = !size || item.Size === size;
        const matchSeries = !series || item.Series === series;
        const matchVariant = !variant || item.Variant === variant;

        return matchSearch && matchBrand && matchSize && matchSeries && matchVariant;
      });

      updateCounters();
      renderLayout();
    }

    function updateCounters() {
      const totalDesigns = new Set(masterData.map(i => i.Design)).size;
      const totalBrands = new Set(masterData.map(i => i.Brand)).size;
      
      let totalBoxes = 0;
      masterData.forEach(i => {
        const qty = parseFloat(i.Boxes || 0);
        if(!isNaN(qty)) totalBoxes += qty;
      });

      document.getElementById('count-designs').innerText = totalDesigns;
      document.getElementById('count-boxes').innerText = Math.round(totalBoxes).toLocaleString('en-IN');
      document.getElementById('count-brands').innerText = totalBrands;
      document.getElementById('count-filtered').innerText = globalFilteredItems.length;
    }

    function switchLayout(layout) {
      currentLayout = layout;
      ['format1', 'format2', 'format3'].forEach(l => {
        const btn = document.getElementById(`btn-${l}`);
        if(l === layout) {
          btn.className = "px-3 py-1.5 text-xs font-bold rounded uppercase tracking-wider transition bg-amber-500 text-black";
        } else {
          btn.className = "px-3 py-1.5 text-xs font-bold rounded uppercase tracking-wider transition bg-zinc-900 text-gray-400 hover:text-white border border-zinc-800";
        }
      });
      renderLayout();
    }

    // ડિઝાઇનના નામ પરથી ઈમેજ લિંક શોધવાનું હેલ્પર ફંક્શન
    function getTileImage(designName) {
      if(!designName) return fallbackImg;
      const cleanKey = designName.toString().toUpperCase().trim();
      return designImages[cleanKey] || fallbackImg;
    }

    function renderLayout() {
      const container = document.getElementById('report-data');
      if(globalFilteredItems.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-zinc-500 text-xs uppercase tracking-wider">No matching stock items found.</div>`;
        return;
      }

      if (currentLayout === 'format1') {
        // FORMAT 1: ROW SPECIFICATION TABLE (WITH IMAGE)
        let html = `
          <div class="overflow-x-auto w-full">
            <table class="w-full text-left border-collapse text-xs">
              <thead>
                <tr class="border-b border-zinc-800 text-zinc-400 uppercase tracking-wider print:border-black">
                  <th class="py-3 px-4 w-16">Preview</th>
                  <th class="py-3 px-4">Design Name</th>
                  <th class="py-3 px-4">Brand</th>
                  <th class="py-3 px-4">Size</th>
                  <th class="py-3 px-4">Series</th>
                  <th class="py-3 px-4 text-right">Available Boxes</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-zinc-900 print:divide-gray-200">
        `;
        
        globalFilteredItems.forEach(item => {
          const imgUrl = getTileImage(item.Design);
          html += `
            <tr class="hover:bg-zinc-900/50 transition print:hover:bg-transparent">
              <td class="py-2 px-4">
                <img src="${imgUrl}" alt="Tile Preview" class="w-12 h-12 object-cover rounded border border-zinc-800 print:w-16 print:h-16" onerror="this.src='${fallbackImg}'">
              </td>
              <td class="py-2 px-4 font-bold text-white uppercase print:text-black">${item.Design || '-'}</td>
              <td class="py-2 px-4 text-zinc-400 print:text-gray-700">${item.Brand || '-'}</td>
              <td class="py-2 px-4 text-zinc-400 print:text-gray-700">${item.Size || '-'}</td>
              <td class="py-2 px-4 text-zinc-500 print:text-gray-500">${item.Series || '-'}</td>
              <td class="py-2 px-4 text-right font-bold text-emerald-400 print:text-emerald-800">${parseInt(item.Boxes || 0)} Box</td>
            </tr>
          `;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;

      } else if (currentLayout === 'format2') {
        // FORMAT 2: GRID CARDS (PREMIUM VIEW)
        let html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 w-full print:block">`;
        globalFilteredItems.forEach(item => {
          const imgUrl = getTileImage(item.Design);
          html += `
            <div class="border border-zinc-800 bg-zinc-950 p-4 rounded-lg flex flex-col justify-between space-y-3 print:border-b print:border-gray-300 print:mb-4 print:flex-row print:space-y-0">
              <div class="print:flex print:gap-4">
                <img src="${imgUrl}" alt="Tile" class="w-full h-40 object-cover rounded border border-zinc-900 mb-2 print:w-20 print:h-20" onerror="this.src='${fallbackImg}'">
                <div>
                  <span class="text-[9px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase font-bold tracking-widest print:border">${item.Brand || 'EMCER'}</span>
                  <h4 class="text-sm font-bold text-white uppercase mt-2 tracking-wide print:text-black">${item.Design || '-'}</h4>
                  <p class="text-[11px] text-zinc-500 mt-1">${item.Size || '-'} • ${item.Series || '-'}</p>
                </div>
              </div>
              <div class="flex justify-between items-center border-t border-zinc-900 pt-2.5 print:border-none print:pt-0">
                <span class="text-[10px] uppercase text-zinc-500 font-medium print:hidden">Stock Status</span>
                <span class="text-sm font-black text-emerald-400 print:text-emerald-800">${parseInt(item.Boxes || 0)} BOX</span>
              </div>
            </div>
          `;
        });
        html += `</div>`;
        container.innerHTML = html;

      } else if (currentLayout === 'format3') {
        // FORMAT 3: MATRIX TABLE
        let html = `
          <div class="overflow-x-auto w-full">
            <table class="w-full text-center border border-zinc-800 text-xs print:border-black">
              <tr class="bg-zinc-950 text-zinc-400 uppercase border-b border-zinc-800 print:bg-gray-100 print:text-black">
                <th class="p-3 border-r border-zinc-800 text-left w-20">Image</th>
                <th class="p-3 border-r border-zinc-800 text-left">Material Identity Matrix</th>
                <th class="p-3">Available Volume Block</th>
              </tr>
        `;
        globalFilteredItems.forEach(item => {
          const imgUrl = getTileImage(item.Design);
          html += `
            <tr class="border-b border-zinc-900 hover:bg-zinc-900/30 print:border-gray-200">
              <td class="p-2 border-r border-zinc-800 print:border-gray-200">
                <img src="${imgUrl}" class="w-10 h-10 object-cover mx-auto rounded" onerror="this.src='${fallbackImg}'">
              </td>
              <td class="p-3 border-r border-zinc-800 text-left font-semibold text-zinc-300 print:text-black print:border-gray-200">
                ${item.Design} [${item.Size} | ${item.Brand}]
              </td>
              <td class="p-3 font-bold text-amber-500 bg-amber-500/[0.01] print:text-black">
                ${parseInt(item.Boxes || 0)} Bxs
              </td>
            </tr>
          `;
        });
        html += `</table></div>`;
        container.innerHTML = html;
      }
    }

    function clearFilters() {
      document.getElementById('search-design').value = '';
      document.getElementById('filter-brand').value = '';
      document.getElementById('filter-size').value = '';
      document.getElementById('filter-series').value = '';
      document.getElementById('filter-variant').value = '';
      applyFilters();
    }

    function downloadPDF() {
      window.print();
    }
  </script>
</body>
</html>
