<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emcer Tiles | Inventory Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-card {
      background: rgba(15, 15, 15, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    @media print {
      body { background: white !important; color: black !important; }
      header, .grid, .glass-card:not(#report-container), button, footer, #status-link { display: none !important; }
      .glass-card { background: transparent !important; border: none !important; backdrop-filter: none !important; }
      #report-container, #report-data { display: block !important; width: 100% !important; }
      table { width: 100% !important; border-collapse: collapse !important; color: black !important; }
      th, td { border-bottom: 1px solid #ddd !important; color: black !important; padding: 8px !important; }
      tr { page-break-inside: avoid !important; }
      img { max-width: 80px !important; height: auto !important; border: 1px solid #ccc !important; }
      .text-white { color: black !important; }
      .text-emerald-400, .text-emerald-500 { color: #047857 !important; }
    }
  </style>
</head>
<body class="h-full text-gray-200 antialiased">

  <div class="min-h-screen flex flex-col justify-between p-4 md:p-6 lg:p-8 space-y-6">
    
    <header class="glass-card rounded-xl p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-xl md:text-2xl font-bold tracking-wider text-white">EMCER TILES PRIVATE LIMITED</h1>
        <p class="text-xs font-semibold text-amber-500 tracking-widest mt-0.5">INVENTORY PORTAL</p>
        <div id="status-link" class="text-[10px] text-gray-500 mt-1 flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
          INITIALIZING SECURE NODE ENGINE...
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
        <button onclick="switchLayout('format1')" id="btn-format1" class="px-3 py-1.5 text-xs font-bold rounded bg-amber-500 text-black">Format 1: Row Spec</button>
        <button onclick="switchLayout('format2')" id="btn-format2" class="px-3 py-1.5 text-xs font-bold rounded bg-zinc-900 text-gray-400 border border-zinc-800">Format 2: Grid Card</button>
        <button onclick="switchLayout('format3')" id="btn-format3" class="px-3 py-1.5 text-xs font-bold rounded bg-zinc-900 text-gray-400 border border-zinc-800">Format 3: Matrix Matrix</button>
        <button onclick="downloadPDF()" class="bg-red-600 text-white px-4 py-1.5 text-xs font-bold rounded uppercase">🛑 PDF</button>
        <button onclick="initPortal()" class="bg-zinc-900 text-white border border-zinc-800 px-4 py-1.5 text-xs font-bold rounded">🔄 Refresh</button>
      </div>
    </header>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="glass-card rounded-xl p-4 text-center">
        <p class="text-[10px] uppercase text-gray-500">Total Designs</p>
        <h3 id="count-designs" class="text-2xl font-bold text-white mt-1">0</h3>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <p class="text-[10px] uppercase text-gray-500">Total Boxes</p>
        <h3 id="count-boxes" class="text-2xl font-bold text-emerald-500 mt-1">0</h3>
      </div>
      <div class="glass-card rounded-xl p-4 text-center">
        <p class="text-[10px] uppercase text-gray-500">Active Brands</p>
        <h3 id="count-brands" class="text-2xl font-bold text-white mt-1">0</h3>
      </div>
      <div class="glass-card rounded-xl p-4 text-center border-amber-500/20">
        <p class="text-[10px] uppercase text-amber-500">Filtered View</p>
        <h3 id="count-filtered" class="text-2xl font-bold text-amber-500 mt-1">0</h3>
      </div>
    </div>

    <div class="glass-card rounded-xl p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 items-end">
      <div>
        <label class="text-[10px] text-gray-400 block mb-1.5">Search Design</label>
        <input type="text" id="search-design" oninput="applyFilters()" placeholder="TYPE MATERIAL NAME..." class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs text-white uppercase">
      </div>
      <div>
        <label class="text-[10px] text-gray-400 block mb-1.5">Brand</label>
        <select id="filter-brand" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs text-white"><option value="">ALL BRANDS</option></select>
      </div>
      <div>
        <label class="text-[10px] text-gray-400 block mb-1.5">Size</label>
        <select id="filter-size" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs text-white"><option value="">ALL SIZES</option></select>
      </div>
      <div>
        <label class="text-[10px] text-gray-400 block mb-1.5">Series</label>
        <select id="filter-series" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs text-white"><option value="">ALL SERIES</option></select>
      </div>
      <div class="flex gap-2">
        <div class="flex-1">
          <label class="text-[10px] text-gray-400 block mb-1.5">Variant</label>
          <select id="filter-variant" onchange="applyFilters()" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-xs text-white"><option value="">ALL VARIANTS</option></select>
        </div>
        <button onclick="clearFilters()" class="bg-zinc-900 border border-zinc-800 p-2 rounded h-[34px] w-[38px]">🗑️</button>
      </div>
    </div>

    <div id="report-container" class="flex-1 glass-card rounded-xl p-4 min-h-[400px] flex flex-col justify-center items-center">
      <div class="w-full h-full">
        <div id="loading-view" class="text-center py-20">
          <div class="w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p id="loading-text" class="text-xs uppercase tracking-widest text-gray-500">Syncing Active Matrix Database Cluster...</p>
        </div>
        <div id="report-data" class="hidden w-full"></div>
      </div>
    </div>

    <footer class="text-center text-[10px] text-zinc-600 uppercase">
      Emcer Tiles Cloud Engine v2.7 • Yashdeep Jivani
    </footer>

  </div>

  <script>
    let masterData = [];
    let designImages = {}; 
    let currentLayout = 'format1';
    let globalFilteredItems = [];

    // 🛑 લિંક કન્ફિગરેશન (ચેક કરીને સાચી નાખજો)
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzuBEiGXoJb_bqJcwpFn47cdijPU8kbkTghpSAOP7ICNVctIVUr1q_OnLi6Jax-dcKT/exec"; // તમારી લાઈવ URL અહીં બદલો
    const jsonUrl = "./design.json"; 

    const fallbackImg = "https://placehold.co/150x150/111/333?text=No+Image";

    window.addEventListener('DOMContentLoaded', () => {
      initPortal();
    });

    function initPortal() {
      showLoader(true, "Connecting to data nodes...");
      
      // ૧. પેલા ફ્રી સેફ્ટી સાથે JSON લાવો જેથી પ્રોબ્લેમ હોય તો પણ કોડ ન અટકે
      fetch(jsonUrl)
        .then(res => {
          if(!res.ok) return {}; // જો ફાઈલ ન મળે તો ખાલી ઓબ્જેક્ટ રિટર્ન કરો
          return res.json();
        })
        .then(imgData => {
          designImages = {};
          if(imgData) {
            Object.keys(imgData).forEach(key => {
              const cleanKey = key.toString().toUpperCase().replace(/[^A-Z0-9]/g, '');
              designImages[cleanKey] = imgData[key];
            });
          }
        })
        .catch(e => console.log("JSON Load bypass", e))
        .finally(() => {
          // ૨. હવે ગુગલ સીટનો ડેટા ફેચ કરો
          fetch(webAppUrl)
            .then(response => response.json())
            .then(data => {
              if (data && data.length > 0 && !data.error) {
                masterData = data;
                document.getElementById('status-link').innerHTML = `
                  <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                  LIVE NODE LINK ACTIVE (${masterData.length} ROWS)
                `;
                setupFilters();
                applyFilters();
                showLoader(false);
              } else {
                showLoader(false);
                document.getElementById('loading-view').innerHTML = `<p class="text-red-500 text-xs font-bold">SHEET ERROR: ${data.error || 'Empty Data'}</p>`;
              }
            })
            .catch(err => {
              console.error("Fetch Error:", err);
              showLoader(false);
              document.getElementById('loading-view').innerHTML = `<p class="text-red-500 text-xs font-bold">CONNECTION FAILED (CHECK WEB APP DEPLOYMENT)</p>`;
            });
        });
    }

    function getTileImage(designName) {
      if(!designName) return fallbackImg;
      const targetKey = designName.toString().toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (designImages[targetKey]) return designImages[targetKey];
      
      const keys = Object.keys(designImages);
      for (let i = 0; i < keys.length; i++) {
        if (targetKey.includes(keys[i]) || keys[i].includes(targetKey)) {
          return designImages[keys[i]];
        }
      }
      return fallbackImg;
    }

    function showLoader(show, message = "") {
      const loader = document.getElementById('loading-view');
      const dataView = document.getElementById('report-data');
      if(show) {
        if(message) document.getElementById('loading-text').innerText = message;
        loader.classList.remove('hidden');
        dataView.classList.add('hidden');
      } else {
        loader.classList.add('hidden');
        dataView.classList.remove('hidden');
      }
    }

    function setupFilters() {
      const brands = new Set(); const sizes = new Set(); const series = new Set(); const variants = new Set();
      masterData.forEach(item => {
        if(item.Brand) brands.add(item.Brand.toString().trim());
        if(item.Size) sizes.add(item.Size.toString().trim());
        if(item.Series) series.add(item.Series.toString().trim());
        if(item.Variant) variants.add(item.Variant.toString().trim());
      });
      populateDropdown('filter-brand', brands, 'ALL BRANDS');
      populateDropdown('filter-size', sizes, 'ALL SIZES');
      populateDropdown('filter-series', series, 'ALL SERIES');
      populateDropdown('filter-variant', variants, 'ALL VARIANTS');
    }

    function populateDropdown(id, set, defaultText) {
      const select = document.getElementById(id);
      select.innerHTML = `<option value="">${defaultText}</option>`;
      Array.from(set).sort().forEach(val => { select.innerHTML += `<option value="${val}">${val}</option>`; });
    }

    function applyFilters() {
      const search = document.getElementById('search-design').value.toUpperCase().trim();
      const brand = document.getElementById('filter-brand').value;
      const size = document.getElementById('filter-size').value;
      const series = document.getElementById('filter-series').value;
      const variant = document.getElementById('filter-variant').value;

      globalFilteredItems = masterData.filter(item => {
        const matchSearch = !search || (item.Design && item.Design.toString().toUpperCase().includes(search));
        const matchBrand = !brand || item.Brand === brand;
        const matchSize = !size || item.Size === size;
        const matchSeries = !series || item.Series === series;
        const matchVariant = !variant || item.Variant === variant;
        return matchSearch && matchBrand && matchSize && matchSeries && matchVariant;
      });

      updateCounters();
      renderLayout();
    }

    function updateCounters() {
      const totalDesigns = new Set(masterData.map(i => i.Design)).size;
      const totalBrands = new Set(masterData.map(i => i.Brand)).size;
      let totalBoxes = 0;
      masterData.forEach(i => { const qty = parseFloat(i.Boxes || 0); if(!isNaN(qty)) totalBoxes += qty; });

      document.getElementById('count-designs').innerText = totalDesigns;
      document.getElementById('count-boxes').innerText = Math.round(totalBoxes).toLocaleString('en-IN');
      document.getElementById('count-brands').innerText = totalBrands;
      document.getElementById('count-filtered').innerText = globalFilteredItems.length;
    }

    function switchLayout(layout) {
      currentLayout = layout;
      ['format1', 'format2', 'format3'].forEach(l => {
        const btn = document.getElementById(`btn-${l}`);
        btn.className = (l === layout) ? "px-3 py-1.5 text-xs font-bold rounded bg-amber-500 text-black" : "px-3 py-1.5 text-xs font-bold rounded bg-zinc-900 text-gray-400 border border-zinc-800";
      });
      renderLayout();
    }

    function renderLayout() {
      const container = document.getElementById('report-data');
      if(globalFilteredItems.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-zinc-500 text-xs uppercase">No stock items found.</div>`;
        return;
      }

      if (currentLayout === 'format1') {
        let html = `<div class="overflow-x-auto w-full"><table class="w-full text-left text-xs"><thead><tr class="border-b border-zinc-800 text-zinc-400 uppercase"><th class="py-3 px-4 w-20">Preview</th><th class="py-3 px-4">Design Name</th><th class="py-3 px-4">Brand</th><th class="py-3 px-4">Size</th><th class="py-3 px-4">Series</th><th class="py-3 px-4 text-right">Available Boxes</th></tr></thead><tbody class="divide-y divide-zinc-900 print:divide-gray-200">`;
        globalFilteredItems.forEach(item => {
          html += `<tr><td class="py-2 px-4"><img src="${getTileImage(item.Design)}" class="w-12 h-12 object-cover rounded border border-zinc-800 print:w-16 print:h-16" onerror="this.src='${fallbackImg}'"></td><td class="py-2 px-4 font-bold text-white uppercase print:text-black">${item.Design || '-'}</td><td class="py-2 px-4 text-zinc-400 print:text-gray-700">${item.Brand || '-'}</td><td class="py-2 px-4 text-zinc-400 print:text-gray-700">${item.Size || '-'}</td><td class="py-2 px-4 text-zinc-500 print:text-gray-500">${item.Series || '-'}</td><td class="py-2 px-4 text-right font-bold text-emerald-400 print:text-emerald-800">${parseInt(item.Boxes || 0)} Box</td></tr>`;
        });
        container.innerHTML = html + `</tbody></table></div>`;
      } else if (currentLayout === 'format2') {
        let html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 w-full print:block">`;
        globalFilteredItems.forEach(item => {
          html += `<div class="border border-zinc-800 bg-zinc-950 p-4 rounded-lg flex flex-col justify-between space-y-3 print:border-b print:mb-4 print:flex-row print:bg-white"><div class="print:flex print:gap-4"><img src="${getTileImage(item.Design)}" class="w-full h-40 object-cover rounded mb-2 print:w-20 print:h-20" onerror="this.src='${fallbackImg}'"><div><span class="text-[9px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase print:text-black">${item.Brand || 'EMCER'}</span><h4 class="text-sm font-bold text-white uppercase mt-2 print:text-black">${item.Design || '-'}</h4><p class="text-[11px] text-zinc-500 mt-1">${item.Size || '-'} • ${item.Series || '-'}</p></div></div><div class="flex justify-between items-center border-t border-zinc-900 pt-2.5 print:border-none"><span class="text-sm font-black text-emerald-400 print:text-emerald-800">${parseInt(item.Boxes || 0)} BOX</span></div></div>`;
        });
        container.innerHTML = html + `</div>`;
      } else if (currentLayout === 'format3') {
        let html = `<div class="overflow-x-auto w-full"><table class="w-full text-center border border-zinc-800 text-xs"><tr class="bg-zinc-950 text-zinc-400 uppercase border-b border-zinc-800 print:text-black"><th class="p-3 text-left w-24">Image</th><th class="p-3 text-left">Material Identity Matrix</th><th class="p-3">Available Volume Block</th></tr>`;
        globalFilteredItems.forEach(item => {
          html += `<tr class="border-b border-zinc-900"><td class="p-2"><img src="${getTileImage(item.Design)}" class="w-10 h-10 object-cover mx-auto rounded" onerror="this.src='${fallbackImg}'"></td><td class="p-3 text-left font-semibold text-zinc-300 print:text-black">${item.Design} [${item.Size} | ${item.Brand}]</td><td class="p-3 font-bold text-amber-500 print:text-black">${parseInt(item.Boxes || 0)} Bxs</td></tr>`;
        });
        container.innerHTML = html + `</table></div>`;
      }
    }

    function clearFilters() {
      document.getElementById('search-design').value = ''; document.getElementById('filter-brand').value = ''; document.getElementById('filter-size').value = ''; document.getElementById('filter-series').value = ''; document.getElementById('filter-variant').value = '';
      applyFilters();
    }

    function downloadPDF() { window.print(); }
  </script>
</body>
</html>
