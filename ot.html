<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #090d16; color: #f3f4f6; }
    .dashed-line { border-bottom: 1px dashed rgba(217, 119, 6, 0.2); flex-grow: 1; margin: 0 12px; position: relative; top: -4px; }
    @media print {
      .no-print { display: none !important; }
      body { background-color: #090d16 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    
    <!-- Top Controller Bar (Hidden in PDF Print) -->
    <div class="no-print bg-slate-900/80 border border-slate-800 p-4 rounded-2xl mb-8 flex flex-wrap justify-between items-center gap-4 sticky top-4 z-50 backdrop-blur-md">
      <div>
        <h2 class="text-amber-500 font-extrabold text-sm uppercase tracking-wider">Select Live Studio Format:</h2>
        <p class="text-xs text-slate-400">Click below to change the visual layout instantly</p>
      </div>
      <div class="flex gap-2">
        <button onclick="switchFormat('format1')" id="btn-format1" class="px-4 py-2 text-xs font-bold rounded-xl border border-amber-500 bg-amber-500 text-black transition shadow-lg">Format 1: Premium Mobile Card</button>
        <button onclick="switchFormat('format2')" id="btn-format2" class="px-4 py-2 text-xs font-bold rounded-xl border border-slate-800 bg-slate-900 text-slate-400 hover:border-amber-500 transition">Format 2: Split Spec Row</button>
        <button onclick="switchFormat('format3')" id="btn-format3" class="px-4 py-2 text-xs font-bold rounded-xl border border-slate-800 bg-slate-900 text-slate-400 hover:border-amber-500 transition">Format 3: Studio Table</button>
      </div>
      <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-xs px-5 py-2.5 rounded-xl transition shadow-lg">PRINT CURRENT VIEW</button>
    </div>

    <!-- Header Area -->
    <div class="flex justify-between items-end border-b-2 border-slate-800 pb-6 mb-8">
      <div>
        <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white uppercase">EMCER TILES PRIVATE LIMITED</h1>
        <p class="text-sm text-amber-500 font-bold uppercase tracking-[0.25em] mt-1">Live Inventory Dashboard</p>
      </div>
      <div class="text-right hidden md:block">
        <p class="text-xs text-slate-500 font-bold">Developer: Yashdeep Jivani</p>
      </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="text-center py-32 text-xl font-bold text-slate-600 animate-pulse uppercase tracking-widest">Compiling Visual Profiles...</div>
    
    <!-- Dynamic Display Target -->
    <div id="displayContainer"></div>

  </div>

  <script>
    let globalStockData = [];
    let currentFormat = 'format1';

    window.onload = function() {
      google.script.run.withSuccessHandler(function(data) {
        globalStockData = data;
        document.getElementById('loader').classList.add('hidden');
        renderDashboard();
      }).getStockData();
    };

    function switchFormat(formatId) {
      currentFormat = formatId;
      ['format1', 'format2', 'format3'].forEach(f => {
        const btn = document.getElementById('btn-' + f);
        if(f === formatId) {
          btn.className = "px-4 py-2 text-xs font-bold rounded-xl border border-amber-500 bg-amber-500 text-black transition shadow-lg";
        } else {
          btn.className = "px-4 py-2 text-xs font-bold rounded-xl border border-slate-800 bg-slate-900 text-slate-400 hover:border-amber-500 transition";
        }
      });
      renderDashboard();
    }

    function renderDashboard() {
      const container = document.getElementById('displayContainer');
      container.innerHTML = '';

      if (currentFormat === 'format1') {
        // --- FORMAT 1: PREMIUM MOBILE CARD GRID (Exact match to image_3ece3a.png style) ---
        let gridHtml = '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">';
        globalStockData.forEach(item => {
          let lotsHtml = '';
          item.lots.forEach(l => {
            lotsHtml += `
              <div class="flex justify-between items-center text-sm font-semibold text-amber-400/90 mb-1">
                <span>■ LOT: ${l.lot}</span>
                <span class="text-white">${l.qty} BOX</span>
              </div>`;
          });

          gridHtml += `
            <div class="bg-[#0f141c] border border-slate-800 rounded-[24px] overflow-hidden flex flex-col justify-between shadow-xl">
              <div class="relative bg-slate-950 flex items-center justify-center overflow-hidden">
                <img src="${item.img}" class="w-full h-64 object-cover rounded-t-[24px]" loading="lazy">
                <span class="absolute top-4 left-4 bg-amber-600 text-black text-[10px] px-3 py-1 font-extrabold rounded-md uppercase tracking-wider">GRADE: PRE</span>
              </div>
              <div class="p-5 flex-grow flex flex-col justify-between bg-[#0b1017]">
                <div>
                  <div class="flex justify-between items-start mb-1">
                    <h3 class="text-xl font-black text-white uppercase tracking-tight truncate">${item.name}</h3>
                    <span class="border border-amber-500/30 bg-amber-500/10 text-amber-400 text-[10px] font-black px-2 py-0.5 rounded uppercase">${item.variant}</span>
                  </div>
                  <p class="text-xs font-bold text-amber-500 uppercase tracking-wide mb-4">${item.brand} | ${item.series} | ${item.size}</p>
                  <div class="bg-black/40 border border-slate-900 p-3 rounded-xl mb-4 space-y-1">${lotsHtml}</div>
                </div>
                <div>
                  <button class="no-print w-full bg-slate-900 border border-amber-500/20 text-amber-500 text-xs font-bold py-2.5 rounded-xl mb-4 hover:bg-amber-500 hover:text-black transition flex items-center justify-center gap-2">
                     📋 COPY DETAILS FOR WHATSAPP
                  </button>
                  <div class="flex justify-between items-center pt-3 border-t border-slate-900 text-xs font-bold uppercase text-slate-500">
                    <span>TOTAL AVAILABLE</span>
                    <span class="text-lg font-black text-amber-400">${item.grandTotal} BOX</span>
                  </div>
                </div>
              </div>
            </div>`;
        });
        gridHtml += '</div>';
        container.innerHTML = gridHtml;

      } else if (currentFormat === 'format2') {
        // --- FORMAT 2: SPLIT SPECIFICATION ROW ---
        let rowHtml = '<div class="space-y-6">';
        globalStockData.forEach(item => {
          let lotsHtml = '';
          item.lots.forEach(l => {
            lotsHtml += `<div class="flex justify-between items-center text-sm font-bold text-slate-300"><span>LOT ${l.lot}</span><div class="dashed-line"></div><span class="text-amber-500">${l.qty} Bx</span></div>`;
          });

          rowHtml += `
            <div class="bg-[#0b1017] border-2 border-slate-800 rounded-2xl flex flex-col md:flex-row overflow-hidden shadow-md">
              <div class="md:w-1/4 bg-slate-950 p-3 border-r border-slate-800 flex items-center justify-center">
                <img src="${item.img}" class="max-h-48 w-full object-contain rounded-lg">
              </div>
              <div class="md:w-1/2 p-6 flex flex-col justify-between">
                <div>
                  <div class="flex items-center gap-3 mb-2">
                    <h3 class="text-2xl font-black uppercase text-white">${item.name}</h3>
                    <span class="bg-amber-500 text-black font-black text-xs px-2 py-0.5 rounded">${item.variant}</span>
                  </div>
                  <p class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">${item.series} — ${item.size}</p>
                  <div class="space-y-1 bg-black/20 p-4 rounded-xl border border-slate-900">${lotsHtml}</div>
                </div>
                <p class="text-[10px] text-slate-600 font-bold uppercase mt-4">Brand Portfolio: ${item.brand} | Quality Check Verified</p>
              </div>
              <div class="md:w-1/4 bg-gradient-to-br from-slate-900 to-black p-6 flex flex-col items-center justify-center text-center border-t md:border-t-0 md:border-l border-slate-800">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">TOTAL READY STOCK</span>
                <span class="text-5xl font-black text-amber-500 tracking-tight">${item.grandTotal}</span>
                <span class="text-sm font-bold text-white uppercase mt-1">Boxes Available</span>
              </div>
            </div>`;
        });
        rowHtml += '</div>';
        container.innerHTML = rowHtml;

      } else if (currentFormat === 'format3') {
        // --- FORMAT 3: STUDIO SPECIFICATION TABLE GRID ---
        let tableHtml = `
          <div class="overflow-x-auto bg-[#0b1017] border border-slate-800 rounded-2xl shadow-xl">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-slate-800 bg-slate-900/50 text-amber-500 text-xs font-black uppercase tracking-wider">
                  <th class="p-4 w-28">Preview</th>
                  <th class="p-4">Design Profile</th>
                  <th class="p-4">Specifications</th>
                  <th class="p-4 w-64">Lot Breakdown</th>
                  <th class="p-4 text-right w-40">Total Stock</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-900 text-sm">`;
        
        globalStockData.forEach(item => {
          let lotsHtml = '';
          item.lots.forEach(l => {
            lotsHtml += `<div class="text-xs font-mono text-slate-400"><span class="text-amber-500/70">L:</span>${l.lot} <span class="text-slate-200 font-bold">(${l.qty} Bx)</span></div>`;
          });

          tableHtml += `
            <tr class="hover:bg-slate-900/20 transition">
              <td class="p-4"><img src="${item.img}" class="w-20 h-20 object-cover rounded-xl border border-slate-800 bg-slate-950"></td>
              <td class="p-4">
                <div class="font-black text-base text-white uppercase">${item.name}</div>
                <div class="text-xs font-bold text-amber-500 uppercase mt-0.5">${item.series}</div>
              </td>
              <td class="p-4">
                <div class="font-semibold text-slate-300 text-xs uppercase">${item.size}</div>
                <div class="text-[11px] text-slate-500 font-bold uppercase mt-1">Brand: ${item.brand} | Var: ${item.variant}</div>
              </td>
              <td class="p-4"><div class="grid grid-cols-2 gap-x-2 gap-y-0.5">${lotsHtml}</div></td>
              <td class="p-4 text-right font-black text-xl text-white">${item.grandTotal} <span class="text-xs text-slate-500 font-normal">Bx</span></td>
            </tr>`;
        });
        
        tableHtml += '</tbody></table></div>';
        container.innerHTML = tableHtml;
      }
    }
  </script>
</body>
</html>
