<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .main-container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* 1. STICKY FILTER BOX */
        .filter-box { 
            position: sticky; top: 0; z-index: 100; 
            background: #1e293b; border: 1px solid #334155; padding: 20px; 
            margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;
            border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        /* 2. STOCK CARD WITH LOW STOCK & HOVER ZOOM */
        .stock-card { background: #1e293b; border: 1px solid #334155; display: flex; margin-bottom: 25px; position: relative; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .low-stock { border: 2px solid #ef4444 !important; }
        .low-stock-badge { position: absolute; bottom: 0; left: 0; background: #ef4444; color: white; padding: 2px 10px; font-size: 10px; font-weight: 900; z-index: 5; }
        
        .variant-badge { position: absolute; top: 15px; right: 20px; background: #d4af37; color: #000; padding: 4px 16px; font-size: 11px; font-weight: 900; border-radius: 9999px; }
        
        .card-img { width: 30%; border-right: 1px solid #334155; padding: 15px; display: flex; align-items: center; justify-content: center; background: #fff; overflow: hidden; }
        .card-img img { max-height: 150px; transition: transform 0.3s; cursor: zoom-in; }
        .card-img img:hover { transform: scale(1.2); }
        
        .card-total { width: 20%; border-left: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #131c2e; }
        
        /* PDF CLEANING */
        .pdf-template { background: #ffffff !important; color: #000 !important; }
        .pdf-template .no-print { display: none !important; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="printHeader" class="flex justify-between items-end pt-6">
        <div>
            <h1 class="text-3xl font-black text-white">EMCER TILES PRIVATE LIMITED</h1>
            <p id="lastUpdated" class="text-xs text-yellow-500 font-bold mt-2">Fetching...</p>
        </div>
        <button onclick="downloadPDF(this)" class="bg-amber-500 text-black px-6 py-2 font-black uppercase text-xs rounded hover:bg-amber-600">📄 Download Clean PDF</button>
    </div>

    <div id="filterSection" class="filter-box mt-8">
        <div class="flex flex-col"><label class="text-[10px] text-amber-500">SEARCH</label><input type="text" id="searchName" oninput="applyFilters()" class="bg-slate-900 border border-slate-700 p-2 rounded text-white"></div>
        <div class="flex flex-col"><label class="text-[10px] text-amber-500">BRAND</label><select id="filterBrand" onchange="applyFilters()" class="bg-slate-900 border border-slate-700 p-2 rounded text-white"><option value="">All</option></select></div>
        <div class="flex flex-col"><label class="text-[10px] text-amber-500">SIZE</label><select id="filterSize" onchange="applyFilters()" class="bg-slate-900 border border-slate-700 p-2 rounded text-white"><option value="">All</option></select></div>
    </div>

    <div id="reportContainer"><div id="reportList"></div></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec";
    let masterData = [];

    async function fetchLiveData() {
        const res = await fetch(SCRIPT_URL);
        masterData = await res.json();
        document.getElementById('lastUpdated').innerText = "Last Updated: " + new Date().toLocaleTimeString();
        render(masterData);
    }

    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(item => {
            const isLow = item.Total < 50;
            return `
            <div class="stock-card ${isLow ? 'low-stock' : ''}">
                ${isLow ? '<div class="low-stock-badge">LOW STOCK</div>' : ''}
                <div class="variant-badge">${item.Grade || 'STD'}</div>
                <div class="card-img"><img src="${item.ImgUrl || 'https://via.placeholder.com/200'}"></div>
                <div class="p-6 flex-1">
                    <div class="text-xs text-amber-500 font-bold uppercase">${item.Brand || 'N/A'}</div>
                    <div class="text-2xl font-black uppercase">${item["Item Description"]}</div>
                    <div class="text-slate-400 font-bold mt-1">LOT: ${item["Lot No"]}</div>
                </div>
                <div class="card-total">
                    <div class="text-5xl font-black text-amber-500">${item.Total}</div>
                    <div class="text-[10px] uppercase font-bold">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    async function downloadPDF(btn) {
        const report = document.getElementById('reportContainer');
        const header = document.getElementById('printHeader');
        const filters = document.getElementById('filterSection');
        
        // Hide UI elements for clean PDF
        header.style.display = 'none';
        filters.style.display = 'none';
        report.classList.add('pdf-template');
        
        const date = new Date().toISOString().slice(0, 10);
        btn.innerText = "Generating..."; btn.disabled = true;

        await html2pdf().set({
            margin: 10,
            filename: `Emcer_Stock_${date}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(report).save();

        // Restore
        header.style.display = '';
        filters.style.display = '';
        report.classList.remove('pdf-template');
        btn.innerText = "📄 Download Clean PDF"; btn.disabled = false;
    }

    function applyFilters() {
        const q = document.getElementById('searchName').value.toLowerCase();
        const filtered = masterData.filter(i => i["Item Description"].toLowerCase().includes(q));
        render(filtered);
    }

    fetchLiveData();
</script>
</body>
</html>
