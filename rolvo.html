<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: #d4af37; }
        .main-container { max-width: 1200px; margin: auto; padding: 20px; }
        .stock-card { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; display: flex; margin-bottom: 20px; overflow: hidden; position: relative; }
        .card-img { width: 30%; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .card-img img { max-height: 150px; }
        .card-info { flex: 1; padding: 20px; }
        .card-total { width: 20%; background: #161b22; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #30363d; }
        .variant-badge { position: absolute; top: 10px; right: 10px; background: #d4af37; color: #000; padding: 2px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .pdf-template { background: #fff !important; color: #000 !important; }
        .pdf-template .stock-card { background: #fff !important; border: 1px solid #d4af37 !important; color: #000 !important; }
        .pdf-template .card-total { background: #f0f0f0 !important; }
    </style>
</head>
<body>

<div class="main-container" id="printableArea">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black text-white">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-xs text-slate-400">LIVE INVENTORY PORTAL</p>
        </div>
        <div>
            <button onclick="downloadPDF()" class="bg-amber-600 text-white px-4 py-2 rounded text-xs font-bold uppercase">Download Colorful PDF</button>
        </div>
    </div>

    <div class="grid grid-cols-5 gap-4 mb-6 bg-[#161b22] p-4 rounded-lg">
        <input type="text" id="searchName" oninput="applyFilters()" placeholder="TYPE DESIGN..." class="bg-transparent border-b border-slate-600 text-xs text-white p-2 outline-none">
        <select id="filterBrand" onchange="applyFilters()" class="bg-transparent text-xs border-b border-slate-600 text-amber-500"><option value="">All Brands</option></select>
        <select id="filterSize" onchange="applyFilters()" class="bg-transparent text-xs border-b border-slate-600 text-amber-500"><option value="">All Sizes</option></select>
        <select id="filterSeries" onchange="applyFilters()" class="bg-transparent text-xs border-b border-slate-600 text-amber-500"><option value="">All Series</option></select>
        <select id="filterVariant" onchange="applyFilters()" class="bg-transparent text-xs border-b border-slate-600 text-amber-500"><option value="">All Variants</option></select>
    </div>

    <div id="reportList"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; // તમારું URL અહિયાં મૂકો
    let masterData = [];

    async function fetchData() {
        const res = await fetch(SCRIPT_URL);
        masterData = await res.json();
        
        // Populate Filters
        const brands = new Set(), sizes = new Set(), series = new Set(), variants = new Set();
        masterData.forEach(i => {
            if(i.Brand) brands.add(i.Brand);
            if(i.Size) sizes.add(i.Size);
            if(i.Series) series.add(i.Series);
            if(i.Variant || i.Grade) variants.add(i.Variant || i.Grade);
        });

        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">All</option>` + [...set].map(v => `<option value="${v}">${v}</option>`).join('');
        fill('filterBrand', brands); fill('filterSize', sizes); fill('filterSeries', series); fill('filterVariant', variants);
        
        applyFilters();
    }

    function applyFilters() {
        const search = document.getElementById('searchName').value.toLowerCase();
        const b = document.getElementById('filterBrand').value;
        const s = document.getElementById('filterSize').value;
        const sr = document.getElementById('filterSeries').value;
        const v = document.getElementById('filterVariant').value;

        const filtered = masterData.filter(i => {
            return (i["Item Description"].toLowerCase().includes(search)) &&
                   (b === "" || i.Brand === b) &&
                   (s === "" || i.Size === s) &&
                   (sr === "" || i.Series === sr) &&
                   (v === "" || (i.Variant || i.Grade) === v);
        });
        render(filtered);
    }

    function render(data) {
        document.getElementById('reportList').innerHTML = data.map(item => `
            <div class="stock-card">
                <div class="variant-badge">${item.Variant || item.Grade || 'STD'}</div>
                <div class="card-img"><img src="${item.ImgUrl || ''}"></div>
                <div class="card-info">
                    <div class="text-xs text-slate-500 font-bold">${item.Brand}</div>
                    <div class="text-xl font-black text-white">${item["Item Description"]}</div>
                    <div class="text-xs text-slate-400">${item.Series} | ${item.Size}</div>
                    <div class="mt-4 text-amber-500 font-bold text-sm">LOT: ${item["Lot No"]}</div>
                </div>
                <div class="card-total">
                    <div class="text-3xl font-black">${item.Total || 0}</div>
                    <div class="text-[9px] uppercase">Total Boxes</div>
                </div>
            </div>
        `).join('');
    }

    async function downloadPDF() {
        const element = document.getElementById('printableArea');
        element.classList.add('pdf-template');
        await html2pdf().set({
            margin: 10,
            filename: 'Stock_Report.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'portrait' }
        }).from(element).save();
        element.classList.remove('pdf-template');
    }

    fetchData();
</script>
</body>
</html>
