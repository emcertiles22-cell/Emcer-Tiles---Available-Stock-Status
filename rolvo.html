<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER LIVE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #d4af37; font-family: sans-serif; }
        .main-container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Premium Card Style */
        .stock-card { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; display: flex; margin-bottom: 20px; overflow: hidden; position: relative; }
        .card-img { width: 250px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .card-img img { max-height: 160px; object-fit: contain; }
        .card-info { flex: 1; padding: 20px; }
        .card-total { width: 180px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* PDF specific style to force visibility */
        .pdf-template { background: #ffffff !important; color: #000000 !important; }
        .pdf-template .stock-card { border: 1px solid #d4af37 !important; color: #000 !important; }
        .pdf-template .card-total { background: #f8f8f8 !important; }
        .pdf-template .text-white { color: #000 !important; }
        .pdf-template .text-slate-400 { color: #666 !important; }
    </style>
</head>
<body>

<div class="main-container" id="printableArea">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-black text-white">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-xs font-bold text-slate-400 uppercase">Live Inventory Portal | <span id="lastUpdated">Loading...</span></p>
        </div>
        <div class="flex gap-2">
            <button onclick="downloadPDF()" class="bg-amber-600 text-black px-6 py-2 rounded-lg font-black uppercase text-xs hover:bg-amber-500">Download Colorful PDF</button>
        </div>
    </div>

    <div class="grid grid-cols-5 gap-4 mb-8 bg-[#161b22] p-4 rounded-lg border border-[#30363d]">
        <input type="text" id="searchName" oninput="applyFilters()" placeholder="TYPE DESIGN..." class="bg-transparent border-b border-slate-600 text-white p-2 text-xs outline-none uppercase font-bold">
        <select id="filterBrand" onchange="applyFilters()" class="bg-transparent text-amber-500 border-b border-slate-600 p-2 text-xs uppercase font-bold"></select>
        <select id="filterSize" onchange="applyFilters()" class="bg-transparent text-amber-500 border-b border-slate-600 p-2 text-xs uppercase font-bold"></select>
        <select id="filterSeries" onchange="applyFilters()" class="bg-transparent text-amber-500 border-b border-slate-600 p-2 text-xs uppercase font-bold"></select>
        <select id="filterVariant" onchange="applyFilters()" class="bg-transparent text-amber-500 border-b border-slate-600 p-2 text-xs uppercase font-bold"></select>
    </div>

    <div id="reportList"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; // તમારું URL અહિયાં નાખો
    let masterData = [];

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL);
            masterData = await res.json();
            document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString();
            
            // Populate Filters
            const unique = (key) => [...new Set(masterData.map(i => i[key]).filter(Boolean))].sort();
            const fill = (id, data, label) => document.getElementById(id).innerHTML = `<option value="">ALL ${label}</option>` + data.map(v => `<option value="${v}">${v}</option>`).join('');
            
            fill('filterBrand', unique('Brand'), 'BRANDS');
            fill('filterSize', unique('Size'), 'SIZES');
            fill('filterSeries', unique('Series'), 'SERIES');
            // Variant માટે Grade કે Variant જે અવેલેબલ હોય
            fill('filterVariant', [...new Set(masterData.map(i => i.Variant || i.Grade || 'N/A'))].sort(), 'GRADES');
            
            applyFilters();
        } catch(e) { console.error(e); }
    }

    function applyFilters() {
        const s = document.getElementById('searchName').value.toLowerCase();
        const b = document.getElementById('filterBrand').value;
        const sz = document.getElementById('filterSize').value;
        const sr = document.getElementById('filterSeries').value;
        const v = document.getElementById('filterVariant').value;

        const filtered = masterData.filter(i => {
            return (i["Item Description"]?.toLowerCase().includes(s)) &&
                   (b === "" || i.Brand === b) &&
                   (sz === "" || i.Size === sz) &&
                   (sr === "" || i.Series === sr) &&
                   (v === "" || (i.Variant || i.Grade || 'N/A') === v);
        });
        render(filtered);
    }

    function render(data) {
        document.getElementById('reportList').innerHTML = data.map(i => `
            <div class="stock-card">
                <div class="absolute top-2 right-2 bg-amber-500 text-black px-3 py-1 text-[10px] font-black rounded-full uppercase">${i.Variant || i.Grade || 'STD'}</div>
                <div class="card-img"><img src="${i.ImgUrl || ''}" crossorigin="anonymous"></div>
                <div class="card-info">
                    <div class="text-[10px] text-slate-500 font-bold uppercase">${i.Brand}</div>
                    <div class="text-2xl font-black text-white uppercase">${i["Item Description"]}</div>
                    <div class="text-xs text-slate-400 font-bold uppercase mt-1">${i.Series} | ${i.Size}</div>
                    <div class="mt-4 text-amber-500 font-bold text-sm uppercase">LOT: ${i["Lot No"]}</div>
                </div>
                <div class="card-total">
                    <div class="text-4xl font-black text-amber-500">${i.Total || 0}</div>
                    <div class="text-[10px] uppercase font-bold text-slate-400">Total Boxes</div>
                </div>
            </div>
        `).join('');
    }

    async function downloadPDF() {
        const element = document.getElementById('printableArea');
        element.classList.add('pdf-template');
        
        const opt = {
            margin: 5,
            filename: 'Emcer_Stock_Report.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        await html2pdf().set(opt).from(element).save();
        element.classList.remove('pdf-template');
    }

    fetchData();
</script>
</body>
</html>
