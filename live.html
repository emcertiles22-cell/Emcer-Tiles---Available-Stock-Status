<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Elite Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .main-container { max-width: 1000px; margin: auto; padding: 20px; }
        .stat-card { background: white; border: 2px solid #000; padding: 12px; text-align: center; box-shadow: 4px 4px 0px #000; }
        .stock-card { background: white; border: 1.5px solid #000; display: flex; margin-bottom: 15px; min-height: 180px; break-inside: avoid; }
        .card-img { width: 20%; border-right: 1.5px solid #000; padding: 8px; display: flex; align-items: center; justify-content: center; }
        .card-info { width: 60%; padding: 15px; }
        .card-total { width: 20%; border-left: 1.5px solid #000; background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .no-print { display: block; }
        /* Hidden Print Header */
        #pdfHeaderTemplate { display: none; }
    </style>
</head>
<body>

<div id="pdfHeaderTemplate">
    <div style="border-bottom: 3px solid black; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1 style="font-size: 24px; font-weight: 900; text-transform: uppercase;">Emcer Tiles Private Limited</h1>
            <p style="font-size: 10px; font-weight: 700; color: #2563eb;">LIVE INVENTORY REPORT</p>
        </div>
        <div style="text-align: right;">
            <p style="font-size: 9px; font-weight: 800; color: #64748b;">DEV: YASHDEEP JIVANI</p>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="flex justify-between items-end mb-6 no-print">
        <div>
            <h1 class="text-3xl font-black uppercase">Emcer Tiles Private Limited</h1>
            <p class="text-xs font-bold text-blue-600">LIVE SYNC ACTIVE</p>
        </div>
        <div class="text-right">
            <button onclick="downloadStructuredPDF()" class="bg-red-600 text-white px-4 py-2 font-black text-[10px] uppercase shadow-lg">📥 Download PDF</button>
            <p class="text-[9px] font-black text-slate-400 mt-2 uppercase">Dev: Yashdeep Jivani</p>
        </div>
    </div>

    <div id="statsSection" class="grid grid-cols-4 gap-4 mb-6">
        <div class="stat-card"><div class="text-[9px] font-bold text-slate-400">DESIGNS</div><div id="stat-designs" class="text-xl font-black">0</div></div>
        <div class="stat-card"><div class="text-[9px] font-bold text-slate-400">BOXES</div><div id="stat-boxes" class="text-xl font-black">0</div></div>
        <div class="stat-card"><div class="text-[9px] font-bold text-slate-400">BRANDS</div><div id="stat-brands" class="text-xl font-black">0</div></div>
        <div class="stat-card"><div class="text-[9px] font-bold text-slate-400">RESULTS</div><div id="stat-results" class="text-xl font-black">0</div></div>
    </div>

    <div class="bg-white border-2 border-black p-4 grid grid-cols-4 gap-3 mb-6 no-print">
        <input type="text" id="sN" oninput="applyFilters()" placeholder="SEARCH..." class="border p-2 text-xs font-bold uppercase">
        <select id="fB" onchange="applyFilters()" class="border p-2 text-xs font-bold uppercase"></select>
        <select id="fS" onchange="applyFilters()" class="border p-2 text-xs font-bold uppercase"></select>
        <select id="fG" onchange="applyFilters()" class="border p-2 text-xs font-bold uppercase"></select>
    </div>

    <div id="reportArea"></div>
</div>

<script>
    let masterData = [], designMap = {};

    async function init() {
        const resI = await fetch('design.json?v=' + Date.now());
        if (resI.ok) (await resI.json()).forEach(d => { if(d.name) designMap[d.name.toLowerCase().trim()] = d.url; });
        const resS = await fetch('stock.json?v=' + Date.now());
        masterData = await resS.json();
        setupFilters(); applyFilters();
    }

    function setupFilters() {
        const b = new Set(), s = new Set(), g = new Set();
        masterData.forEach(i => { b.add(i.Brand); s.add(i.Size); g.add(i.Variant); });
        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">ALL</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('fB', b); fill('fS', s); fill('fG', g);
    }

    function applyFilters() {
        const nV = document.getElementById('sN').value.toLowerCase();
        const bV = document.getElementById('fB').value, sV = document.getElementById('fS').value, gV = document.getElementById('fG').value;
        const groups = {}; let tB = 0, uB = new Set();

        masterData.forEach(item => {
            const name = (item["Item Description"] || "").trim(), brand = (item.Brand || "").trim(), varnt = (item.Variant || "").trim(), size = (item.Size || "").trim(), qty = parseFloat(item.Total || 0);
            if (name.toLowerCase().includes(nV) && (!bV || brand===bV) && (!sV || size===sV) && (!gV || varnt===gV)) {
                const k = `${name}|${brand}|${size}|${varnt}`.toLowerCase();
                if (!groups[k]) groups[k] = { name, brand, size, varnt, lots: [], total: 0 };
                groups[k].lots.push({ lot: item["Lot No"], qty });
                groups[k].total += qty; tB += qty; uB.add(brand);
            }
        });

        const items = Object.values(groups);
        document.getElementById('stat-designs').innerText = items.length;
        document.getElementById('stat-boxes').innerText = tB.toLocaleString();
        document.getElementById('stat-brands').innerText = uBrands = uB.size;
        document.getElementById('stat-results').innerText = items.length;
        render(items);
    }

    function render(items) {
        document.getElementById('reportArea').innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/150';
            return `
            <div class="stock-card">
                <div class="card-img"><img src="${img}" crossorigin="anonymous" style="max-height:120px;"></div>
                <div class="card-info">
                    <div class="flex justify-between text-[8px] font-black uppercase text-blue-600"><span>${item.brand}</span><span>${item.varnt}</span></div>
                    <div class="text-lg font-black uppercase leading-tight">${item.name}</div>
                    <div class="text-[9px] font-bold text-slate-400 border-b mb-2">${item.size}</div>
                    ${item.lots.map(l => `<div class="flex justify-between text-[10px] border-b border-dotted py-0.5"><b>LOT: ${l.lot}</b><span>${l.qty} Bx</span></div>`).join('')}
                </div>
                <div class="card-total"><div class="text-3xl font-black">${item.total}</div><div class="text-[8px] font-bold uppercase">Boxes</div></div>
            </div>`;
        }).join('');
    }

    async function downloadStructuredPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const cards = document.querySelectorAll('.stock-card');
        const headerHtml = document.getElementById('pdfHeaderTemplate').innerHTML;
        const statsHtml = document.getElementById('statsSection').outerHTML;
        
        let yOffset = 15;
        const pageHeight = 280;

        // Create a temporary container for rendering
        const temp = document.createElement('div');
        temp.style.width = '800px'; 
        temp.style.padding = '20px';
        temp.style.background = '#f1f5f9';
        document.body.appendChild(temp);

        // Function to add Header and Stats on each page
        const addPageHeader = async (isFirstPage) => {
            temp.innerHTML = headerHtml + (isFirstPage ? statsHtml : "");
            const canvas = await html2canvas(temp, { scale: 2, useCORS: true });
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const h = (canvas.height * 190) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 10, 10, 190, h);
            return h + 15;
        };

        yOffset = await addPageHeader(true);

        for (let i = 0; i < cards.length; i++) {
            temp.innerHTML = cards[i].outerHTML;
            const canvas = await html2canvas(temp, { scale: 2, useCORS: true });
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const h = (canvas.height * 190) / canvas.width;

            if (yOffset + h > pageHeight) {
                pdf.addPage();
                yOffset = await addPageHeader(false);
            }

            pdf.addImage(imgData, 'JPEG', 10, yOffset, 190, h);
            yOffset += h + 5;
        }

        document.body.removeChild(temp);
        pdf.save("Emcer_Live_Stock.pdf");
    }

    init();
</script>
</body>
</html>
