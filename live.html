<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Professional Live Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #000; }
        .main-container { max-width: 1150px; margin: auto; padding: 20px; }
        .header-line { height: 4px; background: #000; margin: 15px 0; }
        
        /* Glassmorphism Filters */
        .filter-box { background: #fff; border: 2px solid #000; padding: 25px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; box-shadow: 10px 10px 0px #000; }
        label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        select, input { width: 100%; border: 1px solid #000; padding: 12px; font-weight: 700; font-size: 14px; text-transform: uppercase; outline: none; transition: 0.2s; }
        select:focus, input:focus { background: #000; color: #fff; }

        /* Premium Stock Cards */
        .stock-card { background: white; border: 2px solid #000; display: flex; margin-bottom: 20px; min-height: 200px; position: relative; transition: 0.3s; }
        .stock-card:hover { transform: scale(1.01); }
        .variant-tag { position: absolute; top: 0; right: 20%; background: #000; color: #fff; padding: 5px 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 10; }
        
        .card-img { width: 25%; border-right: 2px solid #000; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .card-img img { max-height: 180px; width: auto; max-width: 100%; object-fit: contain; }
        
        .card-info { width: 55%; padding: 25px; display: flex; flex-direction: column; }
        .design-name { font-size: 26px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .design-meta { color: #2563eb; font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        
        .lot-row { display: flex; justify-content: space-between; border-bottom: 1px solid #e2e8f0; padding: 8px 0; font-size: 15px; font-weight: 700; }
        
        .card-total { width: 20%; border-left: 2px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; }
        .total-val { font-size: 50px; font-weight: 900; line-height: 1; color: #000; }

        /* Full Screen Modal */
        #imgModal { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg" style="max-height:90%; max-width:90%; border:5px solid white;"></div>

<div class="main-container">
    <div class="flex justify-between items-end pt-4">
        <div>
            <h1 class="text-4xl font-black text-slate-900 leading-none">EMCER TILES PRIVATE LIMITED</h1>
            <p id="sync-status" class="text-[11px] text-green-600 font-bold uppercase tracking-widest mt-2 underline">● Live Inventory Connected</p>
        </div>
        <div class="text-right space-y-2">
            <button onclick="downloadPDF()" class="no-print bg-blue-600 text-white px-6 py-2 text-[12px] font-black uppercase hover:bg-blue-700 shadow-lg">📥 Download PDF Report</button>
            <div class="text-[11px] font-black text-slate-400">DEV: YASHDEEP JIVANI</div>
        </div>
    </div>
    <div class="header-line"></div>

    <div class="filter-box no-print">
        <div><label>Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Enter name..."></div>
        <div><label>Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"><option value="">All Sizes</option></select></div>
        <div><label>Series</label><select id="filterSeries" onchange="applyFilters()"><option value="">All Series</option></select></div>
        <div><label>Variant</label><select id="filterVariant" onchange="applyFilters()"><option value="">All Variants</option></select></div>
    </div>

    <div id="reportList" class="pb-10"></div>
</div>

<script>
    // --- TAMARI APPS SCRIPT URL AHIYA NAKHO ---
    const SCRIPT_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';
    
    let masterData = [];
    let designMap = {};

    async function init() {
        try {
            const resImg = await fetch('design.json?v=' + Date.now());
            if (resImg.ok) {
                const designs = await resImg.json();
                designs.forEach(d => { if(d.name) designMap[d.name.toLowerCase().trim()] = d.url; });
            }
            fetchLiveStock();
        } catch (e) { console.error(e); }
    }

    async function fetchLiveStock() {
        try {
            const response = await fetch(SCRIPT_URL);
            masterData = await response.json();
            setupFilters();
            applyFilters();
        } catch (err) { console.error(err); }
    }

    function openModal(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('imgModal').style.display = 'flex';
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const btn = document.querySelector('button');
        btn.innerText = "Generating PDF...";
        
        const element = document.getElementById('reportList');
        const canvas = await html2canvas(element, { scale: 2, useCORS: true });
        const imgData = canvas.toDataURL('image/png');
        
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        
        pdf.text("EMCER TILES - STOCK REPORT", 10, 10);
        pdf.addImage(imgData, 'PNG', 0, 15, pdfWidth, pdfHeight);
        pdf.save(`Stock_Report_${new Date().toLocaleDateString()}.pdf`);
        btn.innerText = "📥 Download PDF Report";
    }

    function setupFilters() {
        const sizes = new Set(), variants = new Set();
        masterData.forEach(item => {
            if (item["Size"]) sizes.add(item["Size"].toString().trim());
            if (item["Variant"]) variants.add(item["Variant"].toString().trim());
        });
        const sSel = document.getElementById('filterSize'), vSel = document.getElementById('filterVariant');
        const oldS = sSel.value, oldV = vSel.value;
        sSel.innerHTML = '<option value="">All Sizes</option>';
        [...sizes].sort().forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
        vSel.innerHTML = '<option value="">All Variants</option>';
        [...variants].sort().forEach(v => vSel.innerHTML += `<option value="${v}">${v}</option>`);
        sSel.value = oldS; vSel.value = oldV;
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const selectedSize = document.getElementById('filterSize').value;
        const seriesSet = new Set();
        masterData.forEach(item => {
            if (selectedSize === "" || item["Size"].toString().trim() === selectedSize) {
                if (item["Series"]) seriesSet.add(item["Series"].toString().trim());
            }
        });
        const srSel = document.getElementById('filterSeries');
        const oldSr = srSel.value;
        srSel.innerHTML = '<option value="">All Series</option>';
        [...seriesSet].sort().forEach(sr => srSel.innerHTML += `<option value="${sr}">${sr}</option>`);
        srSel.value = oldSr;
    }

    function applyFilters() {
        const nameVal = document.getElementById('searchName').value.toLowerCase();
        const sizeVal = document.getElementById('filterSize').value;
        const seriesVal = document.getElementById('filterSeries').value;
        const variantVal = document.getElementById('filterVariant').value;
        const groups = {};

        masterData.forEach(item => {
            const name = (item["Item Description"] || "N/A").toString().trim();
            const series = (item["Series"] || "N/A").toString().trim();
            const size = (item["Size"] || "N/A").toString().trim();
            const variant = (item["Variant"] || "N/A").toString().trim();
            const qty = parseFloat(item["Total"] || 0);
            const lot = (item["Lot No"] || "N/A").toString().trim();

            if (name.toLowerCase().includes(nameVal) &&
                (sizeVal === "" || size === sizeVal) &&
                (seriesVal === "" || series === seriesVal) &&
                (variantVal === "" || variant === variantVal)) {
                const key = `${name}|${series}|${size}|${variant}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, series, size, variant, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty;
            }
        });
        render(Object.values(groups));
    }

    function render(items) {
        const area = document.getElementById('reportList');
        if (items.length === 0) { area.innerHTML = "<div class='py-20 text-center font-bold'>NO DATA</div>"; return; }
        area.innerHTML = items.map(item => {
            const imgUrl = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x600?text=No+Photo';
            return `
            <div class="stock-card shadow-sm">
                <div class="variant-tag">${item.variant}</div>
                <div class="card-img" onclick="openModal('${imgUrl}')"><img src="${imgUrl}" crossorigin="anonymous"></div>
                <div class="card-info">
                    <div class="design-name">${item.name}</div>
                    <div class="design-meta">${item.series} | ${item.size}</div>
                    <div class="flex-grow">
                        ${item.lots.map(l => `<div class="lot-row"><span>LOT: ${l.lot}</span><span>${l.qty} Bx</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="text-[10px] font-black text-slate-400 uppercase">Available</div>
                    <div class="total-val">${item.total}</div>
                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    setInterval(fetchLiveStock, 60000);
    init();
</script>
</body>
</html>
