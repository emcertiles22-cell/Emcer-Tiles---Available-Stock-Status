<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Emcer Premium Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #000; }
        .main-container { max-width: 1200px; margin: auto; padding: 20px; }
        .stat-card { background: white; border: 3px solid #000; padding: 15px; text-align: center; box-shadow: 6px 6px 0px #000; }
        .stock-card { background: white; border: 2px solid #000; display: flex; margin-bottom: 20px; min-height: 220px; box-shadow: 4px 4px 0px rgba(0,0,0,0.05); }
        .card-img { width: 25%; border-right: 2px solid #000; padding: 12px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .card-info { width: 55%; padding: 20px; }
        .card-total { width: 20%; border-left: 2px solid #000; background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dev-tag { font-weight: 900; color: #2563eb; text-transform: uppercase; border: 1px solid #2563eb; padding: 2px 6px; border-radius: 4px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter uppercase leading-none">Emcer Tiles Private Limited</h1>
            <p id="updateTime" class="text-[10px] font-black text-blue-600 uppercase mt-2">Live Inventory Portal</p>
        </div>
        <div class="text-right no-print">
            <button onclick="downloadModernPDF()" class="bg-red-600 text-white px-5 py-2 font-black text-[11px] uppercase shadow-lg hover:bg-red-700 transition mb-2">📥 Download PDF Report</button>
            <div class="text-[10px] font-black text-slate-500">DEVELOPER: <span class="dev-tag">Yashdeep Jivani</span></div>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print">
        <div class="stat-card"><div class="text-[10px] font-black uppercase text-slate-400">Designs</div><div id="stat-designs" class="text-3xl font-black">0</div></div>
        <div class="stat-card"><div class="text-[10px] font-black uppercase text-slate-400">Total Boxes</div><div id="stat-boxes" class="text-3xl font-black">0</div></div>
        <div class="stat-card"><div class="text-[10px] font-black uppercase text-slate-400">Brands</div><div id="stat-brands" class="text-3xl font-black">0</div></div>
        <div class="stat-card"><div class="text-[10px] font-black uppercase text-slate-400">Filtered</div><div id="stat-results" class="text-3xl font-black">0</div></div>
    </div>

    <div class="bg-white border-[3px] border-black p-6 grid grid-cols-1 md:grid-cols-4 gap-4 no-print mb-8">
        <div><label class="text-[10px] font-black uppercase">Search Design</label><input type="text" id="searchName" oninput="applyFilters()" class="w-full border-2 p-2 font-bold outline-none focus:border-black"></div>
        <div><label class="text-[10px] font-black uppercase">Brand</label><select id="filterBrand" onchange="applyFilters()" class="w-full border-2 p-2 font-bold"></select></div>
        <div><label class="text-[10px] font-black uppercase">Size</label><select id="filterSize" onchange="applyFilters()" class="w-full border-2 p-2 font-bold"></select></div>
        <div><label class="text-[10px] font-black uppercase">Grade (Variant)</label><select id="filterGrade" onchange="applyFilters()" class="w-full border-2 p-2 font-bold"></select></div>
    </div>

    <div id="reportArea" class="space-y-6"></div>
</div>

<script>
    let masterData = [], designMap = {};

    async function init() {
        const resImg = await fetch('design.json?v=' + Date.now());
        if (resImg.ok) {
            const designs = await resImg.json();
            designs.forEach(d => { if(d.name) designMap[d.name.toLowerCase().trim()] = d.url; });
        }
        fetchStock();
    }

    async function fetchStock() {
        const res = await fetch('stock.json?v=' + Date.now());
        masterData = await res.json();
        document.getElementById('updateTime').innerText = "UPDATED: " + new Date().toLocaleString();
        setupFilters();
        applyFilters();
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), grades = new Set();
        masterData.forEach(i => {
            if(i.Brand) brands.add(i.Brand.trim());
            if(i.Size) sizes.add(i.Size.trim());
            if(i.Variant) grades.add(i.Variant.trim());
        });
        const fill = (id, set, label) => {
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('filterBrand', brands, 'Brands');
        fill('filterSize', sizes, 'Sizes');
        fill('filterGrade', grades, 'Grades');
    }

    function applyFilters() {
        const n = document.getElementById('searchName').value.toLowerCase();
        const b = document.getElementById('filterBrand').value;
        const s = document.getElementById('filterSize').value;
        const g = document.getElementById('filterGrade').value;

        const groups = {};
        let totalQty = 0;
        const uniqueBrands = new Set();

        masterData.forEach(item => {
            const name = (item["Item Description"] || "").trim();
            const brand = (item.Brand || "").trim();
            const variant = (item.Variant || "").trim();
            const size = (item.Size || "").trim();
            const qty = parseFloat(item["Total"] || item["Net Qty"] || 0);

            if (name.toLowerCase().includes(n) && (b==="" || brand===b) && (s==="" || size===s) && (g==="" || variant===g)) {
                const key = `${name}|${brand}|${size}|${variant}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand, size, variant, lots: [], total: 0 };
                groups[key].lots.push({ lot: item["Lot No"] || item["Lot no."], qty });
                groups[key].total += qty;
                totalQty += qty;
                uniqueBrands.add(brand);
            }
        });

        const items = Object.values(groups);
        document.getElementById('stat-designs').innerText = items.length;
        document.getElementById('stat-boxes').innerText = totalQty.toLocaleString();
        document.getElementById('stat-brands').innerText = uniqueBrands.size;
        document.getElementById('stat-results').innerText = items.length;

        render(items);
    }

    function render(items) {
        document.getElementById('reportArea').innerHTML = items.map(item => {
            const imgUrl = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x600?text=No+Photo';
            return `
            <div class="stock-card">
                <div class="card-img"><img src="${imgUrl}" crossorigin="anonymous" class="max-h-44"></div>
                <div class="card-info">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-bold text-blue-600 uppercase">${item.brand}</span>
                        <span class="bg-black text-white px-2 py-0.5 text-[10px] font-bold uppercase">${item.variant}</span>
                    </div>
                    <div class="text-2xl font-black uppercase mb-1">${item.name}</div>
                    <div class="text-[11px] font-bold text-slate-400 mb-4 border-b pb-2 uppercase">${item.size}</div>
                    <div class="space-y-1">
                        ${item.lots.map(l => `<div class="flex justify-between text-xs border-b border-dashed py-1"><b>LOT: ${l.lot}</b><span>${l.qty} Bx</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="text-4xl font-black">${item.total}</div>
                    <div class="text-[10px] font-black text-slate-400 uppercase">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    // --- High Quality PDF Logic with CORS bypass ---
    async function downloadModernPDF() {
        const { jsPDF } = window.jspdf;
        const btn = document.querySelector('button[onclick="downloadModernPDF()"]');
        btn.innerText = "Generating PDF...";
        
        const area = document.getElementById('reportArea');
        
        try {
            const canvas = await html2canvas(area, {
                scale: 2,
                useCORS: true,
                allowTaint: false,
                backgroundColor: "#f1f5f9"
            });
            
            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const imgHeight = (canvas.height * pageWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;

            pdf.addImage(imgData, 'JPEG', 0, position, pageWidth, imgHeight);
            heightLeft -= pageHeight;

            while (heightLeft >= 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, position, pageWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            
            pdf.save(`Emcer_LiveStock_${new Date().getTime()}.pdf`);
        } catch (e) {
            console.error(e);
            alert("PDF generating error. Check image links.");
        } finally {
            btn.innerText = "📥 Download PDF Report";
        }
    }

    init();
</script>
</body>
</html>
