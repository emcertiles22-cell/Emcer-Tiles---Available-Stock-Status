<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Elite Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        /* Professional PDF Page Style */
        .pdf-page { width: 210mm; padding: 20mm; margin: auto; background: white; border: 1px solid #e2e8f0; }
        .stock-card { 
            display: flex; border: 1px solid #000; margin-bottom: 15px; 
            min-height: 160px; break-inside: avoid; background: white;
            transition: all 0.2s ease;
        }
        .card-img { width: 25%; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; padding: 10px; background: #fff; }
        .card-info { width: 55%; padding: 20px; }
        .card-qty { width: 20%; border-left: 1px solid #000; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .no-print { display: block; }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto p-6 no-print">
    <div class="flex justify-between items-center bg-white border-b-4 border-black p-8 mb-6 shadow-sm">
        <div>
            <h1 class="text-4xl font-black uppercase tracking-tight">Emcer Tiles Private Limited</h1>
            <p id="syncStatus" class="text-xs font-bold text-orange-500 mt-1 italic tracking-widest">CONNECTING TO LIVE SERVER...</p>
        </div>
        <div class="flex gap-4">
             <button onclick="generateElitePDF()" class="bg-black text-white px-8 py-4 font-black rounded-sm hover:bg-zinc-800 transition shadow-xl">EXPORT ELITE PDF</button>
        </div>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-10 p-6 bg-white border border-slate-200 shadow-sm">
        <input type="text" id="sN" oninput="applyFilters()" placeholder="🔍 SEARCH DESIGN..." class="border-b-2 border-slate-300 p-2 font-bold focus:border-black outline-none bg-transparent">
        <select id="fB" onchange="applyFilters()" class="border-b-2 border-slate-300 p-2 font-bold outline-none"></select>
        <select id="fS" onchange="applyFilters()" class="border-b-2 border-slate-300 p-2 font-bold outline-none"></select>
        <select id="fG" onchange="applyFilters()" class="border-b-2 border-slate-300 p-2 font-bold outline-none"></select>
    </div>
</div>

<div id="pdfContent" class="pdf-page">
    <div id="pdfHeader" class="flex justify-between items-end border-b-2 border-black pb-4 mb-8">
        <div>
            <h2 class="text-3xl font-black uppercase leading-none">Emcer Tiles</h2>
            <p class="text-[10px] font-bold text-blue-600 mt-2 tracking-widest uppercase">Live Inventory Status Report</p>
        </div>
        <div class="text-right">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">System Developer</p>
            <p class="text-sm font-black text-black uppercase">Yashdeep Jivani</p>
        </div>
    </div>

    <div id="statsBox" class="grid grid-cols-4 gap-6 mb-10">
        <div class="border-l-4 border-black pl-4 py-2 bg-slate-50"><p class="text-[9px] font-bold text-slate-400 uppercase">Designs</p><p id="st-d" class="text-2xl font-black">0</p></div>
        <div class="border-l-4 border-black pl-4 py-2 bg-slate-50"><p class="text-[9px] font-bold text-slate-400 uppercase">Total Boxes</p><p id="st-b" class="text-2xl font-black">0</p></div>
        <div class="border-l-4 border-black pl-4 py-2 bg-slate-50"><p class="text-[9px] font-bold text-slate-400 uppercase">Active Brands</p><p id="st-br" class="text-2xl font-black">0</p></div>
        <div class="border-l-4 border-black pl-4 py-2 bg-black text-white"><p class="text-[9px] font-bold text-slate-400 uppercase">Found</p><p id="st-f" class="text-2xl font-black">0</p></div>
    </div>

    <div id="reportList" class="space-y-4"></div>
</div>

<script>
    let masterData = [], designMap = {};

    // Critical Fix: Data Loading with CORS handling
    async function loadData() {
        try {
            const time = Date.now();
            // Fetch design mapping
            const resD = await fetch(`design.json?v=${time}`, { mode: 'cors' });
            if (resD.ok) (await resD.json()).forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            
            // Fetch stock data
            const resS = await fetch(`stock.json?v=${time}`, { mode: 'cors' });
            masterData = await resS.json();
            
            document.getElementById('syncStatus').innerText = "✅ LIVE DATA CONNECTED";
            document.getElementById('syncStatus').className = "text-xs font-bold text-green-600 mt-1 italic tracking-widest";
            
            setupFilters();
            applyFilters();
        } catch (e) {
            document.getElementById('syncStatus').innerText = "❌ DATA SYNC ERROR - CHECK REPO SETTINGS";
            console.error("Data Load Error:", e);
        }
    }

    function setupFilters() {
        const b = new Set(), s = new Set(), g = new Set();
        masterData.forEach(i => { if(i.Brand) b.add(i.Brand); if(i.Size) s.add(i.Size); if(i.Variant) g.add(i.Variant); });
        const fill = (id, set, label) => document.getElementById(id).innerHTML = `<option value="">ALL ${label}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('fB', b, 'BRANDS'); fill('fS', s, 'SIZES'); fill('fG', g, 'VARIANTS');
    }

    function applyFilters() {
        const nV = document.getElementById('sN').value.toLowerCase();
        const bV = document.getElementById('fB').value, sV = document.getElementById('fS').value, gV = document.getElementById('fG').value;
        const groups = {}; let tB = 0, uB = new Set();

        masterData.forEach(item => {
            const name = (item["Item Description"] || item["Name"] || "").trim();
            const brand = (item.Brand || "").trim();
            const variant = (item.Variant || "").trim();
            const size = (item.Size || "").trim();
            const lot = (item["Lot No"] || item["Batch"] || "N/A").trim();
            const qty = parseFloat(item.Total || item["Stock"] || 0);

            if (name.toLowerCase().includes(nV) && (!bV || brand===bV) && (!sV || size===sV) && (!gV || variant===gV)) {
                const key = `${name}|${brand}|${size}|${variant}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand, size, variant, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty; tB += qty; uB.add(brand);
            }
        });

        const items = Object.values(groups);
        document.getElementById('st-d').innerText = items.length;
        document.getElementById('st-b').innerText = Math.round(tB).toLocaleString();
        document.getElementById('st-br').innerText = uB.size;
        document.getElementById('st-f').innerText = items.length;
        renderItems(items);
    }

    function renderItems(items) {
        document.getElementById('reportList').innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x300?text=NO+IMAGE';
            return `
            <div class="stock-card">
                <div class="card-img"><img src="${img}" crossorigin="anonymous" class="max-h-32 object-contain"></div>
                <div class="card-info">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black bg-blue-600 text-white px-2 py-0.5 rounded-sm uppercase tracking-widest">${item.brand}</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase italic">${item.variant}</span>
                    </div>
                    <h3 class="text-2xl font-black uppercase text-slate-900 leading-none mb-1">${item.name}</h3>
                    <p class="text-[11px] font-bold text-slate-500 border-b border-slate-100 pb-2 mb-3 tracking-wider">${item.size}</p>
                    <div class="space-y-1">
                        ${item.lots.map(l => `<div class="flex justify-between text-[11px] font-semibold border-b border-dotted border-slate-200 py-1"><span>LOT: ${l.lot}</span><span class="text-black font-black">${l.qty} BX</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-qty">
                    <p class="text-[9px] font-bold uppercase text-slate-400 mb-1 tracking-tighter">Total Stock</p>
                    <p class="text-4xl font-black text-black">${Math.round(item.total)}</p>
                    <p class="text-[8px] font-bold uppercase text-blue-600">Boxes</p>
                </div>
            </div>`;
        }).join('');
    }

    // High-Resolution PDF Engine
    async function generateElitePDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const cards = document.getElementById('reportList').children;
        const header = document.getElementById('pdfHeader').outerHTML;
        const stats = document.getElementById('statsBox').outerHTML;
        
        const temp = document.createElement('div');
        temp.className = 'pdf-page';
        document.body.appendChild(temp);

        const capture = async (html) => {
            temp.innerHTML = html;
            const canvas = await html2canvas(temp, { scale: 2, useCORS: true, logging: false });
            return { img: canvas.toDataURL('image/jpeg', 0.9), h: (canvas.height * 170) / canvas.width };
        };

        let y = 15;
        const firstHeader = await capture(header + stats);
        pdf.addImage(firstHeader.img, 'JPEG', 20, y, 170, firstHeader.h);
        y += firstHeader.h + 8;

        for (let i = 0; i < cards.length; i++) {
            const card = await capture(cards[i].outerHTML);
            if (y + card.h > 275) {
                pdf.addPage();
                y = 15;
                const h = await capture(header);
                pdf.addImage(h.img, 'JPEG', 20, y, 170, h.h);
                y += h.h + 8;
            }
            pdf.addImage(card.img, 'JPEG', 20, y, 170, card.h);
            y += card.h + 4;
        }

        document.body.removeChild(temp);
        pdf.save("Emcer_Elite_Inventory.pdf");
    }

    loadData();
</script>
</body>
</html>
