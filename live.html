<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Real Time Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #000; }
        .main-container { max-width: 1100px; margin: auto; padding: 20px; }
        .header-line { height: 5px; background: #000; margin: 15px 0; }
        
        /* Filter Box */
        .filter-box { background: white; border: 2px solid #000; padding: 20px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; box-shadow: 8px 8px 0px rgba(0,0,0,0.05); }
        label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-bottom: 5px; display: block; }
        select, input { width: 100%; border: 1px solid #e2e8f0; padding: 10px; font-weight: 700; font-size: 13px; text-transform: uppercase; outline: none; }
        select:focus, input:focus { border-color: #000; background: #f1f5f9; }

        /* Stock Cards */
        .stock-card { background: white; border: 2px solid #000; display: flex; margin-bottom: 20px; min-height: 180px; position: relative; overflow: hidden; }
        .variant-badge { position: absolute; top: 0; right: 20%; background: #000; color: #fff; padding: 4px 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 10; }
        
        .card-img { width: 25%; border-right: 2px solid #000; padding: 10px; display: flex; align-items: center; justify-content: center; }
        .card-img img { max-height: 150px; width: auto; max-width: 100%; object-fit: contain; }
        
        .card-info { width: 55%; padding: 20px; display: flex; flex-direction: column; }
        .design-name { font-size: 24px; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 5px; }
        .design-meta { color: #2563eb; font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
        
        .lot-row { display: flex; justify-content: space-between; border-bottom: 1px dotted #cbd5e1; padding: 6px 0; font-size: 14px; font-weight: 700; }
        
        .card-total { width: 20%; border-left: 2px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; }
        .total-val { font-size: 45px; font-weight: 900; line-height: 1; color: #000; }
        .total-unit { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        @media (max-width: 768px) {
            .stock-card { flex-direction: column; }
            .card-img, .card-info, .card-total { width: 100%; border: none; border-bottom: 2px solid #000; }
            .variant-badge { right: 0; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="flex justify-between items-end pt-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 leading-none">EMCER TILES PRIVATE LIMITED</h1>
            <p id="sync-status" class="text-[11px] text-red-600 font-bold uppercase tracking-widest mt-2 underline italic">Syncing with Google Sheets...</p>
        </div>
        <div class="text-right">
            <div class="text-[10px] font-black text-blue-600 uppercase">System: Live Inventory</div>
            <div class="text-[10px] font-black text-slate-400 mt-1">Dev: Yashdeep Jivani</div>
        </div>
    </div>
    <div class="header-line"></div>

    <div class="filter-box">
        <div>
            <label>Search Design</label>
            <input type="text" id="searchName" oninput="applyFilters()" placeholder="Enter name...">
        </div>
        <div>
            <label>Size</label>
            <select id="filterSize" onchange="updateSeriesOptions(); applyFilters();">
                <option value="">All Sizes</option>
            </select>
        </div>
        <div>
            <label>Series</label>
            <select id="filterSeries" onchange="applyFilters()">
                <option value="">All Series</option>
            </select>
        </div>
        <div>
            <label>Variant</label>
            <select id="filterVariant" onchange="applyFilters()">
                <option value="">All Variants</option>
            </select>
        </div>
    </div>

    <div id="reportList">
        <div class="py-20 text-center text-slate-400 font-bold uppercase tracking-widest">
            Loading Real-Time Stock...
        </div>
    </div>
</div>

<script>
    // ⚠️ અહીં તમારી Apps Script ની Web App URL નાખો ⚠️
    const SCRIPT_URL = 'તમારી_APPS_SCRIPT_URL_અહીં_પેસ્ટ_કરો';
    
    let masterData = [];
    let designMap = {};

    async function init() {
        try {
            // 1. Load Design Images from GitHub
            const resImg = await fetch('design.json?v=' + Date.now());
            if (resImg.ok) {
                const designs = await resImg.json();
                designs.forEach(d => { 
                    if(d.name) designMap[d.name.toLowerCase().trim()] = d.url; 
                });
            }
            // 2. Fetch Live Data from Google Sheets via Apps Script
            fetchLiveStock();
        } catch (e) { console.error(e); }
    }

    async function fetchLiveStock() {
        const status = document.getElementById('sync-status');
        try {
            const response = await fetch(SCRIPT_URL);
            masterData = await response.json();
            
            setupFilters();
            applyFilters();

            status.innerText = "● LIVE SYNC ACTIVE: " + new Date().toLocaleTimeString();
            status.className = "text-[11px] text-green-600 font-bold uppercase tracking-widest mt-2 italic";
        } catch (err) {
            status.innerText = "CONNECTION ERROR - REFRESH AGAIN";
        }
    }

    function setupFilters() {
        const sizes = new Set();
        const variants = new Set();
        masterData.forEach(item => {
            if (item["Size"]) sizes.add(item["Size"].toString().trim());
            if (item["Variant"]) variants.add(item["Variant"].toString().trim());
        });

        const sSel = document.getElementById('filterSize');
        const vSel = document.getElementById('filterVariant');
        
        const oldSize = sSel.value;
        const oldVariant = vSel.value;

        sSel.innerHTML = '<option value="">All Sizes</option>';
        [...sizes].sort().forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
        sSel.value = oldSize;

        vSel.innerHTML = '<option value="">All Variants</option>';
        [...variants].sort().forEach(v => vSel.innerHTML += `<option value="${v}">${v}</option>`);
        vSel.value = oldVariant;

        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const selectedSize = document.getElementById('filterSize').value;
        const seriesSet = new Set();
        masterData.forEach(item => {
            if (selectedSize === "" || item["Size"].toString().trim() === selectedSize) {
                if (item["Series"]) seriesSet.add(item["Series"].toString().trim());
            }
        });
        const srSel = document.getElementById('filterSeries');
        const oldSeries = srSel.value;
        srSel.innerHTML = '<option value="">All Series</option>';
        [...seriesSet].sort().forEach(sr => srSel.innerHTML += `<option value="${sr}">${sr}</option>`);
        srSel.value = oldSeries;
    }

    function applyFilters() {
        const nameVal = document.getElementById('searchName').value.toLowerCase();
        const sizeVal = document.getElementById('filterSize').value;
        const seriesVal = document.getElementById('filterSeries').value;
        const variantVal = document.getElementById('filterVariant').value;

        const groups = {};
        masterData.forEach(item => {
            const name = (item["Item Description"] || "N/A").toString().trim();
            const series = (item["Series"] || "N/A").toString().trim();
            const size = (item["Size"] || "N/A").toString().trim();
            const variant = (item["Variant"] || "N/A").toString().trim();
            const qty = parseFloat(item["Total"] || 0);
            const lot = (item["Lot No"] || "N/A").toString().trim();

            if (name.toLowerCase().includes(nameVal) &&
                (sizeVal === "" || size === sizeVal) &&
                (seriesVal === "" || series === seriesVal) &&
                (variantVal === "" || variant === variantVal)) {
                
                const key = `${name}|${series}|${size}|${variant}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, series, size, variant, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty;
            }
        });
        render(Object.values(groups));
    }

    function render(items) {
        const area = document.getElementById('reportList');
        if (items.length === 0) {
            area.innerHTML = "<div class='py-20 text-center text-slate-300 font-bold'>STOCK NOT FOUND</div>";
            return;
        }

        area.innerHTML = items.map(item => {
            const imgUrl = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x600?text=No+Photo';
            return `
            <div class="stock-card shadow-sm">
                <div class="variant-badge">${item.variant}</div>
                <div class="card-img"><img src="${imgUrl}"></div>
                <div class="card-info">
                    <div class="design-name">${item.name}</div>
                    <div class="design-meta">${item.series} | ${item.size}</div>
                    <div class="flex-grow">
                        ${item.lots.map(l => `<div class="lot-row"><span>LOT: ${l.lot}</span><span>${l.qty} Bx</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="total-unit">Live Stock</div>
                    <div class="total-val">${item.total}</div>
                    <div class="total-unit">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    // ઓટોમેટિક રિફ્રેશ દર 1 મિનિટે (60000ms)
    setInterval(fetchLiveStock, 60000);
    init();
</script>
</body>
</html>
