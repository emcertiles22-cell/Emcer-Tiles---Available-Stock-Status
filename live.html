<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Elite Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .pdf-page { width: 210mm; padding: 15mm; margin: auto; background: white; }
        .stock-card { 
            display: flex; border: 1.5px solid #000; margin-bottom: 15px; 
            min-height: 170px; break-inside: avoid; background: white;
            box-shadow: 5px 5px 0px #e2e8f0;
        }
        .card-img { width: 25%; border-right: 1.5px solid #000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .card-info { width: 55%; padding: 15px; position: relative; }
        .card-qty { width: 20%; border-left: 1.5px solid #000; background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .no-print { display: block; }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto p-6 no-print">
    <div class="flex justify-between items-center bg-white border-2 border-black p-6 mb-6 shadow-[8px_8px_0px_rgba(0,0,0,1)]">
        <div>
            <h1 class="text-3xl font-extrabold uppercase tracking-tighter">Emcer Tiles Private Limited</h1>
            <p id="status" class="text-xs font-bold text-orange-500">⏳ LOADING DATA...</p>
        </div>
        <button onclick="generateUltraPDF()" class="bg-black text-white px-10 py-4 font-black hover:scale-105 transition-transform shadow-lg">EXPORT PREMIUM PDF</button>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-8 bg-white p-4 border-2 border-black">
        <input type="text" id="sN" oninput="applyFilters()" placeholder="SEARCH DESIGN..." class="border-2 border-black p-3 font-bold uppercase outline-none">
        <select id="fB" onchange="applyFilters()" class="border-2 border-black p-3 font-bold outline-none"></select>
        <select id="fS" onchange="applyFilters()" class="border-2 border-black p-3 font-bold outline-none"></select>
        <select id="fG" onchange="applyFilters()" class="border-2 border-black p-3 font-bold outline-none"></select>
    </div>
</div>

<div id="pdfContent" class="pdf-page">
    <div id="pdfHeader" class="flex justify-between items-start border-b-4 border-black pb-4 mb-6">
        <div>
            <h1 class="text-4xl font-[900] uppercase leading-none">Emcer Tiles</h1>
            <p class="text-[10px] font-bold text-blue-600 tracking-widest mt-2 uppercase">Official Stock Status Report</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold text-slate-400 uppercase">System Developer</p>
            <p class="text-sm font-black text-black">Yashdeep Jivani</p>
        </div>
    </div>

    <div id="statsBox" class="grid grid-cols-4 gap-4 mb-10">
        <div class="border-2 border-black p-4 text-center"><p class="text-[9px] font-bold uppercase text-slate-400">Designs</p><p id="st-d" class="text-2xl font-black">0</p></div>
        <div class="border-2 border-black p-4 text-center"><p class="text-[9px] font-bold uppercase text-slate-400">Total Boxes</p><p id="st-b" class="text-2xl font-black">0</p></div>
        <div class="border-2 border-black p-4 text-center"><p class="text-[9px] font-bold uppercase text-slate-400">Brands</p><p id="st-br" class="text-2xl font-black">0</p></div>
        <div class="border-2 border-black p-4 text-center bg-black text-white"><p class="text-[9px] font-bold uppercase text-slate-300">Results</p><p id="st-f" class="text-2xl font-black">0</p></div>
    </div>

    <div id="reportList" class="space-y-4"></div>
</div>

<script>
    let masterData = [], designMap = {};

    // Fix for CORS and Data Loading
    async function init() {
        try {
            const [resI, resS] = await Promise.all([
                fetch('design.json?t=' + Date.now()).then(r => r.json()),
                fetch('stock.json?t=' + Date.now()).then(r => r.json())
            ]);
            resI.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = resS;
            document.getElementById('status').innerText = "✅ LIVE SYNC ACTIVE";
            document.getElementById('status').className = "text-xs font-bold text-green-600";
            setupFilters(); applyFilters();
        } catch (e) {
            document.getElementById('status').innerText = "❌ SYNC ERROR: CHECK DATA FILES";
            console.error(e);
        }
    }

    function setupFilters() {
        const b = new Set(), s = new Set(), g = new Set();
        masterData.forEach(i => { if(i.Brand) b.add(i.Brand); if(i.Size) s.add(i.Size); if(i.Variant) g.add(i.Variant); });
        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">ALL ${id.slice(1)}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('fB', b); fill('fS', s); fill('fG', g);
    }

    function applyFilters() {
        const nV = document.getElementById('sN').value.toLowerCase();
        const bV = document.getElementById('fB').value, sV = document.getElementById('fS').value, gV = document.getElementById('fG').value;
        const groups = {}; let tB = 0, uB = new Set();

        masterData.forEach(item => {
            const name = (item["Item Description"] || "").trim(), brand = (item.Brand || "").trim(), varnt = (item.Variant || "").trim(), size = (item.Size || "").trim(), qty = parseFloat(item.Total || item["Net Qty"] || 0);
            if (name.toLowerCase().includes(nV) && (!bV || brand===bV) && (!sV || size===sV) && (!gV || varnt===gV)) {
                const k = `${name}|${brand}|${size}|${varnt}`.toLowerCase();
                if (!groups[k]) groups[k] = { name, brand, size, varnt, lots: [], total: 0 };
                groups[k].lots.push({ lot: item["Lot No"] || item["Lot no."], qty });
                groups[k].total += qty; tB += qty; uB.add(brand);
            }
        });

        const items = Object.values(groups);
        document.getElementById('st-d').innerText = items.length;
        document.getElementById('st-b').innerText = tB.toLocaleString();
        document.getElementById('st-br').innerText = uB.size;
        document.getElementById('st-f').innerText = items.length;
        render(items);
    }

    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/300?text=NO+IMAGE';
            return `
            <div class="stock-card">
                <div class="card-img"><img src="${img}" crossorigin="anonymous" class="max-h-32"></div>
                <div class="card-info">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-black bg-black text-white px-2 py-0.5">${item.brand}</span>
                        <span class="text-[9px] font-bold text-blue-600 uppercase">${item.varnt}</span>
                    </div>
                    <h3 class="text-xl font-black uppercase leading-tight">${item.name}</h3>
                    <p class="text-[10px] font-bold text-slate-400 mb-3">${item.size}</p>
                    <div class="space-y-1">
                        ${item.lots.map(l => `<div class="flex justify-between border-b border-dotted border-slate-300 text-[10px] font-bold"><span>LOT: ${l.lot}</span><span>${l.qty} Bx</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-qty">
                    <p class="text-3xl font-[900]">${item.total}</p>
                    <p class="text-[8px] font-bold uppercase text-slate-400 tracking-tighter">Boxes</p>
                </div>
            </div>`;
        }).join('');
    }

    async function generateUltraPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const list = document.getElementById('reportList').children;
        const header = document.getElementById('pdfHeader').outerHTML;
        const stats = document.getElementById('statsBox').outerHTML;
        
        const temp = document.createElement('div');
        temp.className = 'pdf-page';
        document.body.appendChild(temp);

        const renderSection = async (html) => {
            temp.innerHTML = html;
            const canvas = await html2canvas(temp, { scale: 2, useCORS: true });
            return { img: canvas.toDataURL('image/jpeg', 0.95), h: (canvas.height * 180) / canvas.width };
        };

        let y = 15;
        const firstHeader = await renderSection(header + stats);
        doc.addImage(firstHeader.img, 'JPEG', 15, y, 180, firstHeader.h);
        y += firstHeader.h + 10;

        for (let i = 0; i < list.length; i++) {
            const card = await renderSection(list[i].outerHTML);
            if (y + card.h > 275) {
                doc.addPage();
                y = 15;
                const head = await renderSection(header);
                doc.addImage(head.img, 'JPEG', 15, y, 180, head.h);
                y += head.h + 10;
            }
            doc.addImage(card.img, 'JPEG', 15, y, 180, card.h);
            y += card.h + 5;
        }

        document.body.removeChild(temp);
        doc.save("Emcer_Elite_Inventory.pdf");
    }

    init();
</script>
</body>
</html>
