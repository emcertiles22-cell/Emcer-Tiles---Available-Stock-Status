<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Elite Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        /* PDF Page Mockup - Visual Only */
        .pdf-preview { width: 210mm; margin: auto; background: white; padding: 15mm; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Premium Card Design */
        .stock-card { 
            display: flex; border: 1px solid #e2e8f0; margin-bottom: 12px; 
            min-height: 150px; background: white; border-radius: 12px; overflow: hidden;
            break-inside: avoid;
        }
        .card-img { width: 22%; background: #fdfdfd; display: flex; align-items: center; justify-content: center; padding: 10px; border-right: 1px solid #f1f5f9; }
        .card-info { width: 58%; padding: 16px; }
        .card-qty { width: 20%; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #f1f5f9; }
        
        .no-print { display: block; }
        #hidden-pdf-header { display: none; }
    </style>
</head>
<body>

<div class="max-w-5xl mx-auto p-6 no-print">
    <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
        <div>
            <h1 class="text-2xl font-[800] tracking-tight text-slate-900">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-sm font-bold text-blue-600">Premium Inventory Dashboard</p>
        </div>
        <button onclick="generateElitePDF()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">📥 DOWNLOAD PREMIUM PDF</button>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-8">
        <input type="text" id="sN" oninput="applyFilters()" placeholder="Search Design..." class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none focus:ring-2 ring-blue-500">
        <select id="fB" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold"></select>
        <select id="fS" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold"></select>
        <select id="fG" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold"></select>
    </div>
</div>

<div id="hidden-pdf-header">
    <div style="border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1 style="font-size: 26px; font-weight: 800; color: #000; margin: 0;">EMCER TILES PRIVATE LIMITED</h1>
            <p style="font-size: 10px; font-weight: 700; color: #2563eb; letter-spacing: 2px; margin: 2px 0 0 0;">LIVE INVENTORY STOCK REPORT</p>
        </div>
        <div style="text-align: right;">
            <p style="font-size: 9px; font-weight: 700; color: #94a3b8; margin: 0;">DEVELOPED BY</p>
            <p style="font-size: 12px; font-weight: 800; color: #000; margin: 0;">YASHDEEP JIVANI</p>
        </div>
    </div>
</div>

<div class="pdf-preview">
    <div id="statsSection" class="grid grid-cols-4 gap-4 mb-8">
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p class="text-[9px] font-bold text-slate-400">DESIGNS</p><p id="st-d" class="text-xl font-bold">0</p></div>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p class="text-[9px] font-bold text-slate-400">TOTAL BOXES</p><p id="st-b" class="text-xl font-bold">0</p></div>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p class="text-[9px] font-bold text-slate-400">BRANDS</p><p id="st-br" class="text-xl font-bold">0</p></div>
        <div class="bg-blue-600 p-4 rounded-xl text-center text-white"><p class="text-[9px] font-bold opacity-80">FILTERED</p><p id="st-f" class="text-xl font-bold">0</p></div>
    </div>

    <div id="reportArea" class="space-y-4"></div>
</div>

<script>
    let masterData = [], designMap = {};

    async function init() {
        try {
            const [resD, resS] = await Promise.all([
                fetch('design.json?v=' + Date.now()).then(r => r.json()),
                fetch('stock.json?v=' + Date.now()).then(r => r.json())
            ]);
            resD.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = resS;
            setupFilters(); applyFilters();
        } catch (e) { console.error("Data Load Error"); }
    }

    function setupFilters() {
        const b = new Set(), s = new Set(), g = new Set();
        masterData.forEach(i => { b.add(i.Brand); s.add(i.Size); g.add(i.Variant); });
        const fill = (id, set, label) => document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('fB', b, 'Brands'); fill('fS', s, 'Sizes'); fill('fG', g, 'Variants');
    }

    function applyFilters() {
        const nV = document.getElementById('sN').value.toLowerCase();
        const bV = document.getElementById('fB').value, sV = document.getElementById('fS').value, gV = document.getElementById('fG').value;
        const groups = {}; let tB = 0, uB = new Set();

        masterData.forEach(item => {
            const name = (item["Item Description"] || "").trim(), brand = (item.Brand || "").trim(), varnt = (item.Variant || "").trim(), size = (item.Size || "").trim(), qty = parseFloat(item.Total || 0);
            if (name.toLowerCase().includes(nV) && (!bV || brand===bV) && (!sV || size===sV) && (!gV || varnt===gV)) {
                const k = `${name}|${brand}|${size}|${varnt}`.toLowerCase();
                if (!groups[k]) groups[k] = { name, brand, size, varnt, lots: [], total: 0 };
                groups[k].lots.push({ lot: item["Lot No"], qty });
                groups[k].total += qty; tB += qty; uB.add(brand);
            }
        });

        const items = Object.values(groups);
        document.getElementById('st-d').innerText = items.length;
        document.getElementById('st-b').innerText = Math.round(tB).toLocaleString();
        document.getElementById('st-br').innerText = uB.size;
        document.getElementById('st-f').innerText = items.length;
        render(items);
    }

    function render(items) {
        document.getElementById('reportArea').innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/200';
            return `
            <div class="stock-card">
                <div class="card-img"><img src="${img}" crossorigin="anonymous" style="max-height: 120px; border-radius: 8px;"></div>
                <div class="card-info">
                    <div class="flex gap-2 mb-1"><span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${item.brand}</span></div>
                    <h3 class="text-lg font-bold text-slate-900 uppercase leading-tight">${item.name}</h3>
                    <p class="text-[10px] font-semibold text-slate-400 mb-2">${item.size} | ${item.varnt}</p>
                    <div class="grid grid-cols-2 gap-x-4">
                        ${item.lots.map(l => `<div class="flex justify-between text-[10px] border-b border-slate-50 py-1 font-medium"><span>LOT: ${l.lot}</span><span class="font-bold">${l.qty} Bx</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-qty">
                    <p class="text-[8px] font-bold text-slate-400 uppercase">Stock</p>
                    <p class="text-2xl font-extrabold text-slate-900">${Math.round(item.total)}</p>
                    <p class="text-[9px] font-bold text-blue-600 uppercase">Boxes</p>
                </div>
            </div>`;
        }).join('');
    }

    async function generateElitePDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const cards = document.getElementById('reportArea').children;
        const headerHtml = document.getElementById('hidden-pdf-header').innerHTML;
        const statsHtml = document.getElementById('statsSection').outerHTML;
        
        const temp = document.createElement('div');
        temp.style.width = '190mm'; temp.style.padding = '5mm'; temp.style.background = 'white';
        document.body.appendChild(temp);

        const capture = async (html) => {
            temp.innerHTML = html;
            const canvas = await html2canvas(temp, { scale: 2, useCORS: true });
            return { img: canvas.toDataURL('image/jpeg', 0.95), h: (canvas.height * 180) / canvas.width };
        };

        let y = 10;
        const firstHeader = await capture(headerHtml + statsHtml);
        pdf.addImage(firstHeader.img, 'JPEG', 15, y, 180, firstHeader.h);
        y += firstHeader.h + 5;

        for (let i = 0; i < cards.length; i++) {
            const card = await capture(cards[i].outerHTML);
            if (y + card.h > 280) {
                pdf.addPage();
                y = 10;
                const head = await capture(headerHtml);
                pdf.addImage(head.img, 'JPEG', 15, y, 180, head.h);
                y += head.h + 5;
            }
            pdf.addImage(card.img, 'JPEG', 15, y, 180, card.h);
            y += card.h + 4;
        }

        document.body.removeChild(temp);
        pdf.save("Emcer_Premium_Inventory.pdf");
    }

    init();
</script>
</body>
</html>
