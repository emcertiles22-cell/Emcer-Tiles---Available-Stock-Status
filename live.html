<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Premium Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #000; }
        .main-container { max-width: 1250px; margin: auto; padding: 20px; }
        
        @keyframes blink-glow { 0% { opacity: 1; text-shadow: 0 0 5px #2563eb; } 50% { opacity: 0.4; text-shadow: none; } 100% { opacity: 1; text-shadow: 0 0 5px #2563eb; } }
        .dev-tag { font-weight: 900; color: #2563eb; animation: blink-glow 1.5s infinite; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #2563eb; padding: 2px 6px; border-radius: 4px; }

        .stat-card { background: white; border: 3px solid #000; padding: 15px; text-align: center; box-shadow: 6px 6px 0px #000; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 10px 10px 0px #2563eb; }
        .stat-val { font-size: 32px; font-weight: 900; line-height: 1; margin-bottom: 5px; }
        .stat-label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        .stock-card { background: white; border: 2px solid #000; display: flex; margin-top: 20px; min-height: 220px; transition: 0.2s; box-shadow: 4px 4px 0px rgba(0,0,0,0.05); overflow: hidden; }
        .card-img { width: 22%; border-right: 2px solid #000; padding: 12px; cursor: zoom-in; display: flex; align-items: center; justify-content: center; background: #fff; }
        .card-info { width: 53%; padding: 20px; display: flex; flex-direction: column; }
        .card-total { width: 25%; border-left: 2px solid #000; background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #bookingModal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; }
        .modal-box { background: white; padding: 30px; border: 4px solid #000; width: 90%; max-width: 400px; box-shadow: 12px 12px 0px #2563eb; }

        label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #475569; display: block; margin-bottom: 4px; }
        input, select { border: 2px solid #e2e8f0; padding: 10px; font-weight: 700; width: 100%; outline: none; border-radius: 4px; transition: 0.2s; }
        input:focus, select:focus { border-color: #000; background: #f8fafc; }
        
        @media (max-width: 768px) {
            .stock-card { flex-direction: column; }
            .card-img, .card-info, .card-total { width: 100%; border: none; border-bottom: 2px solid #000; }
        }
    </style>
</head>
<body>

<div id="bookingModal">
    <div class="modal-box">
        <h2 class="text-2xl font-black mb-1 uppercase">Stock Booking</h2>
        <p id="bookItemName" class="text-blue-600 font-bold text-sm mb-6"></p>
        <div class="space-y-4">
            <div><label>Party Name / Salesman</label><input type="text" id="partyName" placeholder="Enter Name..."></div>
            <div><label>Order Quantity (Boxes)</label><input type="number" id="bookQty" placeholder="0"></div>
            <div class="flex gap-3 pt-4">
                <button onclick="confirmBooking()" class="flex-1 bg-black text-white py-3 font-black uppercase hover:bg-blue-600 transition">Confirm</button>
                <button onclick="document.getElementById('bookingModal').style.display='none'" class="flex-1 bg-gray-100 py-3 font-black uppercase">Cancel</button>
            </div>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter uppercase leading-none">Emcer Tiles Private Limited</h1>
            <div class="flex gap-4 mt-2">
                <p id="updateTime" class="text-[10px] font-black text-blue-600 uppercase">Syncing Live...</p>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Live Inventory Portal</p>
            </div>
        </div>
        <div class="text-right">
            <button onclick="downloadPDF()" class="bg-red-600 text-white px-5 py-2 font-black text-[11px] uppercase shadow-lg hover:bg-red-700 transition mb-2">📥 Download PDF</button>
            <div class="text-[10px] font-black text-slate-500">SYSTEM DEVELOPER: <span class="dev-tag">Yashdeep Jivani</span></div>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print">
        <div class="stat-card"><div class="stat-label">Total Designs</div><div id="stat-designs" class="stat-val">0</div></div>
        <div class="stat-card"><div class="stat-label">Available Boxes</div><div id="stat-boxes" class="stat-val">0</div></div>
        <div class="stat-card"><div class="stat-label">Active Brands</div><div id="stat-brands" class="stat-val">0</div></div>
        <div class="stat-card"><div class="stat-label">Filtered Results</div><div id="stat-results" class="stat-val">0</div></div>
    </div>

    <div class="bg-white border-[3px] border-black p-6 grid grid-cols-1 md:grid-cols-5 gap-4 no-print mb-8">
        <div><label>Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type design name..."></div>
        <div><label>Filter By Brand</label><select id="filterBrand" onchange="applyFilters()"><option value="">All Brands</option></select></div>
        <div><label>Filter By Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"><option value="">All Sizes</option></select></div>
        <div><label>Filter By Series</label><select id="filterSeries" onchange="applyFilters()"><option value="">All Series</option></select></div>
        <div><label>Filter By Grade (Variant)</label><select id="filterGrade" onchange="applyFilters()"><option value="">All Grades</option></select></div>
    </div>

    <div id="reportList" class="space-y-6 pb-20">
        <div class="py-20 text-center font-black text-slate-300 text-xl italic uppercase">Connecting to Warehouse Data...</div>
    </div>
</div>

<script>
    // --- ⚠️ અહિયાં તમારી Apps Script Web App URL નાખો ⚠️ ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec';
    
    let masterData = [];
    let designMap = {};
    let selectedItem = null;

    async function init() {
        try {
            const resImg = await fetch('design.json?v=' + Date.now());
            if (resImg.ok) {
                const designs = await resImg.json();
                designs.forEach(d => { if(d.name) designMap[d.name.toLowerCase().trim()] = d.url; });
            }
            fetchLiveStock();
        } catch (e) { console.error("Init error:", e); }
    }

    async function fetchLiveStock() {
        try {
            const response = await fetch(SCRIPT_URL);
            masterData = await response.json();
            document.getElementById('updateTime').innerText = "UPDATED: " + new Date().toLocaleString();
            setupFilters();
            applyFilters();
        } catch (err) { 
            console.log("Sync Error"); 
            document.getElementById('updateTime').innerText = "OFFLINE - RECONNECTING...";
        }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), grades = new Set();
        masterData.forEach(item => {
            // FIX: Brand column maps to Brand, Variant column maps to Grade
            if (item["Brand"]) brands.add(item["Brand"].toString().trim());
            if (item["Size"]) sizes.add(item["Size"].toString().trim());
            if (item["Variant"]) grades.add(item["Variant"].toString().trim());
        });
        
        const bSel = document.getElementById('filterBrand'), 
              sSel = document.getElementById('filterSize'), 
              gSel = document.getElementById('filterGrade');
              
        const oldB = bSel.value, oldS = sSel.value, oldG = gSel.value;

        bSel.innerHTML = '<option value="">All Brands</option>';
        [...brands].sort().forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
        
        sSel.innerHTML = '<option value="">All Sizes</option>';
        [...sizes].sort().forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
        
        gSel.innerHTML = '<option value="">All Grades</option>';
        [...grades].sort().forEach(g => gSel.innerHTML += `<option value="${g}">${g}</option>`);

        bSel.value = oldB; sSel.value = oldS; gSel.value = oldG;
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const selectedSize = document.getElementById('filterSize').value;
        const seriesSet = new Set();
        masterData.forEach(item => {
            if (selectedSize === "" || item["Size"].toString().trim() === selectedSize) {
                if (item["Series"]) seriesSet.add(item["Series"].toString().trim());
            }
        });
        const srSel = document.getElementById('filterSeries');
        const oldSr = srSel.value;
        srSel.innerHTML = '<option value="">All Series</option>';
        [...seriesSet].sort().forEach(sr => srSel.innerHTML += `<option value="${sr}">${sr}</option>`);
        srSel.value = oldSr;
    }

    function applyFilters() {
        const nameVal = document.getElementById('searchName').value.toLowerCase();
        const brandVal = document.getElementById('filterBrand').value;
        const sizeVal = document.getElementById('filterSize').value;
        const seriesVal = document.getElementById('filterSeries').value;
        const gradeVal = document.getElementById('filterGrade').value;
        
        const groups = {};
        let totalBoxes = 0;
        const uniqueBrands = new Set();
        const uniqueDesigns = new Set();

        masterData.forEach(item => {
            const name = (item["Item Description"] || "N/A").toString().trim();
            const brand = (item["Brand"] || "N/A").toString().trim();
            const series = (item["Series"] || "N/A").toString().trim();
            const size = (item["Size"] || "N/A").toString().trim();
            const grade = (item["Variant"] || "N/A").toString().trim(); // Grade filter
            const qty = parseFloat(item["Total"] || 0);
            const lot = (item["Lot No"] || "N/A").toString().trim();

            if (name.toLowerCase().includes(nameVal) &&
                (brandVal === "" || brand === brandVal) &&
                (sizeVal === "" || size === sizeVal) &&
                (seriesVal === "" || series === seriesVal) &&
                (gradeVal === "" || grade === gradeVal)) {
                
                const key = `${name}|${series}|${size}|${grade}|${brand}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, series, size, grade, brand, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty;
                
                totalBoxes += qty;
                uniqueBrands.add(brand);
                uniqueDesigns.add(name);
            }
        });

        document.getElementById('stat-designs').innerText = uniqueDesigns.size;
        document.getElementById('stat-boxes').innerText = totalBoxes.toLocaleString();
        document.getElementById('stat-brands').innerText = uniqueBrands.size;
        document.getElementById('stat-results').innerText = Object.keys(groups).length;

        render(Object.values(groups));
    }

    function render(items) {
        const area = document.getElementById('reportList');
        if (items.length === 0) { 
            area.innerHTML = `
                <div class='py-32 text-center'>
                    <div class='text-6xl mb-4'>📦</div>
                    <div class='font-black text-2xl uppercase text-slate-300'>No Matching Stock Found</div>
                </div>`; 
            return; 
        }
        area.innerHTML = items.map(item => {
            const imgUrl = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x600?text=No+Photo';
            return `
            <div class="stock-card">
                <div class="card-img" onclick="window.open('${imgUrl}')"><img src="${imgUrl}" class="max-h-44"></div>
                <div class="card-info">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${item.brand} | ${item.series}</span>
                        <span class="bg-black text-white px-2 py-0.5 text-[9px] font-black uppercase tracking-tighter">${item.grade}</span>
                    </div>
                    <div class="text-2xl font-black uppercase leading-tight mb-1 text-slate-800">${item.name}</div>
                    <div class="text-[11px] font-bold text-slate-400 border-b pb-2 mb-3 uppercase">${item.size}</div>
                    <div class="space-y-1">
                        ${item.lots.map(l => `
                            <div class="flex justify-between items-center py-2 border-b border-dashed border-slate-200">
                                <span class="font-bold text-xs uppercase text-slate-600">LOT: ${l.lot}</span>
                                <div class="flex items-center gap-3">
                                    <span class="font-black text-slate-900">${l.qty} Bx</span>
                                    <button onclick="openBooking('${item.name}', '${l.lot}')" class="text-[9px] bg-blue-50 text-blue-600 px-2 py-1 font-black uppercase hover:bg-blue-600 hover:text-white transition">Book</button>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="stat-label mb-1">Total Stock</div>
                    <div class="text-5xl font-black">${item.total}</div>
                    <div class="stat-label mt-1">Available Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    function openBooking(name, lot) {
        selectedItem = { name, lot };
        document.getElementById('bookItemName').innerText = `${name} (LOT: ${lot})`;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    async function confirmBooking() {
        const party = document.getElementById('partyName').value;
        const qty = document.getElementById('bookQty').value;
        if(!party || !qty) { alert("Enter Details"); return; }
        
        const btn = document.querySelector('#bookingModal button');
        btn.innerText = "Booking...";
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ itemName: selectedItem.name, lotNo: selectedItem.lot, orderQty: qty, partyName: party })
            });
            alert(`SUCCESS: ${qty} Boxes of ${selectedItem.name} Booked for ${party}`);
            document.getElementById('bookingModal').style.display = 'none';
            fetchLiveStock();
        } catch (e) { alert("Booking Error"); }
        btn.innerText = "Confirm";
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('reportList');
        const canvas = await html2canvas(element, { scale: 1.5, useCORS: true });
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.setFontSize(16);
        pdf.text("EMCER TILES - LIVE STOCK REPORT", 10, 15);
        pdf.setFontSize(10);
        pdf.text("Generated: " + new Date().toLocaleString(), 10, 22);
        pdf.addImage(imgData, 'PNG', 0, 30, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`Stock_Report_${new Date().getTime()}.pdf`);
    }

    setInterval(fetchLiveStock, 60000);
    init();
</script>
</body>
</html>
