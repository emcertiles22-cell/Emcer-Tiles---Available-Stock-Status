<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        
        /* Premium PDF Styling */
        .pdf-render-zone { width: 190mm; background: white; margin: auto; }
        .stock-card { 
            display: flex; border: 1px solid #e2e8f0; margin-bottom: 12px; 
            min-height: 150px; background: white; border-radius: 12px; overflow: hidden;
            break-inside: avoid; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .card-img { width: 22%; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; border-right: 1px solid #f1f5f9; }
        .card-info { width: 58%; padding: 16px; }
        .card-qty { width: 20%; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #f1f5f9; }
        
        #pdf-header-tpl { display: none; }
        .no-print { display: block; }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 no-print">
        <div>
            <h1 class="text-2xl font-[800] tracking-tight">EMCER TILES PRIVATE LIMITED</h1>
            <div id="status" class="flex items-center gap-2 text-sm font-bold text-orange-500 mt-1">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span></span>
                Connecting to Google Sheet...
            </div>
        </div>
        <button onclick="generateElitePDF()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center gap-2">
            <span>📥</span> DOWNLOAD ELITE PDF
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 no-print">
        <div class="relative">
            <input type="text" id="sN" oninput="applyFilters()" placeholder="Search Design Name..." class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none focus:ring-2 ring-blue-500 pl-10">
            <span class="absolute left-3 top-3.5 opacity-30">🔍</span>
        </div>
        <select id="fB" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none focus:ring-2 ring-blue-500 cursor-pointer"></select>
        <select id="fS" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none focus:ring-2 ring-blue-500 cursor-pointer"></select>
        <select id="fG" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none focus:ring-2 ring-blue-500 cursor-pointer"></select>
    </div>

    <div id="statsSection" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-bold text-slate-400 tracking-wider uppercase mb-1">Total Designs</p><p id="st-d" class="text-2xl font-extrabold text-slate-900">0</p></div>
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-bold text-slate-400 tracking-wider uppercase mb-1">Stock Boxes</p><p id="st-b" class="text-2xl font-extrabold text-slate-900">0</p></div>
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><p class="text-[10px] font-bold text-slate-400 tracking-wider uppercase mb-1">Active Brands</p><p id="st-br" class="text-2xl font-extrabold text-slate-900">0</p></div>
        <div class="bg-blue-600 p-5 rounded-2xl shadow-lg shadow-blue-100 text-white"><p class="text-[10px] font-bold opacity-80 tracking-wider uppercase mb-1">Results Found</p><p id="st-f" class="text-2xl font-extrabold">0</p></div>
    </div>

    <div id="reportArea" class="space-y-4"></div>
</div>

<div id="pdf-header-tpl">
    <div style="border-bottom: 3px solid #1e293b; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1 style="font-size: 28px; font-weight: 800; color: #0f172a; margin: 0; text-transform: uppercase; letter-spacing: -1px;">Emcer Tiles Private Limited</h1>
            <p style="font-size: 11px; font-weight: 700; color: #2563eb; margin: 4px 0 0 0; letter-spacing: 2px;">OFFICIAL INVENTORY REPORT</p>
        </div>
        <div style="text-align: right;">
            <p style="font-size: 9px; font-weight: 700; color: #94a3b8; margin: 0; text-transform: uppercase;">System Developer</p>
            <p style="font-size: 13px; font-weight: 800; color: #0f172a; margin: 0;">YASHDEEP JIVANI</p>
        </div>
    </div>
</div>

<script>
    let masterData = [], designMap = {};

    function init() {
        google.script.run.withSuccessHandler(dMap => {
            designMap = dMap;
            google.script.run.withSuccessHandler(sData => {
                masterData = sData;
                document.getElementById('status').innerHTML = '<span class="text-green-600">● Live Sync Active</span>';
                setupFilters(); applyFilters();
            }).getStockData();
        }).getDesignData();
    }

    function setupFilters() {
        const b = new Set(), s = new Set(), g = new Set();
        masterData.forEach(i => { if(i.Brand) b.add(i.Brand); if(i.Size) s.add(i.Size); if(i.Variant) g.add(i.Variant); });
        const fill = (id, set, label) => document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('fB', b, 'Brands'); fill('fS', s, 'Sizes'); fill('fG', g, 'Variants');
    }

    function applyFilters() {
        const nV = document.getElementById('sN').value.toLowerCase();
        const bV = document.getElementById('fB').value, sV = document.getElementById('fS').value, gV = document.getElementById('fG').value;
        const groups = {}; let tB = 0, uB = new Set();

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const brand = String(item.Brand || "").trim();
            const varnt = String(item.Variant || "").trim();
            const size = String(item.Size || "").trim();
            const qty = parseFloat(item.Total || item.TotalBoxes || 0);

            if (name.toLowerCase().includes(nV) && (!bV || brand===bV) && (!sV || size===sV) && (!gV || varnt===gV)) {
                const k = `${name}|${brand}|${size}|${varnt}`.toLowerCase();
                if (!groups[k]) groups[k] = { name, brand, size, varnt, lots: [], total: 0 };
                groups[k].lots.push({ lot: item["Lot No"] || item.Lot, qty });
                groups[k].total += qty; tB += qty; uB.add(brand);
            }
        });

        const items = Object.values(groups);
        document.getElementById('st-d').innerText = items.length;
        document.getElementById('st-b').innerText = Math.round(tB).toLocaleString();
        document.getElementById('st-br').innerText = uB.size;
        document.getElementById('st-f').innerText = items.length;
        render(items);
    }

    function render(items) {
        document.getElementById('reportArea').innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/200?text=No+Photo';
            return `
            <div class="stock-card shadow-sm hover:shadow-md transition-shadow">
                <div class="card-img"><img src="${img}" style="max-height: 110px; border-radius: 8px;"></div>
                <div class="card-info">
                    <span class="text-[10px] font-extrabold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-lg uppercase tracking-wider">${item.brand}</span>
                    <h3 class="text-xl font-bold text-slate-900 uppercase leading-tight mt-1.5">${item.name}</h3>
                    <p class="text-[11px] font-bold text-slate-400 mb-3">${item.size} | ${item.varnt}</p>
                    <div class="grid grid-cols-2 gap-x-6">
                        ${item.lots.map(l => `<div class="flex justify-between text-[11px] border-b border-slate-50 py-1.5 font-medium"><span>LOT: ${l.lot}</span><span class="font-bold text-slate-700">${l.qty} Bx</span></div>`).join('')}
                    </div>
                </div>
                <div class="card-qty">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Net Stock</p>
                    <p class="text-3xl font-extrabold text-slate-900">${Math.round(item.total)}</p>
                    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">Boxes</p>
                </div>
            </div>`;
        }).join('');
    }

    async function generateElitePDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const cards = document.getElementById('reportArea').children;
        const headerHtml = document.getElementById('pdf-header-tpl').innerHTML;
        const statsHtml = document.getElementById('statsSection').outerHTML;
        
        const temp = document.createElement('div');
        temp.style.width = '190mm'; temp.style.padding = '8mm'; temp.style.background = 'white';
        document.body.appendChild(temp);

        const capture = async (html) => {
            temp.innerHTML = html;
            const canvas = await html2canvas(temp, { scale: 2, useCORS: true });
            return { img: canvas.toDataURL('image/jpeg', 0.95), h: (canvas.height * 180) / canvas.width };
        };

        let y = 10;
        const firstHeader = await capture(headerHtml + statsHtml);
        pdf.addImage(firstHeader.img, 'JPEG', 15, y, 180, firstHeader.h);
        y += firstHeader.h + 8;

        for (let i = 0; i < cards.length; i++) {
            const card = await capture(cards[i].outerHTML);
            if (y + card.h > 275) {
                pdf.addPage();
                y = 10;
                const head = await capture(headerHtml);
                pdf.addImage(head.img, 'JPEG', 15, y, 180, head.h);
                y += head.h + 8;
            }
            pdf.addImage(card.img, 'JPEG', 15, y, 180, card.h);
            y += card.h + 5;
        }
        document.body.removeChild(temp);
        pdf.save("Emcer_Live_Inventory.pdf");
    }

    window.onload = init;
</script>
</body>
</html>
