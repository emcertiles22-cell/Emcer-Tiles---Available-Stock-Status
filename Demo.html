<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tiles Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 50px; }

        .container { max-width: 1300px; margin: auto; padding: 20px; }

        /* Header & Filters */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 20px 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 30px;
        }

        .filter-section {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; align-items: center;
        }

        .filter-input {
            width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0;
            border-radius: 12px; outline: none; font-size: 14px; transition: 0.3s;
        }
        .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        /* Card Grid */
        .inventory-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .tile-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid #f1f5f9; transition: all 0.4s ease;
            position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .tile-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        .card-img-container { position: relative; width: 100%; padding-top: 100%; overflow: hidden; cursor: zoom-in; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .tile-card:hover .card-img { scale: 1.1; }

        .card-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.9); padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--primary);
        }

        .card-body { padding: 20px; }
        .card-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .card-info { font-size: 13px; color: var(--text-light); margin-bottom: 15px; display: flex; flex-direction: column; gap: 4px; }
        
        .stock-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f1f5f9; }
        .stock-qty { font-size: 18px; font-weight: 700; color: #16a34a; }
        
        .btn-book {
            background: var(--primary); color: white; border: none; padding: 10px 18px;
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 13px;
        }
        .btn-book:hover { background: var(--accent); }

        /* HD Modal */
        #hdModal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); justify-content: center; align-items: center;
        }
        #hdModal img { max-width: 90%; max-height: 85vh; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 35px; cursor: pointer; }

        @media (max-width: 600px) { .inventory-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="container">
        <div class="filter-section">
            <input type="text" id="searchInput" class="filter-input" placeholder="Search Design Name..." onkeyup="filterItems()">
            <select id="seriesFilter" class="filter-input" onchange="filterItems()">
                <option value="">All Series</option>
            </select>
            <select id="sizeFilter" class="filter-input" onchange="filterItems()">
                <option value="">All Sizes</option>
            </select>
            <button class="btn-book" style="background:#e2e8f0; color:black;" onclick="window.print()">Export PDF</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="loader" style="text-align:center; padding:100px;">Loading Catalog...</div>
    <div class="inventory-grid" id="cardContainer"></div>
</div>

<div id="hdModal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="hdImage" src="">
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; 
    let allData = [];

    async function fetchData() {
        const res = await fetch(WEB_APP_URL);
        allData = await res.json();
        setupFilters();
        renderCards(allData);
    }

    function setupFilters() {
        const series = [...new Set(allData.map(item => item.Series).filter(Boolean))];
        const sizes = [...new Set(allData.map(item => item.Size).filter(Boolean))];
        
        const sFilter = document.getElementById('seriesFilter');
        const szFilter = document.getElementById('sizeFilter');

        series.forEach(s => sFilter.innerHTML += `<option value="${s}">${s}</option>`);
        sizes.forEach(sz => szFilter.innerHTML += `<option value="${sz}">${sz}</option>`);
    }

    function renderCards(data) {
        const container = document.getElementById('cardContainer');
        const loader = document.getElementById('loader');
        container.innerHTML = "";
        loader.style.display = data.length ? "none" : "block";

        data.forEach(item => {
            if(item.Total <= 0) return;

            const card = `
                <div class="tile-card" data-name="${item['Item Description']}" data-series="${item.Series}" data-size="${item.Size}">
                    <div class="card-img-container" onclick="openHD('${item.ImgUrl}')">
                        <span class="card-badge">LOT: ${item['Lot No']}</span>
                        <img src="${item.ImgUrl}" class="card-img" loading="lazy">
                    </div>
                    <div class="card-body">
                        <div class="card-title">${item['Item Description']}</div>
                        <div class="card-info">
                            <span>📐 ${item.Size || 'Standard'}</span>
                            <span>🏷️ ${item.Series || 'Premium'}</span>
                        </div>
                        <div class="stock-row">
                            <div>
                                <small style="color:var(--text-light)">Available</small>
                                <div class="stock-qty">${item.Total}</div>
                            </div>
                            <button class="btn-book" onclick="handleBooking('${item['Item Description']}', '${item['Lot No']}', ${item.Total})">Book Now</button>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', card);
        });
    }

    function filterItems() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const series = document.getElementById('seriesFilter').value;
        const size = document.getElementById('sizeFilter').value;

        const cards = document.querySelectorAll('.tile-card');
        cards.forEach(card => {
            const matchName = card.dataset.name.toLowerCase().includes(search);
            const matchSeries = !series || card.dataset.series === series;
            const matchSize = !size || card.dataset.size === size;

            card.style.display = (matchName && matchSeries && matchSize) ? "block" : "none";
        });
    }

    function openHD(url) {
        document.getElementById('hdModal').style.display = "flex";
        document.getElementById('hdImage').src = url;
    }

    function closeModal() {
        document.getElementById('hdModal').style.display = "none";
    }

    async function handleBooking(name, lot, max) {
        // ... (Same booking logic as previous response to call doPost)
        alert(`Booking process for ${name} (Lot: ${lot})`);
    }

    fetchData();
</script>

</body>
</html>
