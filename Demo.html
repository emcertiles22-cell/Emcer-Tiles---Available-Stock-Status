<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Ultra-Pro Inventory Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 320px;
            --brand: #0f172a;
            --accent: #3b82f6;
            --bg: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0;
            padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
        }
        .sidebar h2 { font-size: 20px; font-weight: 800; color: var(--brand); margin-bottom: 10px; }
        
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .filter-group select, .filter-group input {
            padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px;
        }

        .qty-range { display: flex; gap: 10px; }
        .qty-range input { width: 50%; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card span { font-size: 12px; color: #64748b; font-weight: 600; }
        .stat-card div { font-size: 24px; font-weight: 800; margin-top: 5px; }

        /* Card Layout */
        .inventory-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .p-card {
            background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0;
            transition: 0.3s; position: relative;
        }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .img-wrap { width: 100%; padding-top: 100%; position: relative; cursor: zoom-in; }
        .img-wrap img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        .p-details { padding: 20px; }
        .p-series { font-size: 10px; font-weight: 800; color: var(--accent); }
        .p-name { font-size: 16px; font-weight: 700; margin: 5px 0; }
        .p-stock { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .p-qty { font-size: 20px; font-weight: 800; color: #059669; }

        /* Modal Viewer */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 9999; justify-content: center; align-items: center;
        }
        #modal img { max-width: 90%; max-height: 85vh; border-radius: 10px; }

        @media print { .sidebar { display: none; } .main-content { padding: 0; } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Filters</h2>
    
    <div class="filter-group">
        <label>Search Design</label>
        <input type="text" id="search" placeholder="Enter Name..." oninput="runFilters()">
    </div>

    <div class="filter-group">
        <label>Size (Master)</label>
        <select id="sizeSelect" onchange="updateSeriesOptions(); runFilters();">
            <option value="">All Sizes</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Series (Dependent)</label>
        <select id="seriesSelect" onchange="runFilters()">
            <option value="">Select Size First</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Quantity Range</label>
        <div class="qty-range">
            <input type="number" id="minQty" placeholder="Min" oninput="runFilters()">
            <input type="number" id="maxQty" placeholder="Max" oninput="runFilters()">
        </div>
    </div>

    <div class="filter-group">
        <label>Sort Order</label>
        <select id="sortOrder" onchange="runFilters()">
            <option value="az">A to Z</option>
            <option value="za">Z to A</option>
            <option value="low">Qty: Low to High</option>
            <option value="high" selected>Qty: High to Low</option>
        </select>
    </div>

    <button onclick="window.print()" style="padding:15px; background:var(--brand); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:700; margin-top:20px;">Download HD Report</button>
</div>

<div class="main-content">
    <div class="top-stats">
        <div class="stat-card"><span>Available Designs</span><div id="stat1">0</div></div>
        <div class="stat-card"><span>Total SQM</span><div id="stat2">0</div></div>
        <div class="stat-card"><span>High Stock</span><div id="stat3" style="color:#059669">0</div></div>
        <div class="stat-card"><span>Critical Stock</span><div id="stat4" style="color:#dc2626">0</div></div>
    </div>

    <div class="inventory-grid" id="grid">
        </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
</div>

<script>
    const SHEET_API = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec";
    let db = [];

    async function load() {
        const res = await fetch(SHEET_API);
        db = await res.json();
        
        // Initial setup
        const sizes = [...new Set(db.map(x => x.Size).filter(Boolean))];
        const sSel = document.getElementById('sizeSelect');
        sizes.forEach(sz => sSel.innerHTML += `<option value="${sz}">${sz}</option>`);

        runFilters();
    }

    function updateSeriesOptions() {
        const selSize = document.getElementById('sizeSelect').value;
        const seriesSel = document.getElementById('seriesSelect');
        seriesSel.innerHTML = '<option value="">All Series</option>';
        
        const filteredSeries = [...new Set(db.filter(x => !selSize || x.Size === selSize).map(x => x.Series).filter(Boolean))];
        filteredSeries.forEach(s => seriesSel.innerHTML += `<option value="${s}">${s}</option>`);
    }

    function runFilters() {
        let data = [...db];

        // 1. Inputs
        const search = document.getElementById('search').value.toLowerCase();
        const size = document.getElementById('sizeSelect').value;
        const series = document.getElementById('seriesSelect').value;
        const min = parseFloat(document.getElementById('minQty').value) || 0;
        const max = parseFloat(document.getElementById('maxQty').value) || Infinity;
        const sort = document.getElementById('sortOrder').value;

        // 2. Filter Logic
        data = data.filter(i => {
            const matchesSearch = i['Item Description'].toLowerCase().includes(search) || i['Lot No'].toString().includes(search);
            const matchesSize = !size || i.Size === size;
            const matchesSeries = !series || i.Series === series;
            const matchesQty = i.Total >= min && i.Total <= max;
            return matchesSearch && matchesSize && matchesSeries && matchesQty;
        });

        // 3. Sort Logic
        if(sort === 'az') data.sort((a,b) => a['Item Description'].localeCompare(b['Item Description']));
        if(sort === 'za') data.sort((a,b) => b['Item Description'].localeCompare(a['Item Description']));
        if(sort === 'high') data.sort((a,b) => b.Total - a.Total);
        if(sort === 'low') data.sort((a,b) => a.Total - b.Total);

        render(data);
        updateCounters(data);
    }

    function render(data) {
        const grid = document.getElementById('grid');
        grid.innerHTML = data.map(i => `
            <div class="p-card">
                <div class="img-wrap" onclick="viewHD('${i.ImgUrl}')">
                    <img src="${i.ImgUrl}" loading="lazy">
                </div>
                <div class="p-details">
                    <div class="p-series">${i.Series} | LOT: ${i['Lot No']}</div>
                    <div class="p-name">${i['Item Description']}</div>
                    <div style="font-size:12px; color:#64748b">Size: ${i.Size}</div>
                    <div class="p-stock">
                        <div class="p-qty">${i.Total} <small style="font-size:10px">SQM</small></div>
                        <button onclick="alert('Booking ${i['Item Description']}')" style="padding:8px 12px; border-radius:8px; border:none; background:#eff6ff; color:var(--accent); font-weight:700; cursor:pointer;">Book</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateCounters(data) {
        document.getElementById('stat1').innerText = data.length;
        document.getElementById('stat2').innerText = Math.round(data.reduce((a,b) => a + (parseFloat(b.Total) || 0), 0));
        document.getElementById('stat3').innerText = data.filter(x => x.Total > 200).length;
        document.getElementById('stat4').innerText = data.filter(x => x.Total < 50).length;
    }

    function viewHD(url) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modalImg').src = url;
    }

    load();
</script>
</body>
</html>
