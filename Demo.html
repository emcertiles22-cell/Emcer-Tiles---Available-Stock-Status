<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Elite Inventory Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0c10;
            --sidebar-bg: rgba(15, 23, 42, 0.95);
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark-bg); color: #e2e8f0; font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar & Toggle Logic */
        .sidebar {
            width: 320px; background: var(--sidebar-bg); backdrop-filter: blur(25px); 
            border-right: 1px solid var(--glass-border); padding: 30px 20px; 
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; z-index: 100;
        }

        .sidebar.collapsed { margin-left: -320px; }

        .toggle-btn {
            position: fixed; left: 15px; top: 15px; background: var(--gold); 
            color: black; border: none; border-radius: 8px; width: 35px; height: 35px;
            cursor: pointer; z-index: 1001; font-weight: 800; display: flex; align-items: center; justify-content: center;
        }

        /* Font Visibility Fixes */
        .brand-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); text-align: center; margin-top: 20px; }
        
        .filter-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        
        .custom-input {
            width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            border-radius: 8px; padding: 12px; color: white !important; font-size: 14px; transition: 0.3s;
        }
        /* Dropdown options visibility fix */
        .custom-input option { background: #1a1a1a; color: white; }
        .custom-input:focus { border-color: var(--gold); outline: none; }
        .custom-input::placeholder { color: rgba(255,255,255,0.4); }

        /* Main Section */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; transition: 0.4s; }

        /* Stats & Grid */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; margin-top: 20px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center; }
        .stat-box h2 { font-size: 24px; color: white; }

        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .luxury-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; transition: 0.3s; }
        .luxury-card:hover { transform: translateY(-5px); border-color: var(--gold); }

        .image-container { width: 100%; aspect-ratio: 1/1; position: relative; background: #1a1a1a; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 15px; }
        .qty-badge { background: rgba(212, 175, 55, 0.15); color: var(--gold); padding: 10px; border-radius: 10px; font-weight: 800; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }

        /* Branding Footer */
        .main-footer { text-align: center; padding: 30px; font-size: 11px; color: #64748b; }
        .main-footer b { color: var(--gold); }

        #loader { position: fixed; inset: 0; background: var(--dark-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: var(--gold); }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰</button>
<div id="loader">LOADING EMCER ELITE...</div>

<div class="sidebar" id="sidebar">
    <div class="brand-header">
        <h1>EMCER</h1>
        <p style="text-align: center; font-size: 9px; letter-spacing: 2px;">ELITE COLLECTION</p>
    </div>

    <div class="filter-group">
        <label class="filter-label">Quick Search</label>
        <input type="text" id="srch" class="custom-input" placeholder="Search Design..." oninput="refresh()">
    </div>

    <div class="filter-group">
        <label class="filter-label">Size</label>
        <select id="sizeF" class="custom-input" onchange="refresh()">
            <option value="">All Sizes</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="filter-label">Quantity Range</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="minQ" class="custom-input" placeholder="Min" oninput="refresh()">
            <input type="number" id="maxQ" class="custom-input" placeholder="Max" oninput="refresh()">
        </div>
    </div>

    <div class="filter-group">
        <label class="filter-label">Sort Order</label>
        <select id="sortF" class="custom-input" onchange="refresh()">
            <option value="lot">Lot: Newest First</option>
            <option value="qty-h">Qty: High to Low</option>
        </select>
    </div>

    <button onclick="window.print()" style="margin-top:20px; padding:12px; background:transparent; color:var(--gold); border: 1px solid var(--gold); border-radius:8px; cursor:pointer; font-weight:800;">
        EXPORT ELITE REPORT
    </button>
</div>

<div class="main-content">
    <div class="stats-row">
        <div class="stat-box"><small>Total Items</small><h2 id="st1">0</h2></div>
        <div class="stat-box"><small>Total Inventory</small><h2 id="st2">0</h2></div>
        <div class="stat-box"><small>Collections</small><h2 id="st3">0</h2></div>
        <div class="stat-box"><small>Low Stock</small><h2 id="st4" style="color: #f87171;">0</h2></div>
    </div>

    <div class="inventory-grid" id="container"></div>
    
    <div class="main-footer">
        Emcer Tiles Private Limited <br>
        Designed & Developed by - <b>Yashdeep Jivani</b>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    async function fetchData() {
        // Ahi tamari Web App URL mukvani chhe
        const url = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; 
        try {
            const res = await fetch(url);
            const data = await res.json();
            return data;
        } catch (e) { console.error("Error fetching data", e); return []; }
    }

    let masterData = [];

    async function init() {
        masterData = await fetchData();
        
        // Sizes populate karo
        const sizes = [...new Set(masterData.map(d => d.Size).filter(Boolean))];
        const sizeEl = document.getElementById('sizeF');
        sizes.forEach(s => sizeEl.innerHTML += `<option value="${s}">${s}</option>`);

        document.getElementById('loader').style.display = 'none';
        refresh();
    }

    function refresh() {
        let data = [...masterData];
        const srch = document.getElementById('srch').value.toLowerCase();
        const size = document.getElementById('sizeF').value;
        const minQ = parseFloat(document.getElementById('minQ').value) || 0;
        const maxQ = parseFloat(document.getElementById('maxQ').value) || Infinity;

        data = data.filter(d => {
            const matchS = d['Item Description'].toLowerCase().includes(srch);
            const matchSz = !size || d.Size === size;
            const q = d['Net Qty'] || d.Total || 0;
            return matchS && matchSz && q >= minQ && q <= maxQ;
        });

        render(data);
        updateStats(data);
    }

    function render(data) {
        const cont = document.getElementById('container');
        cont.innerHTML = data.map(d => `
            <div class="luxury-card">
                <div class="image-container">
                    <img src="${d.ImgUrl || ''}" alt="">
                    <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:15px; font-size:10px; color:var(--gold); border:1px solid var(--gold)">
                        LOT: ${d['Lot no'] || 'N/A'}
                    </div>
                </div>
                <div class="card-body">
                    <div style="font-size:10px; color:#94a3b8; text-transform:uppercase;">${d.Series} | ${d.Size} | ${d.Variant}</div>
                    <div style="font-family:'Playfair Display'; font-size:20px; color:white; margin:5px 0;">${d['Item Description']}</div>
                    <div class="qty-badge">
                        <span style="font-size:12px; font-weight:400; color:#94a3b8;">Available Qty</span>
                        <span>${d['Net Qty'] || d.Total}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats(data) {
        document.getElementById('st1').innerText = data.length;
        const total = data.reduce((acc, curr) => acc + (parseFloat(curr['Net Qty'] || curr.Total) || 0), 0);
        document.getElementById('st2').innerText = Math.round(total);
        document.getElementById('st3').innerText = new Set(data.map(d => d.Series)).size;
        document.getElementById('st4').innerText = data.filter(d => (d['Net Qty'] || d.Total) < 100).length;
    }

    init();
</script>
</body>
</html>
