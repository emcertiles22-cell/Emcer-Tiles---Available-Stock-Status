<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Elite Inventory Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark-bg); color: #e2e8f0; font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Glassmorphism */
        .sidebar {
            width: 340px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); 
            border-right: 1px solid var(--glass-border); padding: 35px 25px; display: flex; 
            flex-direction: column; gap: 20px; overflow-y: auto;
        }
        
        .brand-header { margin-bottom: 10px; text-align: center; }
        .brand-header h1 { font-family: 'Playfair Display', serif; font-size: 34px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .brand-header p { font-size: 10px; letter-spacing: 2px; color: #94a3b8; margin-top: -5px; font-weight: 600; }

        .filter-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        
        .custom-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 12px; color: white; font-size: 14px; transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.1); }

        .qty-row { display: flex; gap: 10px; }

        /* Main Section */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; }
        
        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 18px; border: 1px solid var(--glass-border); }
        .stat-box small { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .stat-box h2 { font-size: 24px; font-weight: 800; color: white; margin-top: 5px; }

        /* Inventory Grid */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 30px; padding-bottom: 100px; }
        .luxury-card { background: var(--card-bg); border-radius: 25px; border: 1px solid var(--glass-border); overflow: hidden; transition: 0.4s; position: relative; }
        .luxury-card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .image-container { width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; color: var(--gold); border: 1px solid var(--gold); }

        .card-body { padding: 20px; }
        .card-series { font-size: 10px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 20px; color: white; margin: 5px 0; }
        
        /* QUANTITY STYLE - Fixed as per user request */
        .qty-container { background: rgba(255, 255, 255, 0.05); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-right: 3px solid var(--gold); }
        .qty-val { font-size: 22px; font-weight: 800; color: var(--gold); }
        .qty-label { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }

        .footer-flex { display: flex; justify-content: space-between; align-items: center; }
        .btn-luxury { padding: 10px 20px; background: var(--gold); color: black; border: none; border-radius: 12px; font-weight: 800; font-size: 12px; cursor: pointer; }

        /* BRANDING FOOTER */
        .main-footer { margin-top: auto; padding: 20px 0; border-top: 1px solid var(--glass-border); text-align: center; color: #64748b; font-size: 13px; }
        .main-footer b { color: var(--gold); }

        /* PDF / PRINT */
        @media print {
            body { background: white !important; color: black !important; display: block; }
            .sidebar, .stats-row, .btn-luxury, #loader { display: none !important; }
            .inventory-grid { display: block !important; padding: 0 !important; }
            .luxury-card { display: flex !important; flex-direction: row !important; height: 200px !important; margin-bottom: 15px !important; border: 1px solid #ddd !important; page-break-inside: avoid; background: white !important;}
            .image-container { width: 200px !important; height: 200px !important; }
            .card-body { flex: 1; padding: 20px !important; }
            .qty-container { background: #f1f5f9 !important; border-color: black !important; }
            .qty-val { color: black !important; }
            .dev-tag { display: block !important; position: fixed; bottom: 10px; width: 100%; text-align: center; color: black; font-weight: bold; }
        }
        .dev-tag { display: none; }
        #loader { position: fixed; inset: 0; background: var(--dark-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: var(--gold); font-weight: 800; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="loader">E M C E R . . .</div>

<div class="sidebar">
    <div class="brand-header">
        <h1>EMCER</h1>
        <p>ELITE COLLECTION</p>
    </div>

    <div class="filter-group">
        <label class="filter-label">Quick Search</label>
        <input type="text" id="srch" class="custom-input" placeholder="Name / Lot No..." oninput="refresh()">
    </div>

    <div class="filter-group">
        <label class="filter-label">Size</label>
        <select id="sizeF" class="custom-input" onchange="updateSeriesFilter(); refresh();">
            <option value="">All Sizes</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="filter-label">Series</label>
        <select id="seriesF" class="custom-input" onchange="refresh()">
            <option value="">Select Size First</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="filter-label">Quantity Range</label>
        <div class="qty-row">
            <input type="number" id="minQ" class="custom-input" placeholder="Min" oninput="refresh()">
            <input type="number" id="maxQ" class="custom-input" placeholder="Max" oninput="refresh()">
        </div>
    </div>

    <div class="filter-group">
        <label class="filter-label">Sort By</label>
        <select id="sortF" class="custom-input" onchange="refresh()">
            <option value="lot">Lot: Newest First</option>
            <option value="qty-high">Qty: High to Low</option>
            <option value="qty-low">Qty: Low to High</option>
        </select>
    </div>

    <button onclick="window.print()" style="margin-top:10px; padding:15px; background:transparent; color:var(--gold); border: 2px solid var(--gold); border-radius:12px; font-weight:800; cursor:pointer; text-transform:uppercase; font-size:12px;">
        Export Report
    </button>
</div>

<div class="main-content">
    <div class="stats-row">
        <div class="stat-box"><small>Total Items</small><h2 id="st1">0</h2></div>
        <div class="stat-box"><small>Total Inventory</small><h2 id="st2">0</h2></div>
        <div class="stat-box"><small>Collections</small><h2 id="st3">0</h2></div>
        <div class="stat-box"><small>Low Stock</small><h2 id="st4" style="color: #f87171;">0</h2></div>
    </div>
    <div class="inventory-grid" id="container"></div>
    
    <div class="main-footer">
        Emcer Tiles Private Limited <br>
        Designed & Developed by - <b>Yashdeep Jivani</b>
    </div>
</div>

<div class="dev-tag">
    Emcer Tiles Private Limited | Designed & Developed by - Yashdeep Jivani
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; // Replace with your URL
    let master = [];

    async function init() {
        try {
            const res = await fetch(API_URL);
            master = await res.json();
            
            const sizes = [...new Set(master.map(d => d.Size).filter(Boolean))];
            const sizeEl = document.getElementById('sizeF');
            sizes.forEach(sz => sizeEl.innerHTML += `<option value="${sz}">${sz}</option>`);

            document.getElementById('loader').style.display = 'none';
            refresh();
        } catch (e) { document.getElementById('loader').innerText = "FETCH ERROR"; }
    }

    function updateSeriesFilter() {
        const selSize = document.getElementById('sizeF').value;
        const seriesEl = document.getElementById('seriesF');
        seriesEl.innerHTML = '<option value="">All Series</option>';
        
        const filteredSeries = [...new Set(master.filter(x => !selSize || x.Size === selSize).map(x => x.Series).filter(Boolean))];
        filteredSeries.forEach(s => seriesEl.innerHTML += `<option value="${s}">${s}</option>`);
    }

    function refresh() {
        let data = [...master];
        const s = document.getElementById('srch').value.toLowerCase();
        const sz = document.getElementById('sizeF').value;
        const ser = document.getElementById('seriesF').value;
        const min = parseFloat(document.getElementById('minQ').value) || 0;
        const max = parseFloat(document.getElementById('maxQ').value) || Infinity;
        const srt = document.getElementById('sortF').value;

        data = data.filter(d => {
            const mS = d['Item Description'].toLowerCase().includes(s) || d['Lot No'].toString().includes(s);
            const mSz = !sz || d.Size === sz;
            const mSer = !ser || d.Series === ser;
            const mQ = d.Total >= min && d.Total <= max;
            return mS && mSz && mSer && mQ;
        });

        if(srt === 'lot') data.sort((a,b) => b['Lot No'].toString().localeCompare(a['Lot No'].toString()));
        if(srt === 'qty-high') data.sort((a,b) => b.Total - a.Total);
        if(srt === 'qty-low') data.sort((a,b) => a.Total - b.Total);

        render(data);
        updateStats(data);
    }

    function render(data) {
        const cont = document.getElementById('container');
        cont.innerHTML = data.map(d => `
            <div class="luxury-card">
                <div class="image-container">
                    <div class="floating-badge">LOT: ${d['Lot No']}</div>
                    <img src="${d.ImgUrl}" crossorigin="anonymous" loading="eager">
                </div>
                <div class="card-body">
                    <div class="card-series">${d.Series} | ${d.Size}</div>
                    <div class="card-title">${d['Item Description']}</div>
                    
                    <div class="qty-container">
                        <div class="qty-label">Available Qty</div>
                        <div class="qty-val">${d.Total}</div>
                    </div>

                    <div class="footer-flex">
                        <button class="btn-luxury" onclick="alert('Booking ${d['Item Description']}')">BOOK STOCK</button>
                        <div style="font-size:10px; color:#64748b">ID: ${d['Common Item No'] || 'N/A'}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats(data) {
        document.getElementById('st1').innerText = data.length;
        document.getElementById('st2').innerText = Math.round(data.reduce((a, b) => a + b.Total, 0)).toLocaleString();
        document.getElementById('st3').innerText = new Set(data.map(d => d.Series)).size;
        document.getElementById('st4').innerText = data.filter(d => d.Total < 50).length;
    }

    init();
</script>
</body>
</html>
