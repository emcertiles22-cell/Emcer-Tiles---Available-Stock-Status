<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Elite Inventory Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0c10;
            --sidebar-bg: rgba(15, 23, 42, 0.98);
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Basic Layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark-bg); color: #e2e8f0; font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar & Toggle */
        .sidebar {
            width: 320px; background: var(--sidebar-bg); backdrop-filter: blur(30px); 
            border-right: 1px solid var(--glass-border); padding: 30px 20px; 
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; z-index: 100;
        }
        .sidebar.collapsed { margin-left: -320px; }

        .toggle-btn {
            position: fixed; left: 15px; top: 15px; background: var(--gold); 
            color: black; border: none; border-radius: 8px; width: 35px; height: 35px;
            cursor: pointer; z-index: 1001; font-weight: 800; display: flex; align-items: center; justify-content: center;
        }

        /* Filter Font Visibility Fixes */
        .filter-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; display: block; }
        .custom-input {
            width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 12px; color: #ffffff !important; font-size: 14px; transition: 0.3s;
        }
        .custom-input option { background: #0f172a; color: white; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; transition: 0.4s; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; margin-top: 20px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center; }
        .stat-box h2 { font-size: 26px; color: white; }

        /* Card & Table Logic */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .luxury-card { background: var(--card-bg); border-radius: 25px; border: 1px solid var(--glass-border); overflow: hidden; transition: 0.4s; }
        .image-container { width: 100%; height: 240px; background: #1a1a1a; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 20px; }
        .card-header-info { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 22px; color: white; margin-bottom: 15px; }

        .lot-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 12px; }
        .lot-table th { text-align: left; color: #64748b; padding: 8px; border-bottom: 1px solid var(--glass-border); }
        .lot-table td { padding: 8px; color: #e2e8f0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .lot-total-row { background: rgba(212, 175, 55, 0.1); font-weight: 800; color: var(--gold); }

        .btn-book { width: 100%; padding: 12px; background: var(--gold); color: black; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* Multi-Page COLORFUL PDF Styling */
        @media print {
            @page { size: A4; margin: 0; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: #0a0c10 !important; }
            .sidebar, .toggle-btn, .btn-book, #loader { display: none !important; }
            .main-content { padding: 20px !important; width: 100% !important; overflow: visible !important; }
            .inventory-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 20px !important; }
            .luxury-card { page-break-inside: avoid !important; border: 1px solid var(--gold) !important; background: rgba(255,255,255,0.05) !important; }
            .card-title { color: var(--gold) !important; }
        }

        #loader { position: fixed; inset: 0; background: var(--dark-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: var(--gold); letter-spacing: 5px; }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
<div id="loader">E M C E R . . .</div>

<div class="sidebar" id="sidebar">
    <div style="text-align: center; margin-top: 20px;">
        <h1 style="font-family: 'Playfair Display'; color: var(--gold); font-size: 30px;">EMCER</h1>
        <p style="font-size: 9px; letter-spacing: 3px; color: #94a3b8; margin-bottom: 20px;">ELITE COLLECTION</p>
    </div>

    <div class="filter-group"><label class="filter-label">Quick Search</label><input type="text" id="srch" class="custom-input" placeholder="Design / Lot..." oninput="refresh()"></div>
    
    <div class="filter-group">
        <label class="filter-label">Size</label>
        <select id="sizeF" class="custom-input" onchange="updateSubFilters(); refresh();">
            <option value="">All Sizes</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="filter-label">Surface / Series</label>
        <select id="surfaceF" class="custom-input" onchange="refresh()">
            <option value="">Select Size First</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="filter-label">Grade</label>
        <select id="gradeF" class="custom-input" onchange="refresh()">
            <option value="">Select Size First</option>
        </select>
    </div>

    <button onclick="window.print()" style="margin-top:20px; padding:15px; background:transparent; color:var(--gold); border: 1px solid var(--gold); border-radius:12px; font-weight:800; cursor:pointer;">EXPORT COLORFUL REPORT</button>
</div>

<div class="main-content">
    <div class="stats-row">
        <div class="stat-box"><small style="color:var(--gold)">Active Designs</small><h2 id="st1">0</h2></div>
        <div class="stat-box"><small style="color:var(--gold)">Total Inventory</small><h2 id="st2">0</h2></div>
        <div class="stat-box"><small style="color:var(--gold)">Collections</small><h2 id="st3">0</h2></div>
        <div class="stat-box"><small style="color:var(--gold)">Low Stock</small><h2 id="st4" style="color: #f87171;">0</h2></div>
    </div>
    <div class="inventory-grid" id="container"></div>
    <div style="text-align: center; padding: 40px; font-size: 11px; color: #64748b;">
        Emcer Tiles Private Limited | Designed & Developed by - <b>Yashdeep Jivani</b>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; 
    let masterData = [];

    async function init() {
        try {
            const res = await fetch(API_URL);
            masterData = await res.json();
            const sizes = [...new Set(masterData.map(d => d.Size).filter(Boolean))];
            const sizeEl = document.getElementById('sizeF');
            sizes.forEach(s => sizeEl.innerHTML += `<option value="${s}">${s}</option>`);
            document.getElementById('loader').style.display = 'none';
            refresh();
        } catch (e) { console.error(e); }
    }

    function updateSubFilters() {
        const selSize = document.getElementById('sizeF').value;
        const filtered = masterData.filter(d => !selSize || d.Size === selSize);
        const surfaceEl = document.getElementById('surfaceF');
        const gradeEl = document.getElementById('gradeF');
        surfaceEl.innerHTML = '<option value="">All Surfaces</option>';
        gradeEl.innerHTML = '<option value="">All Grades</option>';
        [...new Set(filtered.map(d => d.Series))].forEach(s => surfaceEl.innerHTML += `<option value="${s}">${s}</option>`);
        [...new Set(filtered.map(d => d.Variant))].forEach(v => gradeEl.innerHTML += `<option value="${v}">${v}</option>`);
    }

    function refresh() {
        let raw = [...masterData];
        const s = document.getElementById('srch').value.toLowerCase();
        const sz = document.getElementById('sizeF').value;
        const surf = document.getElementById('surfaceF').value;
        const grd = document.getElementById('gradeF').value;

        let filtered = raw.filter(d => {
            const mSearch = d['Item Description'].toLowerCase().includes(s) || (d['Lot no.'] || d['Lot no'] || "").toString().includes(s);
            const mSize = !sz || d.Size === sz;
            const mSurf = !surf || d.Series === surf;
            const mGrd = !grd || d.Variant === grd;
            return mSearch && mSize && mSurf && mGrd;
        });

        const groups = {};
        filtered.forEach(d => {
            const key = `${d['Item Description']}-${d.Size}-${d.Variant}`;
            if (!groups[key]) groups[key] = { ...d, lots: [] };
            // Undefined fix: exact lot number mapping
            groups[key].lots.push({ 
                no: d['Lot no.'] || d['Lot no'] || d['LOT NO'] || 'N/A', 
                qty: d['Net Qty'] || d.Total || 0 
            });
        });

        const mergedList = Object.values(groups);
        render(mergedList);
        updateStats(filtered, mergedList);
    }

    function render(data) {
        const cont = document.getElementById('container');
        cont.innerHTML = data.map(d => {
            const totalStock = d.lots.reduce((acc, l) => acc + parseFloat(l.qty || 0), 0);
            return `
            <div class="luxury-card">
                <div class="image-container"><img src="${d.ImgUrl || ''}"></div>
                <div class="card-body">
                    <div class="card-header-info">${d.Series} | ${d.Size} | GRADE: ${d.Variant}</div>
                    <div class="card-title">${d['Item Description']}</div>
                    <table class="lot-table">
                        <thead><tr><th>Lot No.</th><th style="text-align:right">Qty</th></tr></thead>
                        <tbody>
                            ${d.lots.map(l => `<tr><td>${l.no}</td><td style="text-align:right">${l.qty}</td></tr>`).join('')}
                            <tr class="lot-total-row"><td>TOTAL STOCK</td><td style="text-align:right">${totalStock}</td></tr>
                        </tbody>
                    </table>
                    <button class="btn-book">BOOK STOCK</button>
                    <div style="text-align:right; font-size:9px; color:#444; margin-top:10px;">ID: ${d['Common Item No'] || 'N/A'}</div>
                </div>
            </div>`;
        }).join('');
    }

    function updateStats(raw, merged) {
        document.getElementById('st1').innerText = merged.length;
        document.getElementById('st2').innerText = Math.round(raw.reduce((acc, curr) => acc + (parseFloat(curr['Net Qty'] || curr.Total) || 0), 0)).toLocaleString();
        document.getElementById('st3').innerText = new Set(raw.map(d => d.Series)).size;
        document.getElementById('st4').innerText = raw.filter(d => (d['Net Qty'] || d.Total) < 100).length;
    }

    init();
</script>
</body>
</html>
