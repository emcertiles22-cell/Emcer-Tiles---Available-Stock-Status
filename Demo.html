<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Ultra-Pro Inventory Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --surface: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; color: #334155; }

        /* Sidebar Controller */
        .sidebar {
            width: 320px; background: white; border-right: 1px solid #e2e8f0;
            padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
        }
        .sidebar h2 { font-size: 22px; font-weight: 800; color: var(--brand); margin-bottom: 10px; }
        
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group select, .filter-group input {
            padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; transition: 0.3s;
        }
        .filter-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; position: relative; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .stat-card span { font-size: 12px; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .stat-card div { font-size: 26px; font-weight: 800; margin-top: 5px; color: var(--brand); }

        /* Inventory Cards */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .p-card {
            background: white; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .p-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .img-wrap { width: 100%; padding-top: 100%; position: relative; background: #f1f5f9; cursor: zoom-in; }
        .img-wrap img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; transition: 0.5s; }
        .p-card:hover .img-wrap img { transform: scale(1.08); }
        
        .p-details { padding: 20px; }
        .p-series { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
        .p-name { font-size: 18px; font-weight: 700; color: var(--brand); margin-bottom: 12px; line-height: 1.2; }
        
        .lot-badge { 
            display: inline-block; padding: 4px 10px; background: #f1f5f9; 
            border-radius: 8px; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 15px;
        }

        .p-stock-info { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            padding-top: 15px; border-top: 1px solid #f1f5f9; 
        }
        .p-qty { font-size: 24px; font-weight: 800; color: #059669; letter-spacing: -0.5px; }
        .p-qty small { font-size: 12px; color: #94a3b8; margin-left: 4px; }

        .btn-book {
            padding: 10px 20px; background: var(--brand); color: white; border: none;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-book:hover { background: var(--accent); }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PDF & Print Setup */
        .dev-footer { display: none; }
        
        @media print {
            body { display: block; background: white; }
            .sidebar, .stats-grid, .btn-book, #loader { display: none !important; }
            .main-content { padding: 0 !important; overflow: visible; }
            .inventory-grid { display: block !important; }
            .p-card { 
                display: flex !important; flex-direction: row !important; 
                width: 100% !important; height: 200px !important; 
                margin-bottom: 15px !important; page-break-inside: avoid;
                border: 1px solid #ddd !important;
            }
            .img-wrap { width: 200px !important; height: 200px !important; padding-top: 0 !important; }
            .img-wrap img { position: relative !important; object-fit: contain !important; }
            .p-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
            .dev-footer { 
                display: block !important; position: fixed; bottom: 10px; right: 20px; 
                font-size: 12px; font-weight: 800; color: #000; 
            }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>Fetching Live Inventory...</p>
</div>

<div class="sidebar">
    <h2>Inventory</h2>
    
    <div class="filter-group">
        <label>Search Design / Lot</label>
        <input type="text" id="searchInput" placeholder="Type here..." oninput="filterData()">
    </div>

    <div class="filter-group">
        <label>Filter by Size</label>
        <select id="sizeFilter" onchange="filterData()">
            <option value="">All Sizes</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Sort By</label>
        <select id="sortFilter" onchange="filterData()">
            <option value="lot-asc">Lot No: Ascending</option>
            <option value="qty-desc">Quantity: High to Low</option>
            <option value="name-asc">Name: A to Z</option>
        </select>
    </div>

    <button onclick="window.print()" style="margin-top:20px; padding:15px; background:var(--brand); color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer;">
        Download PDF Report
    </button>
</div>

<div class="main-content">
    <div class="stats-grid">
        <div class="stat-card"><span>Total Designs</span><div id="count-designs">0</div></div>
        <div class="stat-card"><span>Total SQM</span><div id="count-sqm">0</div></div>
        <div class="stat-card"><span>Active Series</span><div id="count-series">0</div></div>
        <div class="stat-card"><span>Low Stock</span><div id="count-low" style="color:#ef4444">0</div></div>
    </div>

    <div class="inventory-grid" id="grid"></div>
</div>

<div class="dev-footer">Developer: Yashdeep Jivani</div>

<script>
    // Tamari Web App ni URL ahi nakho
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; // POTANO URL NAKHO
    let masterData = [];

    async function fetchData() {
        try {
            const response = await fetch(WEB_APP_URL);
            masterData = await response.json();
            
            // Size filter populate karo
            const sizes = [...new Set(masterData.map(item => item.Size).filter(Boolean))];
            const sizeSelect = document.getElementById('sizeFilter');
            sizes.forEach(sz => {
                const opt = document.createElement('option');
                opt.value = sz;
                opt.innerText = sz;
                sizeSelect.appendChild(opt);
            });

            document.getElementById('loader').style.display = 'none';
            filterData();
        } catch (error) {
            console.error("Data Fetch Error:", error);
            alert("Error loading data. Check your Web App URL and Deployment settings.");
        }
    }

    function filterData() {
        let filtered = [...masterData];
        const search = document.getElementById('searchInput').value.toLowerCase();
        const size = document.getElementById('sizeFilter').value;
        const sort = document.getElementById('sortFilter').value;

        // Filtering
        filtered = filtered.filter(item => {
            const matchSearch = item['Item Description'].toLowerCase().includes(search) || 
                                item['Lot No'].toString().toLowerCase().includes(search);
            const matchSize = !size || item.Size === size;
            return matchSearch && matchSize;
        });

        // Sorting
        if (sort === 'lot-asc') filtered.sort((a, b) => a['Lot No'].toString().localeCompare(b['Lot No'].toString()));
        if (sort === 'qty-desc') filtered.sort((a, b) => b.Total - a.Total);
        if (sort === 'name-asc') filtered.sort((a, b) => a['Item Description'].localeCompare(b['Item Description']));

        renderGrid(filtered);
        updateStats(filtered);
    }

    function renderGrid(data) {
        const grid = document.getElementById('grid');
        grid.innerHTML = data.map(item => `
            <div class="p-card">
                <div class="img-wrap">
                    <img src="${item.ImgUrl}" crossorigin="anonymous" loading="eager">
                </div>
                <div class="p-details">
                    <div class="p-series">${item.Series || 'PREMIUM'} | ${item.Grade || 'PRE'}</div>
                    <div class="p-name">${item['Item Description']}</div>
                    <div class="lot-badge">LOT: ${item['Lot No']}</div>
                    <div style="font-size:12px; color:#94a3b8; margin-bottom:10px;">Size: ${item.Size}</div>
                    <div class="p-stock-info">
                        <div class="p-qty">${item.Total}<small>SQM</small></div>
                        <button class="btn-book">Book</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats(data) {
        document.getElementById('count-designs').innerText = data.length;
        document.getElementById('count-sqm').innerText = Math.round(data.reduce((acc, curr) => acc + curr.Total, 0)).toLocaleString();
        document.getElementById('count-series').innerText = new Set(data.map(i => i.Series)).size;
        document.getElementById('count-low').innerText = data.filter(i => i.Total < 50).length;
    }

    fetchData();
</script>

</body>
</html>
