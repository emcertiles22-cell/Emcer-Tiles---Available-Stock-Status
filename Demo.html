<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Elite Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0c10; --card-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark-bg); color: #e2e8f0; font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* UI Elements */
        .sidebar { width: 320px; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(30px); border-right: 1px solid var(--glass-border); padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; transition: 0.4s; }
        .sidebar.collapsed { margin-left: -320px; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; transition: 0.4s; position: relative; }

        /* Filters */
        .filter-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; display: block; }
        .custom-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; color: white; font-size: 14px; }

        /* Inventory Cards */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 30px; }
        .luxury-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; page-break-inside: avoid; }
        .image-container { width: 100%; height: 250px; background: #1a1a1a; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 22px; color: white; margin-bottom: 12px; }

        /* Table Logic */
        .lot-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
        .lot-table th { text-align: left; color: #64748b; padding: 8px; border-bottom: 1px solid var(--glass-border); }
        .lot-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .lot-total-row { background: rgba(212, 175, 55, 0.1); font-weight: 800; color: var(--gold); }

        /* PDF & PRINT SETUP FIX */
        @media print {
            @page { size: A4; margin: 15mm 10mm; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; background: #000 !important; }
            .sidebar, .toggle-btn, .btn-book, .stats-row, #loader { display: none !important; }
            .main-content { padding: 0 !important; overflow: visible !important; width: 100% !important; }
            
            .pdf-header { display: block !important; text-align: center; color: var(--gold); font-family: 'Playfair Display'; font-size: 32px; margin-bottom: 40px; }
            
            .inventory-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 20px !important; overflow: visible !important; }
            .luxury-card { border: 1px solid #333 !important; background: #000 !important; margin-bottom: 10px; }
            .card-title { color: var(--gold) !important; }
            
            .main-footer { display: block !important; position: fixed; bottom: 10mm; width: 100%; text-align: center; color: #888 !important; font-size: 12px; border-top: 1px solid #333; padding-top: 10px; }
        }

        .pdf-header, .main-footer { display: none; }
        #loader { position: fixed; inset: 0; background: var(--dark-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: var(--gold); }
    </style>
</head>
<body>

<div id="loader">LOADING EMCER...</div>

<div class="sidebar" id="sidebar">
    <h1 style="color: var(--gold); text-align: center; font-family: 'Playfair Display';">EMCER</h1>
    <div class="filter-group"><label class="filter-label">Search</label><input type="text" id="srch" class="custom-input" oninput="refresh()"></div>
    <div class="filter-group"><label class="filter-label">Size</label><select id="sizeF" class="custom-input" onchange="updateSubFilters(); refresh();"><option value="">All Sizes</option></select></div>
    <div class="filter-group"><label class="filter-label">Surface</label><select id="surfaceF" class="custom-input" onchange="refresh()"><option value="">All</option></select></div>
    <button onclick="window.print()" style="margin-top:20px; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:800; cursor:pointer;">PRINT PDF REPORT</button>
</div>

<div class="main-content">
    <div class="pdf-header">EMCER TILES PRIVATE LIMITED</div>
    <div class="inventory-grid" id="container"></div>
    <div class="main-footer">
        Emcer Tiles Private Limited | Designed & Developed by - <b>Yashdeep Jivani</b>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; 
    let masterData = [];

    async function init() {
        try {
            const res = await fetch(API_URL);
            masterData = await res.json();
            const sizes = [...new Set(masterData.map(d => d.Size).filter(Boolean))];
            sizes.forEach(s => document.getElementById('sizeF').innerHTML += `<option value="${s}">${s}</option>`);
            document.getElementById('loader').style.display = 'none';
            refresh();
        } catch (e) { console.error(e); }
    }

    function refresh() {
        const s = document.getElementById('srch').value.toLowerCase();
        const sz = document.getElementById('sizeF').value;
        const surf = document.getElementById('surfaceF').value;

        let filtered = masterData.filter(d => {
            // Batch/Lot mapping check
            const lot = (d['Lot no.'] || d['Lot no'] || d['Batch No'] || d['LOT'] || "").toString().toLowerCase();
            return d['Item Description'].toLowerCase().includes(s) || lot.includes(s) && (!sz || d.Size === sz) && (!surf || d.Series === surf);
        });

        const groups = {};
        filtered.forEach(d => {
            const key = `${d['Item Description']}-${d.Size}`;
            if (!groups[key]) groups[key] = { ...d, lots: [] };
            
            // Critical Fix: Ensuring lot number is captured from any possible header name
            const lotNo = d['Lot no.'] || d['Lot no'] || d['Batch No'] || d['LOT'] || 'N/A';
            groups[key].lots.push({ no: lotNo, qty: d['Net Qty'] || d.Total || 0 });
        });

        render(Object.values(groups));
    }

    function render(data) {
        const cont = document.getElementById('container');
        cont.innerHTML = data.map(d => {
            const totalStock = d.lots.reduce((acc, l) => acc + parseFloat(l.qty || 0), 0);
            return `
            <div class="luxury-card">
                <div class="image-container"><img src="${d.ImgUrl || ''}"></div>
                <div class="card-body">
                    <div style="font-size:10px; color:var(--gold);">${d.Series} | ${d.Size}</div>
                    <div class="card-title">${d['Item Description']}</div>
                    <table class="lot-table">
                        <thead><tr><th>Batch / Lot No.</th><th style="text-align:right">Qty</th></tr></thead>
                        <tbody>
                            ${d.lots.map(l => `<tr><td>${l.no}</td><td style="text-align:right">${l.qty}</td></tr>`).join('')}
                            <tr class="lot-total-row"><td>TOTAL STOCK</td><td style="text-align:right">${totalStock}</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>`;
        }).join('');
    }

    init();
</script>
</body>
</html>
