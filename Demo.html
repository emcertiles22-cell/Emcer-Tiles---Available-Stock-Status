<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Inventory System | EMCER</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2563eb;
            --bg-light: #f1f5f9;
            --surface: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-light); color: var(--text-dark); }

        .dashboard { max-width: 1400px; margin: auto; padding: 20px; }

        /* Stats Bar */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface); padding: 20px; border-radius: 16px;
            box-shadow: var(--shadow); border-left: 5px solid var(--brand);
        }
        .stat-card small { color: var(--text-muted); font-size: 14px; font-weight: 500; }
        .stat-card h2 { font-size: 28px; margin-top: 5px; }

        /* Multi-Filter Sidebar & Header */
        .controls-wrapper {
            background: var(--surface); padding: 25px; border-radius: 20px;
            box-shadow: var(--shadow); margin-bottom: 30px;
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px;
            position: sticky; top: 15px; z-index: 100;
        }

        .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--brand); margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px;
            outline: none; transition: 0.3s; font-family: inherit;
        }
        .input-group input:focus { border-color: var(--brand); }

        /* Products Grid */
        .inventory-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Luxury Card Design */
        .tile-card {
            background: var(--surface); border-radius: 24px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative;
        }
        .tile-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }

        .image-wrapper { position: relative; padding-top: 110%; overflow: hidden; cursor: zoom-in; }
        .image-wrapper img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; transition: 0.6s; }
        .tile-card:hover .image-wrapper img { scale: 1.1; transform: rotate(1deg); }

        .floating-lot {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(15, 23, 42, 0.8); color: white;
            padding: 5px 12px; border-radius: 10px; font-size: 12px; backdrop-filter: blur(5px);
        }

        .card-content { padding: 20px; }
        .tag { font-size: 10px; background: #eff6ff; color: var(--brand); padding: 4px 10px; border-radius: 50px; font-weight: 700; }
        
        .product-title { font-size: 18px; font-weight: 700; margin: 10px 0 5px 0; letter-spacing: -0.5px; }
        .product-meta { color: var(--text-muted); font-size: 13px; margin-bottom: 15px; }

        .stock-info {
            display: flex; justify-content: space-between; align-items: flex-end;
            background: #f8fafc; padding: 15px; border-radius: 15px;
        }
        .qty-box span { display: block; font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .qty-box b { font-size: 22px; color: var(--text-dark); }
        
        .book-btn {
            background: var(--brand); color: white; border: none; padding: 12px 20px;
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .book-btn:hover { background: #1e40af; transform: scale(1.05); }

        /* Full Screen Viewer */
        .viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; justify-content: center; align-items: center; padding: 40px;
        }
        .viewer img { max-width: 100%; max-height: 90vh; border-radius: 10px; }
        .close-viewer { position: absolute; top: 30px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        @media (max-width: 900px) {
            .controls-wrapper { grid-template-columns: 1fr 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stats-grid">
        <div class="stat-card">
            <small>Total Designs</small>
            <h2 id="count-designs">0</h2>
        </div>
        <div class="stat-card" style="border-color: #10b981;">
            <small>Total Stock (SQM)</small>
            <h2 id="count-stock">0</h2>
        </div>
        <div class="stat-card" style="border-color: #f59e0b;">
            <small>Series Active</small>
            <h2 id="count-series">0</h2>
        </div>
        <div class="stat-card" style="border-color: #ef4444;">
            <small>Low Stock Items</small>
            <h2 id="count-low">0</h2>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="input-group">
            <label>Search Inventory</label>
            <input type="text" id="searchInp" placeholder="Type design or lot number..." onkeyup="applyFilters()">
        </div>
        <div class="input-group">
            <label>Series</label>
            <select id="seriesFilt" onchange="applyFilters()">
                <option value="">All Series</option>
            </select>
        </div>
        <div class="input-group">
            <label>Size</label>
            <select id="sizeFilt" onchange="applyFilters()">
                <option value="">All Sizes</option>
            </select>
        </div>
        <div class="input-group">
            <label>Availability</label>
            <select id="stockFilt" onchange="applyFilters()">
                <option value="all">All Items</option>
                <option value="high">High Stock (>100)</option>
                <option value="low">Low Stock (<50)</option>
            </select>
        </div>
    </div>

    <div class="inventory-grid" id="gridBody">
        </div>
</div>

<div class="viewer" id="imgViewer">
    <span class="close-viewer" onclick="this.parentElement.style.display='none'">&times;</span>
    <img id="viewImg" src="">
</div>

<script>
    const API_URL = "https://script.google.com/macros/library/d/1up863PvANTBi5mitMIWSXAfGTOXFgWS2DIzzyWzGBXDyndkLSQL3Q_ei/2"; 
    let masterData = [];

    async function init() {
        const response = await fetch(API_URL);
        masterData = await response.json();
        
        populateFilters();
        updateStats(masterData);
        renderCards(masterData);
    }

    function populateFilters() {
        const series = [...new Set(masterData.map(d => d.Series).filter(Boolean))];
        const sizes = [...new Set(masterData.map(d => d.Size).filter(Boolean))];
        
        const serEl = document.getElementById('seriesFilt');
        const sizEl = document.getElementById('sizeFilt');
        
        series.forEach(s => serEl.innerHTML += `<option value="${s}">${s}</option>`);
        sizes.forEach(sz => sizEl.innerHTML += `<option value="${sz}">${sz}</option>`);
    }

    function updateStats(data) {
        document.getElementById('count-designs').innerText = data.length;
        document.getElementById('count-stock').innerText = Math.round(data.reduce((acc, curr) => acc + (parseFloat(curr.Total) || 0), 0));
        document.getElementById('count-series').innerText = new Set(data.map(d => d.Series)).size;
        document.getElementById('count-low').innerText = data.filter(d => d.Total < 50).length;
    }

    function renderCards(data) {
        const grid = document.getElementById('gridBody');
        grid.innerHTML = "";

        data.forEach(item => {
            const card = `
                <div class="tile-card" data-name="${item['Item Description']}" data-series="${item.Series}" data-size="${item.Size}" data-qty="${item.Total}">
                    <div class="image-wrapper" onclick="openViewer('${item.ImgUrl}')">
                        <img src="${item.ImgUrl}" loading="lazy">
                        <div class="floating-lot">LOT: ${item['Lot No']}</div>
                    </div>
                    <div class="card-content">
                        <span class="tag">${item.Series || 'COLLECTION'}</span>
                        <h3 class="product-title">${item['Item Description']}</h3>
                        <div class="product-meta">Size: ${item.Size} | Variant: ${item.Variant || 'PRE'}</div>
                        <div class="stock-info">
                            <div class="qty-box">
                                <span>NET AVAILABLE</span>
                                <b>${item.Total}</b>
                            </div>
                            <button class="book-btn" onclick="requestBooking('${item['Item Description']}')">Book</button>
                        </div>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', card);
        });
    }

    function applyFilters() {
        const search = document.getElementById('searchInp').value.toLowerCase();
        const series = document.getElementById('seriesFilt').value;
        const size = document.getElementById('sizeFilt').value;
        const stock = document.getElementById('stockFilt').value;

        const cards = document.querySelectorAll('.tile-card');
        
        cards.forEach(card => {
            const q = parseFloat(card.dataset.qty);
            const matchSearch = card.dataset.name.toLowerCase().includes(search);
            const matchSeries = !series || card.dataset.series === series;
            const matchSize = !size || card.dataset.size === size;
            let matchStock = true;
            if(stock === 'high') matchStock = q > 100;
            if(stock === 'low') matchStock = q < 50;

            card.style.display = (matchSearch && matchSeries && matchSize && matchStock) ? "block" : "none";
        });
    }

    function openViewer(url) {
        document.getElementById('imgViewer').style.display = 'flex';
        document.getElementById('viewImg').src = url;
    }

    function requestBooking(name) {
        alert("Redirecting to booking for: " + name);
        // Add your doPost call here
    }

    init();
</script>

</body>
</html>
