<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCER | Elite Inventory Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--dark-bg); 
            color: #e2e8f0; 
            font-family: 'Outfit', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar Glassmorphism */
        .sidebar {
            width: 340px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
            padding: 40px 30px; display: flex; flex-direction: column; gap: 25px;
        }
        
        .brand-header { margin-bottom: 20px; text-align: center; }
        .brand-header h1 { 
            font-family: 'Playfair Display', serif; font-size: 38px; color: var(--gold);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .brand-header p { font-size: 10px; letter-spacing: 4px; color: #94a3b8; margin-top: -5px; }

        .filter-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
        
        .custom-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 14px; color: white; font-size: 14px; transition: 0.4s;
        }
        .custom-input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.1); }

        /* Main Section */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        
        /* Stats Styling */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-box { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            border: 1px solid var(--glass-border); position: relative; overflow: hidden;
        }
        .stat-box::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); }
        .stat-box small { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
        .stat-box h2 { font-size: 28px; font-weight: 800; color: white; margin-top: 8px; }

        /* Fancy Inventory Cards */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; }
        
        .luxury-card {
            background: var(--card-bg); border-radius: 30px; border: 1px solid var(--glass-border);
            overflow: hidden; transition: all 0.5s ease; position: relative;
        }
        .luxury-card:hover { transform: translateY(-15px); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .image-container { width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .luxury-card:hover .image-container img { scale: 1.15; filter: brightness(1.1); }

        .floating-badge {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); padding: 6px 14px; border-radius: 30px;
            font-size: 11px; font-weight: 700; color: var(--gold); border: 1px solid var(--gold);
        }

        .card-body { padding: 25px; }
        .card-series { font-size: 10px; font-weight: 700; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 22px; color: white; margin: 8px 0; }
        
        .lot-info { font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .lot-info b { color: var(--gold); }

        .footer-flex { display: flex; justify-content: space-between; align-items: center; }
        .qty-display { font-size: 26px; font-weight: 800; color: #10b981; font-family: 'Outfit'; }
        .qty-display small { font-size: 12px; color: #64748b; font-weight: 400; margin-left: 5px; }

        .btn-luxury {
            padding: 12px 25px; background: var(--gold); color: black; border: none;
            border-radius: 14px; font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .btn-luxury:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* PDF Styling */
        .dev-tag { display: none; }

        @media print {
            body { background: white !important; color: black !important; display: block; }
            .sidebar, .stats-row, .btn-luxury, #loader { display: none !important; }
            .main-content { padding: 0 !important; width: 100% !important; overflow: visible; }
            .inventory-grid { display: block !important; }
            .luxury-card { 
                display: flex !important; flex-direction: row !important; height: 250px !important; 
                margin-bottom: 20px !important; border: 1px solid #ddd !important; border-radius: 15px !important; 
                background: white !important; page-break-inside: avoid;
            }
            .image-container { width: 250px !important; height: 250px !important; }
            .image-container img { object-fit: contain !important; }
            .card-body { flex: 1; padding: 30px !important; display: flex; flex-direction: column; justify-content: center; }
            .card-title { font-size: 28px !important; color: black !important; }
            .dev-tag { display: block !important; position: fixed; bottom: 10px; right: 20px; font-weight: bold; font-size: 14px; }
            .floating-badge { color: black !important; border-color: black !important; }
        }

        #loader { position: fixed; inset: 0; background: var(--dark-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: var(--gold); font-weight: 800; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="loader">E M C E R . . .</div>

<div class="sidebar">
    <div class="brand-header">
        <h1>EMCER</h1>
        <p>ELITE COLLECTION</p>
    </div>

    <div class="filter-group">
        <label class="filter-label">Live Search</label>
        <input type="text" id="srch" class="custom-input" placeholder="Search Design / Lot..." oninput="refresh()">
    </div>

    <div class="filter-group">
        <label class="filter-label">Select Dimension</label>
        <select id="sizeF" class="custom-input" onchange="refresh()">
            <option value="">All Sizes</option>
        </select>
    </div>

    <div class="filter-group">
        <label class="filter-label">Order By</label>
        <select id="sortF" class="custom-input" onchange="refresh()">
            <option value="lot">Lot Number (Newest First)</option>
            <option value="qty">Quantity (Highest First)</option>
            <option value="alpha">Design Name (A-Z)</option>
        </select>
    </div>

    <button onclick="window.print()" style="margin-top:20px; padding:18px; background:transparent; color:var(--gold); border: 2px solid var(--gold); border-radius:15px; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:2px; transition:0.3s;">
        Export Elite Report
    </button>
</div>

<div class="main-content">
    <div class="stats-row">
        <div class="stat-box"><small>Master Designs</small><h2 id="cnt1">0</h2></div>
        <div class="stat-box"><small>Total Volume (SQM)</small><h2 id="cnt2">0</h2></div>
        <div class="stat-box"><small>Premium Collections</small><h2 id="cnt3">0</h2></div>
        <div class="stat-box"><small>Inventory Alert</small><h2 id="cnt4" style="color: #f87171;">0</h2></div>
    </div>

    <div class="inventory-grid" id="container"></div>
</div>

<div class="dev-tag">Developed by: Yashdeep Jivani</div>

<script>
    // Tamari Web App URL ahi update karo
    const API = "https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec"; 
    let masterData = [];

    async function init() {
        try {
            const res = await fetch(API);
            masterData = await res.json();
            
            const sizes = [...new Set(masterData.map(d => d.Size).filter(Boolean))];
            const sizeEl = document.getElementById('sizeF');
            sizes.forEach(sz => sizeEl.innerHTML += `<option value="${sz}">${sz}</option>`);

            document.getElementById('loader').style.display = 'none';
            refresh();
        } catch (e) {
            console.log(e);
            document.getElementById('loader').innerText = "CONNECTION ERROR";
        }
    }

    function refresh() {
        let items = [...masterData];
        const search = document.getElementById('srch').value.toLowerCase();
        const size = document.getElementById('sizeF').value;
        const sort = document.getElementById('sortF').value;

        items = items.filter(d => {
            const matchSrch = d['Item Description'].toLowerCase().includes(search) || d['Lot No'].toString().includes(search);
            const matchSize = !size || d.Size === size;
            return matchSrch && matchSize;
        });

        if(sort === 'lot') items.sort((a,b) => b['Lot No'].toString().localeCompare(a['Lot No'].toString()));
        if(sort === 'qty') items.sort((a,b) => b.Total - a.Total);
        if(sort === 'alpha') items.sort((a,b) => a['Item Description'].localeCompare(b['Item Description']));

        render(items);
        stats(items);
    }

    function render(data) {
        const grid = document.getElementById('container');
        grid.innerHTML = data.map(d => `
            <div class="luxury-card">
                <div class="image-container">
                    <div class="floating-badge">LOT: ${d['Lot No']}</div>
                    <img src="${d.ImgUrl}" crossorigin="anonymous" loading="eager">
                </div>
                <div class="card-body">
                    <div class="card-series">${d.Series || 'COLLECTION'} | ${d.Grade || 'PRE'}</div>
                    <div class="card-title">${d['Item Description']}</div>
                    <div class="lot-info">Dimension: <b>${d.Size}</b></div>
                    <div class="footer-flex">
                        <div class="qty-display">${d.Total}<small>SQM</small></div>
                        <button class="btn-luxury" onclick="alert('Booking ${d['Item Description']}')">BOOK</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function stats(data) {
        document.getElementById('cnt1').innerText = data.length;
        document.getElementById('cnt2').innerText = Math.round(data.reduce((a, b) => a + b.Total, 0)).toLocaleString();
        document.getElementById('cnt3').innerText = new Set(data.map(d => d.Series)).size;
        document.getElementById('cnt4').innerText = data.filter(d => d.Total < 50).length;
    }

    init();
</script>
</body>
</html>
