<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Live Stock Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --cyber-gold: #c5a059;
            --deep-space: #0f172a;
            --card-dark: #1e293b;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--deep-space); 
            color: #f1f5f9; 
        }
        
        .main-container { max-width: 1250px; margin: auto; padding: 20px; }
        
        /* Premium Sparkle Tag */
        .yashdeep-tag-premium {
            background: #1e293b; color: #fff; border: 1.5px solid var(--cyber-gold);
            padding: 6px 18px; border-radius: 50px; font-weight: 800; font-size: 11px;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2);
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            animation: glow 2s infinite ease-in-out;
        }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); } 50% { box-shadow: 0 0 25px rgba(197, 160, 89, 0.4); } }

        /* ✅ Ultimate Gold Neon Border Cards */
        .stock-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            border: 2px solid transparent; 
            border-image: linear-gradient(145deg, #c5a059 0%, #a68b55 100%) 1;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex; 
            margin-bottom: 25px; 
            min-height: 250px; 
            position: relative; 
            page-break-inside: avoid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stock-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px 0 rgba(197, 160, 89, 0.2);
            border-image: linear-gradient(145deg, #dfb76c 0%, #c5a059 100%) 1;
        }

        .variant-badge { 
            position: absolute; top: 0; right: 20%; 
            background: var(--cyber-gold); color: #000; 
            padding: 5px 18px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; z-index: 10; 
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .brand-tag { 
            font-size: 10px; background: rgba(59, 130, 246, 0.1); 
            color: #60a5fa; padding: 3px 10px; border-radius: 6px; 
            font-weight: 800; display: inline-block; margin-bottom: 8px; 
            text-transform: uppercase;
        }
        
        /* ✅ Portrait Forced Tile Container */
        .card-img-zone { 
            width: 32%; border-right: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 12px; display: flex; align-items: center; justify-content: center; 
            background: #020617;
            cursor: pointer;
        }
        .card-img-zone img { 
            height: 220px; /* Fixed height for bannie types */
            width: auto; /* Width automatic rahese */
            aspect-ratio: 9/16; /* Portrait ratio forced */
            object-fit: cover; /* Crop thaya vagar set thase */
            display: block; border-radius: 12px;
            transition: 0.5s ease;
        }
        .stock-card:hover .card-img-zone img { transform: scale(1.03); }

        .card-info { width: 48%; padding: 22px; display: flex; flex-direction: column; justify-content: center; }
        .design-name { font-size: 24px; font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-bottom: 4px; color: #fff; tracking: -0.01em; }
        .design-meta { color: #9ca3af; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
        
        .lot-row { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding: 8px 0; font-size: 13px; font-weight: 600; color: #d1d5db;
        }
        
        .card-total { 
            width: 20%; border-left: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(15, 23, 42, 0.5); 
        }
        .total-val { font-size: 46px; font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        
        /* Dark Theme Inputs */
        select, input { 
            background: #1e293b !important; 
            color: #fff !important; 
            border: 1px solid rgba(255,255,255,0.05) !important; 
            border-radius: 12px;
            padding: 12px; font-weight: 700; font-size: 13px; outline: none; 
            transition: 0.2s;
            text-transform: uppercase;
        }
        select:focus, input:focus { border-color: var(--cyber-gold); }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        
        @media print { 
            .no-print { display: none !important; } 
            body { background: #ffffff !important; color: #000000 !important; }
            .stock-card { background: #fff; border: 1px solid #000; color: #000; }
            .design-name, .total-val { color: #000; }
        }
    </style>
</head>
<body>

<div id="imageModal" onclick="this.style.display='none'">
    <img id="modalImg" class="max-w-full max-h-[90vh] rounded-xl border border-neutral-800 shadow-2xl" src="">
</div>

<div class="main-container">
    <div class="flex flex-col md:flex-row justify-between items-center pt-2 pb-6 gap-4">
        <div>
            <h1 class="text-3xl font-black text-white tracking-tight leading-none">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-[11px] text-blue-400 font-extrabold uppercase tracking-[0.2em] mt-2">Live Cloud Stock Portal</p>
            <p id="lastUpdated" class="text-[10px] text-amber-500 font-medium uppercase mt-1"> estabelecendo conexão live node matrix...</p>
        </div>
        <div class="flex flex-col items-center md:items-end no-print gap-3">
            <div class="flex gap-2">
                <button onclick="downloadPDF(this)" class="bg-red-700 hover:bg-red-600 text-white px-5 py-2.5 rounded-xl text-[11px] font-bold uppercase transition">📄 Download PDF</button>
                <button onclick="location.reload()" class="bg-neutral-800 hover:bg-neutral-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-bold uppercase transition border border-neutral-700">🔄 Refresh</button>
            </div>
            <div class="yashdeep-tag-premium">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </div>

    <div class="h-[1px] bg-gradient-to-r from-transparent via-neutral-800 to-transparent my-4"></div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 no-print">
        <div class="bg-card-dark p-4 rounded-xl border border-neutral-800 text-center"><div class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Total Designs</div><div id="statDesigns" class="text-2xl font-black mt-1">0</div></div>
        <div class="bg-card-dark p-4 rounded-xl border border-neutral-800 text-center"><div class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Total Boxes</div><div id="statBoxes" class="text-2xl font-black mt-1 text-emerald-400">0</div></div>
        <div class="bg-card-dark p-4 rounded-xl border border-neutral-800 text-center"><div class="text-slate-500 text-[10px] uppercase font-bold tracking-wider">Brands</div><div id="statBrands" class="text-2xl font-black mt-1">0</div></div>
        <div class="bg-card-dark p-4 rounded-xl border border-neutral-800 text-center" style="border-color: rgba(197, 160, 89, 0.3);"><div class="text-amber-500 text-[10px] uppercase font-bold tracking-wider">Filtered View</div><div id="statFiltered" class="text-2xl font-black mt-1 text-amber-500">0</div></div>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3 mb-6 no-print bg-slate-900 p-5 rounded-2xl border border-neutral-800 shadow-xl">
        <div class="col-span-2 md:col-span-2 flex flex-col"><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type material name..."></div>
        <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">Brand</label><select id="filterBrand" onchange="applyFilters()"></select></div>
        <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"></select></div>
        <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">Series</label><select id="filterSeries" onchange="applyFilters()"></select></div>
        <div class="flex flex-col"><label class="text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">Variant</label><select id="filterVariant" onchange="applyFilters()"></select></div>
    </div>

    <div id="reportList">
        <div class="text-center py-20 opacity-30 font-black tracking-widest text-xs uppercase text-slate-400">Connectando Live Node Matrix Database Cluster...</div>
    </div>
</div>

<script>
    // ✅ TAMARI APPS SCRIPT WEB APP URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_bjbw3zsKm-QQwHC9TIyBwzGGMfeDr2tNFfBc-jTnd0TZISKbzkn8C7HRhk4TJzaBcg/exec";

    let masterData = [];

    async function initPortal() {
        try {
            const resStock = await fetch(APPS_SCRIPT_URL);
            if (resStock.ok) {
                masterData = await resStock.json();
                document.getElementById('lastUpdated').innerText = "LIVE NODE MATRIX ATTACHED: " + new Date().toLocaleString();
                setupFilters(); 
                applyFilters();
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById('reportList').innerHTML = `<div class='text-center text-red-400 font-bold py-10'>Falha ao sincronizar database.</div>`;
        }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), variants = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); if(i.Variant) variants.add(i.Variant); });
        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">All</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('filterBrand', brands); fill('filterSize', sizes); fill('filterVariant', variants);
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const sz = document.getElementById('filterSize').value, srs = new Set();
        masterData.forEach(i => { if(sz==="" || i.Size===sz) if(i.Series) srs.add(i.Series); });
        document.getElementById('filterSeries').innerHTML = '<option value="">All</option>' + [...srs].sort().map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function applyFilters() {
        const f = { 
            n: document.getElementById('searchName').value.toLowerCase(), 
            b: document.getElementById('filterBrand').value, 
            sz: document.getElementById('filterSize').value, 
            s: document.getElementById('filterSeries').value, 
            v: document.getElementById('filterVariant').value 
        };
        
        const groups = {}; let total = 0, brands = new Set();
        
        masterData.forEach(item => {
            const desc = (item["Item Description"]||"").trim(), 
                  brand = (item.Brand||"").trim(), 
                  series = (item.Series||"").trim(), 
                  size = (item.Size||"").trim(), 
                  variant = (item.Variant||"").trim(), 
                  qty = Number(item.Total || item["Net Qty"] || 0);
            
            // ✅ AUTO IMAGE SETTING: DesignURL is sent from apps script
            const imgUrl = item.DesignURL ? item.DesignURL : 'https://via.placeholder.com/400';
            const lotNo = item["Lot No"] || item["Lot no."] || "N/A";

            if (desc.toLowerCase().includes(f.n) && (!f.b || brand===f.b) && (!f.sz || size===f.sz) && (!f.s || series===f.s) && (!f.v || variant===f.v)) {
                const k = `${desc}|${brand}|${series}|${size}|${variant}`.toLowerCase();
                if (!groups[k]) groups[k] = { desc, brand, series, size, variant, imgUrl, lots: [], total: 0 };
                groups[k].lots.push({ lot: lotNo, qty });
                groups[k].total += qty; total += qty; brands.add(brand);
            }
        });
        
        const items = Object.values(groups);
        document.getElementById('statDesigns').innerText = items.length;
        document.getElementById('statBoxes').innerText = total;
        document.getElementById('statBrands').innerText = brands.size;
        document.getElementById('statFiltered').innerText = items.length;
        render(items);
    }

    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(item => {
            // ✅ Using safe direct drive link conversion from apps script
            const finalImg = item.imgUrl.includes('placeholder') ? item.imgUrl : "https://images.weserv.nl/?url=" + encodeURIComponent(item.imgUrl.replace('https://', ''));
            
            return `
            <div class="stock-card">
                <div class="variant-badge">${item.variant || 'STD'}</div>
                <div class="card-img-zone" onclick="document.getElementById('modalImg').src='${item.imgUrl}'; document.getElementById('imageModal').style.display='flex'">
                    <img src="${finalImg}" loading="lazy" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/400'">
                </div>
                <div class="card-info">
                    <div><span class="brand-tag">${item.brand}</span></div>
                    <div class="design-name">${item.desc}</div>
                    <div class="design-meta">${item.series || 'REGULAR'} | ${item.size}</div>
                    <div class="flex-grow mt-2">
                        ${item.lots.map(l => `
                            <div class="lot-row">
                                <span class="text-slate-400 text-xs tracking-wider">LOT: ${l.lot}</span>
                                <span class="font-bold text-slate-100">${l.qty} Bx</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="total-val">${Math.round(item.total)}</div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    async function downloadPDF(btn) {
        const element = document.getElementById('reportList');
        const originalText = btn.innerText;
        btn.innerText = "Processing PDF Node Cluster..."; btn.disabled = true;

        const opt = {
            margin: 10,
            filename: 'NexTile_Live_Stock.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, allowTaint: false, backgroundColor: '#0f172a' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css'] }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } catch (e) { console.error(e); }
        finally { btn.innerText = originalText; btn.disabled = false; }
    }

    window.onload = initPortal;
</script>
</body>
</html>
