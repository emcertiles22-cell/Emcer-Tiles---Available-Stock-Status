<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --gold: #c5a059;
            --dark-card: #1e293b;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
        }
        .main-container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Premium Sparkle Tag */
        .yashdeep-premium {
            background: #1e293b; color: #fff; border: 1px solid var(--gold);
            padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 11px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
            letter-spacing: 0.1em;
        }

        /* Glassmorphic Cyber Cards */
        .stock-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; 
            margin-bottom: 25px; 
            min-height: 240px; 
            position: relative; 
            page-break-inside: avoid;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .stock-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        .variant-badge { 
            position: absolute; top: 0; right: 20%; 
            background: var(--gold); color: #000; 
            padding: 6px 20px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; z-index: 10; 
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            box-shadow: 0 2px 10px rgba(197, 160, 89, 0.3);
        }
        
        .brand-tag { 
            font-size: 10px; background: rgba(59, 130, 246, 0.15); 
            color: #60a5fa; padding: 4px 10px; border-radius: 6px; 
            font-weight: 800; display: inline-block; margin-bottom: 8px; 
            text-transform: uppercase;
        }
        
        .card-img { 
            width: 32%; border-right: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 15px; display: flex; align-items: center; justify-content: center; 
            background: rgba(15, 23, 42, 0.5);
            cursor: pointer;
        }
        .card-img img { 
            max-height: 200px; width: auto; max-width: 100%; 
            object-fit: cover; display: block; border-radius: 14px;
            transition: 0.5s ease;
        }
        .stock-card:hover .card-img img { transform: scale(1.04); }

        .card-info { width: 48%; padding: 25px; display: flex; flex-direction: column; }
        .design-name { font-size: 24px; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 6px; color: #fff; tracking-tighter: -0.03em; }
        .design-meta { color: #a8a29e; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        
        .lot-row { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px dashed rgba(255,255,255,0.08); 
            padding: 8px 0; font-size: 13px; font-weight: 600; color: #cbd5e1;
        }
        
        .card-total { 
            width: 20%; border-left: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(15, 23, 42, 0.4); 
        }
        .total-val { font-size: 48px; font-weight: 900; line-height: 1; color: #fff; }
        
        /* Dark Theme Inputs */
        select, input { 
            background: #1e293b !important; 
            color: #fff !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            border-radius: 14px;
            padding: 12px; font-weight: 700; font-size: 13px; outline: none; 
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        
        /* Stats Dashboard styling */
        .dashboard-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        @media print { 
            .no-print { display: none !important; } 
            body { background-color: #fff; color: #000; }
            .stock-card { background: #fff; border: 1px solid #000; color: #000; }
            .design-name, .total-val { color: #000; }
            .card-total { background: #f8fafc; }
        }
    </style>
</head>
<body>

<div id="imageModal" onclick="this.style.display='none'">
    <img id="modalImg" class="max-w-full max-h-[90vh] rounded-xl border-2 border-stone-700" src="">
</div>

<div class="main-container">
    <div class="flex flex-col md:flex-row justify-between items-center pt-6 pb-4 gap-4">
        <div>
            <h1 class="text-3xl font-black text-white tracking-tight leading-none">NEXTILE — EMCER TILES</h1>
            <p class="text-[11px] text-blue-400 font-black uppercase tracking-[0.3em] mt-2">Live Dark Inventory Engine</p>
            <p id="lastUpdated" class="text-[10px] text-amber-500/80 font-bold uppercase mt-1">Updating from sheet...</p>
        </div>
        <div class="flex flex-col items-center md:items-end no-print gap-3">
            <div class="flex gap-2">
                <button onclick="downloadPDF(this)" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase transition shadow-lg shadow-red-950/20">📄 Download PDF</button>
                <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase transition border border-slate-700">🔄 Refresh</button>
            </div>
            <div class="yashdeep-premium">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </div>

    <div class="h-[1px] bg-gradient-to-r from-transparent via-slate-700 to-transparent my-6"></div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print">
        <div class="dashboard-box p-5 text-center"><div class="stat-label">Total Designs</div><div id="statDesigns" class="stat-val mt-1">0</div></div>
        <div class="dashboard-box p-5 text-center"><div class="stat-label">Total Boxes</div><div id="statBoxes" class="stat-val mt-1 text-emerald-400">0</div></div>
        <div class="dashboard-box p-5 text-center"><div class="stat-label">Brands Available</div><div id="statBrands" class="stat-val mt-1">0</div></div>
        <div class="dashboard-box p-5 text-center" style="border-color: rgba(197, 160, 89, 0.2);"><div class="stat-label text-amber-500">Filtered View</div><div id="statFiltered" class="stat-val mt-1 text-amber-400">0</div></div>
    </div>

    <div class="bg-slate-900/60 backdrop-blur-md border border-slate-800 p-6 rounded-2xl mb-8 grid grid-template-columns grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 no-print shadow-2xl">
        <div class="filter-group"><label>Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type name..."></div>
        <div class="filter-group"><label>Brand</label><select id="filterBrand" onchange="applyFilters()"></select></div>
        <div class="filter-group"><label>Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"></select></div>
        <div class="filter-group"><label>Series</label><select id="filterSeries" onchange="applyFilters()"></select></div>
        <div class="filter-group"><label>Variant</label><select id="filterVariant" onchange="applyFilters()"></select></div>
    </div>

    <div id="reportList">
        <div class="text-center py-20 opacity-40 font-black tracking-widest text-lg uppercase text-slate-400">Connecting Cloud Database...</div>
    </div>
</div>

<script>
    // 🔗 TAMARI WEB APP NI NEW DEPLOYMENT URL AHIA PASTE KARO
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwo7Rgp4RgkicELRyGGOBZ-paQYl8up1BCIrHDAfVWOQ4NrBW5T7O5JUYudmZqEUAjAA/exec";

    let masterData = [];

    async function initPortal() {
        try {
            // Apps Script mathi direct fresh live data fetch thase
            const resStock = await fetch(APPS_SCRIPT_URL);
            if (resStock.ok) {
                masterData = await resStock.json();
                document.getElementById('lastUpdated').innerText = "LIVE SYNCED: " + new Date().toLocaleString();
                setupFilters(); 
                applyFilters();
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById('reportList').innerHTML = `<div class='text-center text-red-400 font-bold py-10'>Failed to load data. Please check Apps Script deployment access.</div>`;
        }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), variants = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); if(i.Variant) variants.add(i.Variant); });
        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">All</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('filterBrand', brands); fill('filterSize', sizes); fill('filterVariant', variants);
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const sz = document.getElementById('filterSize').value, srs = new Set();
        masterData.forEach(i => { if(sz==="" || i.Size===sz) if(i.Series) srs.add(i.Series); });
        document.getElementById('filterSeries').innerHTML = '<option value="">All</option>' + [...srs].sort().map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function applyFilters() {
        const f = { 
            n: document.getElementById('searchName').value.toLowerCase(), 
            b: document.getElementById('filterBrand').value, 
            sz: document.getElementById('filterSize').value, 
            s: document.getElementById('filterSeries').value, 
            v: document.getElementById('filterVariant').value 
        };
        
        const groups = {}; let total = 0, brands = new Set();
        
        masterData.forEach(item => {
            const desc = (item["Item Description"]||"").trim(), 
                  brand = (item.Brand||"").trim(), 
                  series = (item.Series||"").trim(), 
                  size = (item.Size||"").trim(), 
                  variant = (item.Variant||"").trim(), 
                  qty = Number(item.Total || item["Net Qty"] || 0); // Handles both formats
            
            // Image parsing directly from code.gs ImgUrl
            const imgUrl = item.ImgUrl || 'https://via.placeholder.com/400';
            const lotNo = item["Lot No"] || item["Lot no."] || "N/A";

            if (desc.toLowerCase().includes(f.n) && (!f.b || brand===f.b) && (!f.sz || size===f.sz) && (!f.s || series===f.s) && (!f.v || variant===f.v)) {
                const k = `${desc}|${brand}|${series}|${size}|${variant}`.toLowerCase();
                if (!groups[k]) groups[k] = { desc, brand, series, size, variant, imgUrl, lots: [], total: 0 };
                groups[k].lots.push({ lot: lotNo, qty });
                groups[k].total += qty; total += qty; brands.add(brand);
            }
        });
        
        const items = Object.values(groups);
        document.getElementById('statDesigns').innerText = items.length;
        document.getElementById('statBoxes').innerText = total.toLocaleString();
        document.getElementById('statBrands').innerText = brands.size;
        document.getElementById('statFiltered').innerText = items.length;
        render(items);
    }

    function render(items) {
        if(items.length === 0) {
            document.getElementById('reportList').innerHTML = `<div class="text-center py-20 opacity-30 font-bold uppercase text-slate-400">No Matching Material Found</div>`;
            return;
        }

        document.getElementById('reportList').innerHTML = items.map(item => {
            // Fallback for secure proxy rendering
            const displayImg = item.imgUrl.includes('placeholder') ? item.imgUrl : "https://images.weserv.nl/?url=" + encodeURIComponent(item.imgUrl.replace('https://', ''));
            
            return `
            <div class="stock-card">
                <div class="variant-badge">${item.variant || 'STD'}</div>
                <div class="card-img" onclick="document.getElementById('modalImg').src='${item.imgUrl}'; document.getElementById('imageModal').style.display='flex'">
                    <img src="${displayImg}" loading="lazy" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/400?text=IMAGE+ERROR'">
                </div>
                <div class="card-info">
                    <div>
                        <span class="brand-tag">${item.brand}</span>
                    </div>
                    <div class="design-name">${item.desc}</div>
                    <div class="design-meta">${item.series || 'REGULAR'} | ${item.size}</div>
                    <div class="flex-grow mt-2">
                        ${item.lots.map(l => `
                            <div class="lot-row">
                                <span class="text-slate-400 text-xs tracking-wide">LOT: ${l.lot}</span>
                                <span class="font-bold text-slate-200">${l.qty} Bx</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="total-val">${Math.round(item.total)}</div>
                    <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    async function downloadPDF(btn) {
        const element = document.getElementById('reportList');
        const originalText = btn.innerText;
        btn.innerText = "Generating..."; btn.disabled = true;

        const opt = {
            margin: 10,
            filename: 'NexTile_Live_Stock.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, allowTaint: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all'] }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } catch (e) { alert("PDF Compilation Error"); }
        finally { btn.innerText = originalText; btn.disabled = false; }
    }

    // Portal run on page load
    window.onload = initPortal;
</script>
</body>
</html>
