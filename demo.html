<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER LIVE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        
        /* Sticky Filter & Header */
        .sticky-section { position: sticky; top: 0; z-index: 100; background: #0f172a; border-bottom: 2px solid #1e293b; padding: 20px; }
        
        /* Product Card */
        .stock-card { 
            background: #1e293b; border: 1px solid #334155; border-radius: 16px; 
            display: flex; margin-bottom: 20px; transition: 0.3s; page-break-inside: avoid;
        }
        .stock-card:hover { border-color: #d4af37; transform: scale(1.01); }
        
        /* Image Zoom & Styling */
        .card-img-box { width: 220px; height: 160px; overflow: hidden; border-radius: 16px 0 0 16px; background: #000; }
        .card-img-box img { width: 100%; height: 100%; object-fit: contain; transition: 0.5s; }
        .card-img-box:hover img { transform: scale(1.3); }
        
        /* Badges */
        .low-stock { background: #991b1b; color: #fca5a5; padding: 2px 10px; font-size: 10px; font-weight: 900; border-radius: 6px; }
        .variant-badge { background: #d4af37; color: #000; padding: 2px 10px; font-size: 10px; font-weight: 900; border-radius: 4px; }
        
        select { appearance: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="bookingModal">
    <div class="modal-box">
        <h2 class="text-3xl font-extrabold mb-1">Confirm Booking</h2>
        <p id="bookItemName" class="text-blue-600 font-bold mb-8 text-sm uppercase"></p>
        <div class="space-y-5">
            <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Party Name / Salesman</label><input type="text" id="partyName" placeholder="Enter details"></div>
            <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Order Quantity (Boxes)</label><input type="number" id="bookQty" placeholder="0"></div>
            <div class="flex gap-4 pt-4">
                <button onclick="confirmBooking()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold uppercase shadow-lg hover:bg-blue-700 transition">Confirm</button>
                <button onclick="document.getElementById('bookingModal').style.display='none'" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>
</div>

<div class="main-container">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Emcer Tiles <span class="text-blue-600">Private Limited</span></h1>
            <p id="updateTime" class="text-[11px] font-bold text-slate-500 mt-2 uppercase tracking-widest">Synchronizing Live Warehouse...</p>
        </div>
        <div class="flex flex-col items-end gap-3">
            <div class="flex gap-3">
                <button onclick="downloadPDF()" class="bg-red-500 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase shadow-md hover:bg-red-600 transition">PDF Report</button>
                <button onclick="location.reload()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold text-xs uppercase">Refresh</button>
            </div>
            <div class="text-[10px] font-bold text-slate-400">Designed & Developed By: <span class="dev-tag">Yashdeep Jivani</span></div>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Designs</div><div id="stat-designs" class="text-3xl font-extrabold">0</div></div>
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Stock</div><div id="stat-boxes" class="text-3xl font-extrabold">0</div></div>
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Brands</div><div id="stat-brands" class="text-3xl font-extrabold">0</div></div>
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Filtered</div><div id="stat-results" class="text-3xl font-extrabold">0</div></div>
    </div>

    <div class="glass-card p-8 grid grid-cols-1 md:grid-cols-5 gap-6 mb-10 shadow-xl">
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type here..."></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Brand</label><select id="filterBrand" onchange="applyFilters()"><option value="">All Brands</option></select></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"><option value="">All Sizes</option></select></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Series</label><select id="filterSeries" onchange="applyFilters()"><option value="">All Series</option></select></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Grade</label><select id="filterGrade" onchange="applyFilters()"><option value="">All Grades</option></select></div>
    </div>

    <div id="reportList" class="space-y-8 pb-20">
        <div class="py-20 text-center font-bold text-slate-400 animate-pulse uppercase tracking-widest">Accessing Real-time Stock...</div>
    </div>
</div>


    <div id="reportList" class="p-6"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; // અહીં તમારી લિંક મૂકો
    let masterData = [];

    async function fetchData() {
        const res = await fetch(SCRIPT_URL);
        masterData = await res.json();
        render(masterData);
    }

    function filterData() {
        // અહીં તમારી ફિલ્ટરિંગ લોજિક છે
        // Multi-select માટે .selectedOptions વાપર્યું છે
    }

    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(i => `
            <div class="stock-card">
                <div class="card-img-box"><img src="${i.ImgUrl}" crossorigin="anonymous"></div>
                <div class="p-6 flex-1 flex flex-col justify-center">
                    <div class="flex gap-2 mb-2">
                        <span class="variant-badge">${i.Grade}</span>
                        ${i.Total < 50 ? '<span class="low-stock">LOW STOCK (< 50)</span>' : ''}
                    </div>
                    <h2 class="text-2xl font-black uppercase text-white">${i.Design}</h2>
                    <p class="text-slate-400 text-xs font-bold">${i.Brand} | ${i.Series} | ${i.Size}</p>
                </div>
                <div class="px-10 flex flex-col justify-center items-center border-l border-slate-700 bg-slate-800/30">
                    <div class="text-4xl font-black text-amber-500">${i.Total}</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">Total Boxes</div>
                </div>
            </div>
        `).join('');
    }

    async function downloadPDF() {
        const date = new Date().toLocaleDateString().replace(/\//g, '-');
        const opt = {
            margin: 10,
            filename: `Emcer_Stock_${date}.pdf`,
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all', after: '.stock-card' }
        };
        // અહીં Page Number માટેનું લોજિક ઉમેરવું
        await html2pdf().set(opt).from(document.getElementById('printableArea')).save();
    }

    function shareWhatsApp() {
        window.open("https://wa.me/?text=Check out our live inventory: [YOUR_LIVE_LINK]");
    }

    fetchData();
</script>
</body>
</html>
