<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER LIVE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; }
        .sticky-nav { position: sticky; top: 0; z-index: 1000; background: #0f172a; padding: 20px 0; }
        .low-stock { color: #f87171; font-weight: 800; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-6">

<div class="max-w-7xl mx-auto">
    <div class="sticky-nav">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-amber-500 uppercase">Emcer Tiles Private Limited</h1>
                <p class="text-xs text-slate-500 font-bold">LIVE INVENTORY PORTAL | UPDATED: <span id="time"></span></p>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadPDF()" class="bg-amber-600 text-black px-6 py-3 rounded-xl font-black text-[11px] uppercase shadow-lg">📄 Download PDF</button>
                <button onclick="shareWhatsApp()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-black text-[11px] uppercase shadow-lg">💬 WhatsApp</button>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-4 bg-slate-900 p-4 rounded-2xl border border-slate-700">
            <input type="text" id="search" placeholder="🔍 SEARCH DESIGN..." class="bg-transparent border-none text-sm font-bold focus:ring-0">
            <select id="brand" class="bg-slate-800 p-2 rounded-lg text-[10px] font-bold"><option>All Brands</option></select>
            <select id="size" class="bg-slate-800 p-2 rounded-lg text-[10px] font-bold"><option>All Sizes</option></select>
            <select id="series" class="bg-slate-800 p-2 rounded-lg text-[10px] font-bold"><option>All Series</option></select>
            <select id="grade" class="bg-slate-800 p-2 rounded-lg text-[10px] font-bold"><option>All Grades</option></select>
        </div>
    </div>

    <div id="reportList" class="mt-6 space-y-4">
        </div>
</div>

<script>
    // 1. Data Fetching
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; 
    
    async function loadData() {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        render(data);
    }

    // 2. Rendering Function
    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(i => `
            <div class="glass-card flex p-6 gap-6 hover:border-amber-500 transition-all">
                <img src="${i.imgUrl}" class="w-40 h-32 object-cover rounded-lg">
                <div class="flex-grow">
                    <div class="flex gap-2">
                        <span class="text-[10px] font-black text-amber-500">${i.brand}</span>
                        ${i.total < 50 ? '<span class="low-stock text-[10px]">● LOW STOCK</span>' : ''}
                    </div>
                    <h2 class="text-2xl font-black">${i.name}</h2>
                    <p class="text-slate-400 text-xs">${i.size} | ${i.series} | ${i.grade}</p>
                </div>
                <div class="text-right border-l border-slate-700 pl-6">
                    <div class="text-4xl font-black text-white">${i.total}</div>
                    <div class="text-[10px] uppercase font-bold text-slate-500">Total Boxes</div>
                </div>
            </div>
        `).join('');
    }

    // 3. Features Functions
    function downloadPDF() {
        const element = document.body;
        html2pdf().from(element).save('Emcer_Stock_Report.pdf');
    }

    function shareWhatsApp() {
        window.open('https://wa.me/?text=Check out our live stock: [LINK]');
    }

    document.getElementById('time').innerText = new Date().toLocaleString();
    loadData();
</script>
</body>
</html>
