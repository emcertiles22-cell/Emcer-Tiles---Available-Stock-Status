<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER LIVE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .sticky-nav { position: sticky; top: 0; z-index: 50; background: #0f172a; padding: 20px 0; border-bottom: 1px solid #1e293b; }
        
        /* Attractive Card UI */
        .stock-card { 
            background: #1e293b; border: 1px solid #334155; border-radius: 16px; 
            display: flex; margin-bottom: 20px; overflow: hidden; transition: all 0.3s; 
        }
        .stock-card:hover { transform: translateY(-5px); border-color: #d4af37; }
        
        .card-img-box { width: 200px; height: 180px; background: #fff; padding: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img-box img { max-width: 100%; height: 100%; object-fit: contain; transition: transform 0.5s; }
        .card-img-box:hover img { transform: scale(1.3); }
        
        .low-stock { background: #991b1b; color: #fca5a5; padding: 2px 8px; font-size: 10px; font-weight: 900; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="main-container px-6" id="printableArea">
    <div class="sticky-nav">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-amber-500 uppercase">EMCER TILES</h1>
            <div class="flex gap-3">
                <button onclick="downloadPDF()" class="bg-amber-600 text-black px-4 py-2 text-[10px] font-black rounded-lg">📄 PDF REPORT</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-4 mt-4">
            <input type="text" id="searchName" placeholder="SEARCH DESIGN..." oninput="applyFilters()" class="bg-slate-900 border border-slate-700 text-white p-2 rounded text-xs">
            <select id="filterBrand" multiple onchange="applyFilters()" class="bg-slate-900 text-white text-xs p-2 rounded border border-slate-700"></select>
            <select id="filterSize" multiple onchange="applyFilters()" class="bg-slate-900 text-white text-xs p-2 rounded border border-slate-700"></select>
        </div>
    </div>

    <div id="reportList" class="mt-6"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; 
    let masterData = [];

    async function fetchData() {
        const res = await fetch(WEB_APP_URL);
        masterData = await res.json();
        render(masterData);
    }

    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(i => `
            <div class="stock-card relative">
                ${i.Total < 50 ? '<div class="absolute top-2 left-2 low-stock">LOW STOCK</div>' : ''}
                <div class="card-img-box"><img src="${i.ImgUrl}" crossorigin="anonymous"></div>
                <div class="p-6 flex flex-col justify-center">
                    <h2 class="text-xl font-black uppercase">${i["Item Description"]}</h2>
                    <p class="text-slate-400 text-xs font-bold">${i.Brand} | ${i.Size} | ${i.Series}</p>
                    <div class="mt-2 text-2xl font-black text-amber-500">${i.Total} <span class="text-xs">BOXES</span></div>
                </div>
            </div>
        `).join('');
    }

    async function downloadPDF() {
        const element = document.getElementById('printableArea');
        const opt = {
            margin: 5,
            filename: `Emcer_Stock_${new Date().toLocaleDateString()}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        await html2pdf().set(opt).from(element).save();
    }

    fetchData();
</script>
</body>
</html>
