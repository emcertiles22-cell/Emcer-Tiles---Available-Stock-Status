<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Premium Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .stock-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .stock-card:hover { transform: scale(1.01); border-color: #2563eb; }
        .sticky-header { position: sticky; top: 0; z-index: 999; background: white; padding: 15px 0; border-bottom: 1px solid #e2e8f0; }
        .low-stock-badge { background: #fee2e2; color: #b91c1c; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50">

<div id="printableArea" class="max-w-6xl mx-auto p-4">
    <div class="sticky-header shadow-sm mb-6">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-slate-900">NexTile <span class="text-blue-600">Stock</span></h1>
            <div class="flex gap-2">
                <button onclick="downloadPDF()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">PDF Report</button>
                <button onclick="shareWhatsApp()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="reportList" class="space-y-4"></div>
</div>

<script>
    // તમારી Google Apps Script URL અહીં મૂકો
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec';

    async function fetchData() {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        render(data);
    }

    function render(items) {
        const area = document.getElementById('reportList');
        area.innerHTML = items.map(item => `
            <div class="stock-card p-4 bg-white rounded-2xl flex gap-6 items-center">
                <div class="w-32 h-24 overflow-hidden rounded-lg bg-slate-100">
                    <img src="${item.ImgUrl || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover hover:scale-110 transition-transform">
                </div>
                <div class="flex-grow">
                    ${item.Total < 50 ? '<span class="low-stock-badge uppercase mb-1 inline-block">Low Stock (< 50)</span>' : ''}
                    <div class="text-lg font-bold uppercase">${item["Item Description"]}</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">${item.Brand} | ${item.Size} | ${item.Variant}</div>
                </div>
                <div class="text-right">
                    <div class="text-3xl font-black text-blue-600">${item.Total}</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Boxes</div>
                </div>
            </div>
        `).join('');
    }

    // PDF with Page Numbering
    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('printableArea');
        const canvas = await html2canvas(element, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        
        const pageCount = pdf.internal.getNumberOfPages();
        for(let i = 1; i <= pageCount; i++) {
            pdf.setPage(i);
            pdf.text('Page ' + i + ' of ' + pageCount, 180, 285);
        }
        pdf.save('Stock_Report.pdf');
    }

    function shareWhatsApp() {
        window.open(`https://wa.me/?text=NexTile Stock Report: ${window.location.href}`);
    }

    fetchData();
</script>
</body>
</html>
