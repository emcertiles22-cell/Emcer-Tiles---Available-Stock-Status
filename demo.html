<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER ELITE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 16px; display: flex; align-items: center; padding: 20px; border: 1px solid #334155; }
        .card img { width: 250px; height: 180px; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body class="p-8">

<div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-black text-amber-500 mb-6">EMCER TILES PRIVATE LIMITED</h1>
    <div id="reportList" class="space-y-4"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; 

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            console.log("Data:", data); // આનાથી કન્સોલમાં ખબર પડશે કે કી (keys) શું છે
            render(data);
        } catch(e) { console.error("Error:", e); }
    }

    function render(items) {
        document.getElementById('reportList').innerHTML = items.map(i => {
            // અહીં તમારી શીટના સાચા હેડર નામ લખો. 
            // દા.ત. જો શીટમાં 'Item Description' હોય તો i["Item Description"] લખો.
            const name = i["Item Description"] || "NO NAME";
            const total = i["Total"] || 0;
            const img = i["ImgUrl"] || "https://via.placeholder.com/250";
            const brand = i["Brand"] || "-";
            const size = i["Size"] || "-";
            const series = i["Series"] || "-";
            const grade = i["Variant"] || "-";

            return `
            <div class="card">
                <img src="${img}" onerror="this.src='https://via.placeholder.com/250'">
                <div class="ml-6 flex-grow">
                    <div class="text-amber-500 font-bold text-xs uppercase">${brand} | ${series}</div>
                    <div class="text-2xl font-black uppercase">${name}</div>
                    <div class="text-slate-400 font-semibold">${size} | ${grade}</div>
                </div>
                <div class="text-right">
                    <div class="text-5xl font-black text-amber-500">${total}</div>
                    <div class="text-xs font-bold text-slate-500 uppercase">Total Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    loadData();
</script>
</body>
</html>
