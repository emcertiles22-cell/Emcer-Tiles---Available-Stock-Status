<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER LIVE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        
        /* Sticky Header & Filters */
        .sticky-header { position: sticky; top: 0; z-index: 100; background: #0f172a; padding: 15px; border-bottom: 2px solid #334155; }
        
        /* Card Styling */
        .stock-card { 
            background: #1e293b; border: 1px solid #334155; border-radius: 12px; 
            display: flex; margin-bottom: 15px; overflow: hidden; page-break-inside: avoid; 
            transition: transform 0.3s;
        }
        .stock-card:hover { transform: scale(1.01); border-color: #d4af37; }
        
        /* Image Zoom */
        .card-img { width: 180px; height: 140px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { max-width: 100%; height: 100%; object-fit: contain; transition: transform 0.4s; }
        .card-img:hover img { transform: scale(1.4); }
        
        /* Low Stock Badge */
        .low-stock-alert { background: #991b1b; color: #fca5a5; padding: 2px 8px; font-size: 9px; font-weight: 900; border-radius: 4px; display: inline-block; }
        
        /* Hide scrollbars on selects */
        select { appearance: none; }
    </style>
</head>
<body>

<style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
    
    /* Sticky Filter Bar */
    .sticky-filter { 
        position: sticky; top: 0; z-index: 1000; 
        background: rgba(15, 23, 42, 0.95); 
        backdrop-filter: blur(10px);
        padding: 20px; border-bottom: 1px solid #334155;
    }

    /* Product Card */
    .stock-card { 
        background: #1e293b; border: 1px solid #334155; 
        border-radius: 16px; display: flex; align-items: center;
        transition: transform 0.3s ease, border 0.3s ease;
    }
    .stock-card:hover { border-color: #d4af37; transform: translateY(-5px); }

    /* Image Zoom */
    .img-box { width: 200px; height: 160px; overflow: hidden; border-radius: 12px 0 0 12px; }
    .img-box img { transition: transform 0.5s ease; width: 100%; height: 100%; object-fit: cover; }
    .img-box:hover img { transform: scale(1.2); }

    /* Low Stock Alert Badge */
    .low-stock { 
        background: #991b1b; color: #fca5a5; padding: 2px 8px; 
        font-size: 10px; font-weight: 800; border-radius: 4px;
    }
</style>

<div class="sticky-filter">
    <div class="grid grid-cols-5 gap-4">
        <input type="text" placeholder="Search Design..." class="bg-slate-900 p-3 rounded-lg border border-slate-700">
        </div>
</div>

<div class="p-6">
    <div class="stock-card mb-4">
        <div class="img-box"><img src="your-image-url.jpg"></div>
        <div class="p-5 flex-grow">
            <span class="low-stock">LOW STOCK</span>
            <h2 class="text-2xl font-black uppercase">Eleganza Light</h2>
            <p class="text-slate-400">1200x2400 MM | Glazed Vitrified</p>
        </div>
        <div class="px-8 text-center border-l border-slate-700">
            <div class="text-4xl font-black text-amber-500">24</div>
            <div class="text-xs font-bold text-slate-500 uppercase">Total Boxes</div>
        </div>
    </div>
</div>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; 
    let data = [];

    async function fetchData() {
        const res = await fetch(SCRIPT_URL);
        data = await res.json();
        setupFilters();
        filterData();
    }

    function setupFilters() {
        const unique = (key) => [...new Set(data.map(i => i[key]))].sort();
        const fill = (id, arr) => document.getElementById(id).innerHTML = arr.map(v => `<option value="${v}">${v}</option>`).join('');
        fill('brand', unique('Brand')); fill('size', unique('Size'));
        fill('series', unique('Series')); fill('grade', unique('Grade'));
    }

    function filterData() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = Array.from(document.getElementById('brand').selectedOptions).map(o => o.value);
        const sz = Array.from(document.getElementById('size').selectedOptions).map(o => o.value);
        const sr = Array.from(document.getElementById('series').selectedOptions).map(o => o.value);
        
        const filtered = data.filter(i => 
            i["Item Description"].toLowerCase().includes(s) &&
            (b.length === 0 || b.includes(i.Brand)) &&
            (sz.length === 0 || sz.includes(i.Size)) &&
            (sr.length === 0 || sr.includes(i.Series))
        );
        render(filtered);
    }

    function render(items) {
        document.getElementById('list').innerHTML = items.map(i => `
            <div class="stock-card">
                <div class="card-img"><img src="${i.ImgUrl}" crossorigin="anonymous"></div>
                <div class="p-4 flex-1">
                    ${i.Total < 50 ? '<span class="low-stock-alert">LOW STOCK (< 50)</span>' : ''}
                    <h2 class="text-xl font-black text-white uppercase">${i["Item Description"]}</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${i.Brand} | ${i.Size}</p>
                </div>
                <div class="px-6 flex flex-col justify-center items-center bg-slate-800/50">
                    <span class="text-2xl font-black text-amber-500">${i.Total}</span>
                </div>
            </div>
        `).join('');
    }

    // Dynamic PDF with Page Numbering
    async function downloadPDF() {
        const date = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
        const element = document.getElementById('printableArea');
        const opt = {
            margin: 10,
            filename: `Emcer_Stock_${date}.pdf`,
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all', after: '.stock-card' }
        };
        const pdf = await html2pdf().set(opt).from(element).toPdf().get('pdf');
        const totalPages = pdf.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            pdf.setPage(i);
            pdf.text('Page ' + i + ' of ' + totalPages, 10, 290);
        }
        pdf.save();
    }

    function shareWhatsApp() {
        alert("PDF લિંક તૈયાર થઈ રહી છે... (તમારે PDF ને ઓનલાઇન સ્ટોરેજમાં અપલોડ કરીને તેની લિંક WhatsApp પર શેર કરવી પડશે)");
    }

    fetchData();
</script>
</body>
</html>
