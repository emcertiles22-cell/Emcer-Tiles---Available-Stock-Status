<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMCER LIVE INVENTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        
        /* Sticky Header */
        .sticky-nav { position: sticky; top: 0; z-index: 100; background: #0f172a; padding: 15px; border-bottom: 2px solid #334155; }
        
        /* Card UI */
        .stock-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; display: flex; margin-bottom: 15px; overflow: hidden; page-break-inside: avoid; }
        .card-img { width: 180px; height: 140px; background: #0f172a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { max-width: 100%; height: 100%; object-fit: contain; transition: transform 0.4s; }
        .card-img:hover img { transform: scale(1.3); }
        
        /* Low Stock Badge */
        .low-stock-alert { background: #991b1b; color: #fca5a5; padding: 2px 8px; font-size: 9px; font-weight: 900; border-radius: 4px; }
        
        /* Hide scrollbars on selects */
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body>

<div id="printableArea" class="max-w-6xl mx-auto">
    <div class="sticky-nav">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black text-amber-500 uppercase">EMCER TILES PRIVATE LIMITED</h1>
            <div class="flex gap-2">
                <button onclick="downloadPDF()" class="bg-amber-600 text-black px-4 py-2 font-black text-[10px] rounded">📄 DOWNLOAD PDF</button>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-2">
            <input type="text" id="search" placeholder="SEARCH DESIGN..." oninput="filterData()" class="bg-slate-900 border border-slate-700 text-white p-2 text-[10px] rounded">
            <select id="brand" onchange="filterData()" class="bg-slate-900 border border-slate-700 text-white p-2 text-[10px] rounded"></select>
            <select id="size" onchange="filterData()" class="bg-slate-900 border border-slate-700 text-white p-2 text-[10px] rounded"></select>
            <select id="series" onchange="filterData()" class="bg-slate-900 border border-slate-700 text-white p-2 text-[10px] rounded"></select>
            <select id="grade" onchange="filterData()" class="bg-slate-900 border border-slate-700 text-white p-2 text-[10px] rounded"></select>
        </div>
    </div>

    <div id="list" class="p-4"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJKfexL72pvC3h_1cnlvLN1uw01Gos8wyvvtXjXmkHxkHzJmmduzxGk7BfjeDvxoU/exec"; // અહીં તમારી URL મૂકો
    let data = [];

    async function fetchData() {
        const res = await fetch(SCRIPT_URL);
        data = await res.json();
        setupFilters();
        filterData();
    }

    function setupFilters() {
        const unique = (key) => [...new Set(data.map(i => i[key]))].sort();
        const fill = (id, arr) => document.getElementById(id).innerHTML = `<option value="">ALL ${id.toUpperCase()}</option>` + arr.map(v => `<option value="${v}">${v}</option>`).join('');
        
        fill('brand', unique('Brand'));
        fill('size', unique('Size'));
        fill('series', unique('Series'));
        fill('grade', unique('Grade'));
    }

    function filterData() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brand').value;
        const sz = document.getElementById('size').value;
        const sr = document.getElementById('series').value;
        const gr = document.getElementById('grade').value;

        const filtered = data.filter(i => 
            i["Item Description"].toLowerCase().includes(s) &&
            (b === "" || i.Brand === b) &&
            (sz === "" || i.Size === sz) &&
            (sr === "" || i.Series === sr) &&
            (gr === "" || i.Grade === gr)
        );

        render(filtered);
    }

    function render(items) {
        document.getElementById('list').innerHTML = items.map(i => `
            <div class="stock-card">
                <div class="card-img"><img src="${i.ImgUrl}" crossorigin="anonymous"></div>
                <div class="p-4 flex-1">
                    ${i.Total < 50 ? '<span class="low-stock-alert">LOW STOCK (< 50)</span>' : ''}
                    <h2 class="text-xl font-black text-white uppercase mt-1">${i["Item Description"]}</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${i.Brand} | ${i.Series} | ${i.Size} | ${i.Grade}</p>
                </div>
                <div class="px-6 flex flex-col justify-center items-center bg-slate-800/50">
                    <span class="text-2xl font-black text-amber-500">${i.Total}</span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase">Total Boxes</span>
                </div>
            </div>
        `).join('');
    }

    async function downloadPDF() {
        const date = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
        const opt = {
            margin: 5,
            filename: `Emcer_Stock_${date}.pdf`,
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all', after: '.stock-card' }
        };
        await html2pdf().set(opt).from(document.getElementById('printableArea')).save();
    }

    fetchData();
</script>
</body>
</html>
