<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Inventory Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .premium-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; transition: all 0.3s; }
        .premium-card:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        select, input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
        #imgModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .btn-hover { transition: all 0.2s; }
        .btn-hover:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-10">

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="" class="max-w-[90%] max-h-[80%] rounded-xl shadow-2xl border-2 border-slate-700">
</div>

<div class="max-w-7xl mx-auto p-4 md:p-8">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-white">EMCER <span class="text-blue-500">TILES</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span id="indicator" class="h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span>
                <p id="status" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">System Online</p>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button onclick="fetchAllData()" class="btn-hover bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 border border-slate-700">🔄 Refresh</button>
            <button onclick="downloadExcel()" class="btn-hover bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-emerald-900/20">📊 Excel</button>
            <button onclick="generatePDF()" class="btn-hover bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-900/20">📄 PDF Report</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
        <div class="lg:col-span-2 relative">
            <input type="text" id="search" oninput="render()" placeholder="Search Design Name..." class="w-full p-3.5 pl-11 rounded-xl outline-none focus:ring-2 ring-blue-500 font-medium">
            <span class="absolute left-4 top-4 opacity-40">🔍</span>
        </div>
        <select id="brandFilter" onchange="render()" class="p-3.5 rounded-xl outline-none font-bold cursor-pointer"></select>
        <select id="sizeFilter" onchange="render()" class="p-3.5 rounded-xl outline-none font-bold cursor-pointer"></select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
        <div class="premium-card p-6 border-l-4 border-l-blue-500">
            <p class="text-xs font-bold text-slate-500 uppercase">Total Items</p>
            <h3 id="itemCount" class="text-2xl font-black mt-1">0</h3>
        </div>
        <div class="premium-card p-6 border-l-4 border-l-emerald-500">
            <p class="text-xs font-bold text-slate-500 uppercase">Total Stock (Boxes)</p>
            <h3 id="grandTotal" class="text-2xl font-black mt-1">0</h3>
        </div>
        <div class="premium-card p-6 border-l-4 border-l-orange-500">
            <p class="text-xs font-bold text-slate-500 uppercase">Last Updated</p>
            <h3 class="text-sm font-black mt-2 text-slate-300" id="time">Live Syncing...</h3>
        </div>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center py-20">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    <div id="stockContainer" class="grid grid-cols-1 gap-4 hidden"></div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec"; // REPLACE THIS
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {};

    async function fetchAllData() {
        try {
            const [dRes, sRes] = await Promise.all([fetch(DESIGN_JSON_URL), fetch(APPS_SCRIPT_URL)]);
            const dData = await dRes.json();
            designMap = {};
            dData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = await sRes.json();
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('stockContainer').classList.remove('hidden');
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
            
            setupFilters();
            render();
        } catch (e) { alert("Check your App Script URL and Internet!"); }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); });
        const fill = (id, set, label) => {
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + 
                [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('brandFilter', brands, 'Brands');
        fill('sizeFilter', sizes, 'Sizes');
    }

    function render() {
        const search = document.getElementById('search').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const size = document.getElementById('sizeFilter').value;
        const container = document.getElementById('stockContainer');
        const groups = {};
        let totalQty = 0;

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const b = String(item.Brand || "").trim();
            const s = String(item.Size || "").trim();
            const lot = String(item["Lot No"] || "N/A");
            const qty = parseFloat(item["Total"] || 0);

            if (name.toLowerCase().includes(search) && (!brand || b === brand) && (!size || s === size)) {
                const key = `${name}|${b}|${s}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand: b, size: s, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty;
                totalQty += qty;
            }
        });

        const items = Object.values(groups);
        document.getElementById('grandTotal').innerText = Math.round(totalQty).toLocaleString();
        document.getElementById('itemCount').innerText = items.length;

        container.innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/200/1e293b/white?text=No+Photo';
            return `
            <div class="premium-card flex flex-col md:flex-row overflow-hidden">
                <div class="md:w-48 bg-white/5 p-4 flex items-center justify-center border-r border-slate-700 cursor-zoom-in" onclick="zoom('${img}')">
                    <img src="${img}" class="max-h-32 rounded-lg hover:scale-110 transition-transform duration-500">
                </div>
                <div class="flex-1 p-6">
                    <div class="flex gap-2 mb-2">
                        <span class="text-[9px] font-black bg-blue-500/10 text-blue-400 px-2 py-1 rounded border border-blue-500/20 uppercase">${item.brand}</span>
                        <span class="text-[9px] font-black bg-slate-700 text-slate-300 px-2 py-1 rounded uppercase">${item.size}</span>
                    </div>
                    <h3 class="text-xl font-black text-white uppercase mb-4">${item.name}</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        ${item.lots.map(l => `
                            <div class="bg-slate-800/50 p-2 rounded-xl border border-slate-700/50">
                                <p class="text-[8px] font-bold text-slate-500 uppercase">LOT</p>
                                <p class="text-xs font-bold text-slate-200">${l.lot}</p>
                                <p class="text-xs font-black text-blue-400 mt-1">${l.qty} Bx</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="md:w-36 bg-blue-600/10 flex flex-col items-center justify-center p-6 border-l border-slate-700">
                    <p class="text-[9px] font-bold text-blue-400 uppercase mb-1 tracking-widest">Total</p>
                    <p class="text-3xl font-black text-white">${Math.round(item.total)}</p>
                </div>
            </div>`;
        }).join('');
    }

    function zoom(url) { document.getElementById('modalImg').src = url; document.getElementById('imgModal').style.display = 'flex'; }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20); doc.text("EMCER TILES INVENTORY", 14, 20);
        doc.setFontSize(10); doc.text(`Date: ${new Date().toLocaleString()}`, 14, 28);
        
        const rows = masterData.map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total]);
        doc.autoTable({
            startY: 35,
            head: [['Brand', 'Design', 'Size', 'Lot', 'Boxes']],
            body: rows,
            headStyles: { fillStyle: [30, 41, 59] }
        });
        doc.save("Emcer_Inventory.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Stock.xlsx");
    }

    window.onload = fetchAllData;
</script>
</body>
</html>
