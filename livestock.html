<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .card-img { width: 22%; cursor: zoom-in; display: flex; align-items: center; justify-content: center; padding: 10px; border-right: 1px solid #f1f5f9; background: #fff; }
        .card-img img { max-height: 120px; border-radius: 8px; transition: transform 0.3s; }
        .card-img:hover img { transform: scale(1.05); }
        
        /* Modal Style */
        #zoomModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: pointer; }
        #zoomImg { max-width: 90%; max-height: 85%; border: 4px solid white; border-radius: 12px; }
    </style>
</head>
<body>

<div id="zoomModal" onclick="this.style.display='none'">
    <img id="zoomImg" src="">
    <div class="absolute bottom-10 text-white font-bold tracking-widest">CLICK ANYWHERE TO CLOSE</div>
</div>

<div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border mb-6">
        <div>
            <h1 class="text-2xl font-[800] tracking-tight text-slate-900">EMCER TILES PRIVATE LIMITED</h1>
            <div id="status" class="flex items-center gap-2 text-sm font-bold text-orange-500 mt-1">
                <span class="animate-ping h-2 w-2 rounded-full bg-orange-400 opacity-75"></span> CONNECTING...
            </div>
        </div>
        <div class="flex gap-2 mt-4 md:mt-0">
            <button onclick="refreshData()" class="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl font-bold hover:bg-slate-50 transition-all flex items-center gap-2">🔄 REFRESH</button>
            <button onclick="downloadExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-100 flex items-center gap-2">📊 EXCEL</button>
            <button onclick="generatePDF()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 flex items-center gap-2">📥 PDF</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <input type="text" id="sN" oninput="applyFilters()" placeholder="🔍 Search Design..." class="w-full bg-white border border-slate-200 rounded-xl p-3 font-semibold outline-none focus:ring-2 ring-blue-500">
        <select id="fB" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 font-semibold outline-none"></select>
        <select id="fS" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 font-semibold outline-none"></select>
        <select id="fG" onchange="applyFilters()" class="bg-white border border-slate-200 rounded-xl p-3 font-semibold outline-none"></select>
    </div>

    <div id="reportArea" class="space-y-4"></div>
</div>

<script>
    let masterData = [], designMap = {}, filteredItems = [];

    function init() {
        google.script.run.withSuccessHandler(dMap => {
            designMap = dMap;
            fetchData();
        }).getDesignData();
    }

    function fetchData() {
        google.script.run.withSuccessHandler(data => {
            masterData = data;
            document.getElementById('status').innerHTML = '<span class="text-green-600">● LIVE SYNC ACTIVE</span>';
            setupFilters(); applyFilters();
        }).getStockData();
    }

    function refreshData() {
        document.getElementById('status').innerHTML = '<span class="text-orange-500 italic animate-pulse">Syncing...</span>';
        fetchData();
    }

    function openZoom(url) {
        document.getElementById('zoomImg').src = url;
        document.getElementById('zoomModal').style.display = 'flex';
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), variants = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); if(i.Variant || i.Grade) variants.add(i.Variant || i.Grade); });
        const fill = (id, set, label) => document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('fB', brands, 'Brands'); fill('fS', sizes, 'Sizes'); fill('fG', variants, 'Variants');
    }

    function applyFilters() {
        const search = document.getElementById('sN').value.toLowerCase();
        const brand = document.getElementById('fB').value;
        const size = document.getElementById('fS').value;
        const variant = document.getElementById('fG').value;
        const groups = {};

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const b = String(item.Brand || "").trim();
            const s = String(item.Size || "").trim();
            const v = String(item.Variant || item.Grade || "").trim();
            const qty = parseFloat(item.Total || item["Total Boxes"] || 0);

            if (name.toLowerCase().includes(search) && (!brand || b === brand) && (!size || s === size) && (!variant || v === variant)) {
                const key = `${name}|${b}|${s}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand: b, size: s, variant: v, lots: [], total: 0 };
                groups[key].lots.push({ lot: item["Lot No"] || item.Lot || "N/A", qty: qty });
                groups[key].total += qty;
            }
        });
        filteredItems = Object.values(groups);
        render();
    }

    function render() {
        document.getElementById('reportArea').innerHTML = filteredItems.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/200?text=No+Photo';
            return `
            <div class="glass-card flex flex-col md:flex-row">
                <div class="card-img" onclick="openZoom('${img}')"><img src="${img}"></div>
                <div class="flex-1 p-5">
                    <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase tracking-wider">${item.brand}</span>
                    <h3 class="text-xl font-extrabold text-slate-800 uppercase mt-1 leading-tight">${item.name}</h3>
                    <p class="text-[11px] font-bold text-slate-400 mb-4">${item.size} | ${item.variant}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        ${item.lots.map(l => `<div class="bg-slate-50 p-2 rounded-lg border border-slate-100"><p class="text-[9px] font-bold text-slate-400 uppercase">LOT: ${l.lot}</p><p class="text-xs font-bold text-slate-700">${l.qty} Bx</p></div>`).join('')}
                    </div>
                </div>
                <div class="bg-slate-50 w-full md:w-32 flex flex-col items-center justify-center p-4 border-l border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Total</p>
                    <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                    <p class="text-[10px] font-bold text-blue-600 uppercase">Boxes</p>
                </div>
            </div>`;
        }).join('');
    }

    function downloadExcel() {
        const data = filteredItems.map(i => ({"Design": i.name, "Brand": i.brand, "Size": i.size, "Total Stock": i.total}));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Live_Stock.xlsx");
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const content = document.getElementById('reportArea');
        html2canvas(content, { scale: 2 }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            pdf.addImage(imgData, 'PNG', 10, 10, 190, (canvas.height * 190) / canvas.width);
            pdf.save("Emcer_Inventory.pdf");
        });
    }

    window.onload = init;
</script>
</body>
</html>
