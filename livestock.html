<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Drive Photo Fix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .yashdeep-tag {
            background: #1e293b; color: #fbbf24; border: 1px solid #fbbf24;
            padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 12px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }
        .tile-card {
            background: white; border-radius: 24px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05); transition: 0.3s ease;
        }
        .tile-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-slate-900">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1">Live Inventory & Drive Photos</p>
        </div>
        <div class="yashdeep-tag">✨ YASHDEEP JIVANI ✨</div>
    </header>

    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-10 flex flex-wrap gap-4 items-end">
        <div class="flex-grow min-w-[250px]">
            <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Search Design</label>
            <input type="text" id="search" oninput="render()" placeholder="Type design name..." class="w-full mt-1 p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 ring-blue-500 border-none font-bold">
        </div>
        <select id="brandFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl font-bold text-sm min-w-[150px] shadow-sm cursor-pointer"></select>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-20">
        <div class="col-span-full py-20 text-center opacity-30 font-black tracking-widest uppercase text-xl">Loading Live Stock...</div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";

    let masterData = [];

    // 🚀 MASTER FIX: Drive Link mathi ID kadhi ne Display Link banavva mate
    function getDisplayImage(url, designName) {
        if (url && url.includes('drive.google.com')) {
            let fileId = "";
            // Case 1: /file/d/ID/view
            if (url.includes('/d/')) {
                fileId = url.split('/d/')[1].split('/')[0];
            } 
            // Case 2: ?id=ID
            else if (url.includes('id=')) {
                fileId = url.split('id=')[1].split('&')[0];
            }
            
            if (fileId) {
                // Direct high-quality preview link
                return `https://drive.google.com/uc?export=view&id=${fileId}`;
            }
        }
        // Fallback: Jo photo na hoy to design name nu placeholder
        return `https://via.placeholder.com/600x400?text=${encodeURIComponent(designName || 'IMAGE')}`;
    }

    async function init() {
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            masterData = await res.json();
            setupFilters();
            render();
        } catch (e) { console.error("Data Sync Error"); }
    }

    function setupFilters() {
        const brands = [...new Set(masterData.map(i => i.Brand))].filter(Boolean).sort();
        document.getElementById('brandFilter').innerHTML = `<option value="">All Brands</option>` + 
            brands.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;

        const filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b)
        );

        const groups = {};
        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total);
        });

        const html = Object.values(groups).map(item => {
            // Priority image resolver
            const img = getDisplayImage(item.DesignURL, item["Item Description"]);

            return `
            <div class="tile-card flex flex-col md:flex-row p-4 gap-6">
                <div class="md:w-1/2 rounded-2xl overflow-hidden bg-gray-50 h-[240px]">
                    <img src="${img}" class="h-full w-full object-cover" loading="lazy" onerror="this.src='https://via.placeholder.com/600x400?text=DRIVE+ACCESS+DENIED'">
                </div>
                <div class="md:w-1/2 flex flex-col justify-between py-1">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase tracking-tighter">${item.Brand}</span>
                            <span class="text-[10px] font-bold text-gray-400">${item.Size}</span>
                        </div>
                        <h2 class="text-xl font-black text-slate-800 uppercase leading-tight mb-4">${item["Item Description"]}</h2>
                        <div class="space-y-1.5">
                            ${item.lots.map(l => `
                                <div class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded-xl border border-gray-100">
                                    <span class="text-[11px] font-bold text-gray-400">LOT: ${l.lot}</span>
                                    <span class="text-sm font-black text-slate-700">${l.qty} BX</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pt-4 border-t border-dashed flex justify-between items-end mt-4">
                        <div>
                            <p class="text-[9px] font-black text-gray-300 uppercase">Total Available</p>
                            <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                        </div>
                        <span class="bg-slate-900 text-white px-3 py-1 rounded-lg text-[10px] font-black">${item.Variant || 'STD'}</span>
                    </div>
                </div>
            </div>`;
        }).join('');

        document.getElementById('stockContainer').innerHTML = html || '<p class="col-span-full text-center py-20 font-bold opacity-30">NO DESIGNS FOUND</p>';
    }

    window.onload = init;
</script>
</body>
</html>
