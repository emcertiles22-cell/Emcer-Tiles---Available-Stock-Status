<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Inventory | Pro Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fb; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 24px; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        .premium-btn { transition: all 0.2s; position: relative; overflow: hidden; }
        .premium-btn:active { transform: scale(0.95); }
        .loader-ring { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #imgModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="" class="max-w-[90%] max-h-[80%] rounded-2xl shadow-2xl border-4 border-white">
</div>

<div class="max-w-7xl mx-auto p-4 md:p-10">
    <div class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <div id="indicator" class="h-3 w-3 rounded-full bg-orange-500 animate-pulse shadow-[0_0_10px_rgba(249,115,22,0.5)]"></div>
                <p id="status" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">System Syncing</p>
            </div>
            <h1 class="text-4xl font-[900] text-slate-900 tracking-tight">EMCER <span class="text-blue-600">TILES</span></h1>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button onclick="fetchAllData()" class="premium-btn bg-white border border-slate-200 text-slate-700 px-6 py-3 rounded-2xl font-bold hover:bg-slate-50 flex items-center gap-2 shadow-sm">🔄 Refresh</button>
            <button onclick="downloadExcel()" class="premium-btn bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold hover:bg-emerald-600 shadow-lg shadow-emerald-100 flex items-center gap-2">📊 Export Excel</button>
            <button onclick="generatePDF()" class="premium-btn bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 flex items-center gap-2">📄 PDF Report</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10">
        <div class="lg:col-span-8 flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <input type="text" id="search" oninput="render()" placeholder="Search Design..." class="w-full bg-white border border-slate-200 rounded-2xl p-4 pl-12 font-bold outline-none focus:ring-4 ring-blue-500/10 transition-all">
                <span class="absolute left-4 top-4.5 opacity-30 text-xl">🔍</span>
            </div>
            <select id="brandFilter" onchange="render()" class="bg-white border border-slate-200 rounded-2xl p-4 font-bold outline-none cursor-pointer w-full md:w-48"></select>
            <select id="sizeFilter" onchange="render()" class="bg-white border border-slate-200 rounded-2xl p-4 font-bold outline-none cursor-pointer w-full md:w-48"></select>
        </div>
        
        <div class="lg:col-span-4 bg-slate-900 rounded-[28px] p-6 flex justify-between items-center text-white shadow-2xl">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Live Stock Available</p>
                <h2 id="grandTotal" class="text-4xl font-black">0</h2>
            </div>
            <div class="h-12 w-12 bg-white/10 rounded-full flex items-center justify-center">
                <span class="text-xl">📦</span>
            </div>
        </div>
    </div>

    <div id="loaderUI" class="flex flex-col items-center justify-center py-40">
        <div class="loader-ring"></div>
        <p class="mt-4 text-slate-400 font-bold uppercase tracking-widest text-xs">Authenticating Data...</p>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 gap-6 hidden"></div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec"; // REPLACE THIS
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {};

    async function fetchAllData() {
        try {
            const [designRes, stockRes] = await Promise.all([
                fetch(DESIGN_JSON_URL),
                fetch(APPS_SCRIPT_URL)
            ]);
            
            const designData = await designRes.json();
            designMap = {};
            designData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);

            masterData = await stockRes.json();
            
            document.getElementById('status').innerText = "System Live";
            document.getElementById('status').className = "text-[10px] font-black text-green-600 uppercase tracking-[0.3em]";
            document.getElementById('indicator').className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]";
            
            document.getElementById('loaderUI').classList.add('hidden');
            document.getElementById('stockContainer').classList.remove('hidden');
            
            setupFilters();
            render();
        } catch (err) {
            console.error(err);
        }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set();
        masterData.forEach(item => {
            if(item.Brand) brands.add(item.Brand);
            if(item.Size) sizes.add(item.Size);
        });
        const fill = (id, set, label) => {
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + 
                [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('brandFilter', brands, 'Brands');
        fill('sizeFilter', sizes, 'Sizes');
    }

    function render() {
        const search = document.getElementById('search').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const size = document.getElementById('sizeFilter').value;
        const container = document.getElementById('stockContainer');
        const groups = {};
        let totalSum = 0;

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const b = String(item.Brand || "").trim();
            const s = String(item.Size || "").trim();
            const lot = String(item["Lot No"] || "N/A");
            const qty = parseFloat(item["Total"] || 0);

            if (name.toLowerCase().includes(search) && (!brand || b === brand) && (!size || s === size)) {
                const key = `${name}|${b}|${s}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand: b, size: s, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty;
                totalSum += qty;
            }
        });

        document.getElementById('grandTotal').innerText = Math.round(totalSum).toLocaleString();

        container.innerHTML = Object.values(groups).map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/200?text=No+Preview';
            return `
            <div class="glass-card flex flex-col md:flex-row overflow-hidden shadow-sm">
                <div class="md:w-52 bg-white p-6 flex items-center justify-center border-r border-slate-50 cursor-zoom-in" onclick="zoom('${img}')">
                    <img src="${img}" class="max-h-36 rounded-2xl object-contain hover:scale-110 transition-transform duration-500">
                </div>
                <div class="flex-1 p-8">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-widest border border-blue-100">${item.brand}</span>
                        <span class="text-[9px] font-black text-slate-500 bg-slate-50 px-3 py-1 rounded-full uppercase tracking-widest border border-slate-100">${item.size}</span>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 uppercase mb-6 tracking-tight">${item.name}</h3>
                    <div class="flex flex-wrap gap-4">
                        ${item.lots.map(l => `
                            <div class="bg-slate-50/50 rounded-2xl px-4 py-3 border border-slate-100 min-w-[120px]">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Lot Number</p>
                                <p class="text-sm font-black text-slate-800">${l.lot}</p>
                                <p class="text-xs font-bold text-blue-600 mt-1">${l.qty} Boxes</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="md:w-44 bg-slate-900 flex flex-col items-center justify-center p-8 text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Total Pack</p>
                    <p class="text-4xl font-[1000] text-white">${Math.round(item.total)}</p>
                    <div class="mt-2 h-1 w-8 bg-blue-500 rounded-full"></div>
                </div>
            </div>`;
        }).join('');
    }

    function zoom(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('imgModal').style.display = 'flex';
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(22);
        doc.text("EMCER TILES PVT LTD", 14, 20);
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Inventory Report - Generated on: ${new Date().toLocaleString()}`, 14, 28);
        
        const tableData = masterData.map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total]);
        
        doc.autoTable({
            startY: 35,
            head: [['Brand', 'Design Name', 'Size', 'Lot No', 'Quantity']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillStyle: [30, 41, 59], fontSize: 10, fontStyle: 'bold' },
            styles: { fontSize: 9, cellPadding: 3 },
            alternateRowStyles: { fillColor: [248, 250, 252] }
        });
        
        doc.save(`Emcer_Stock_${Date.now()}.pdf`);
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "LiveStock");
        XLSX.writeFile(wb, "Emcer_Live_Inventory.xlsx");
    }

    window.onload = fetchAllData;
</script>
</body>
</html>
