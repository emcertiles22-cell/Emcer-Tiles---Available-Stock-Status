<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Yashdeep Jivani</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b39359; --dark: #0f172a; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f0f2f5; 
            background-image: radial-gradient(#d1d5db 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        /* Developer Sparkle */
        @keyframes shine { 0% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 15px var(--gold); } 100% { opacity: 0.7; transform: scale(1); } }
        .yashdeep-tag {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; border: 1px solid var(--gold);
            padding: 5px 15px; border-radius: 12px;
            font-weight: 800; font-size: 12px; animation: shine 2s infinite ease-in-out;
        }

        /* Luxury Card Styling */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(179, 147, 89, 0.15);
            border-color: var(--gold);
        }

        .stat-box {
            background: white; border-radius: 20px; padding: 20px;
            border-left: 5px solid var(--dark);
        }

        /* Image Mask */
        .tile-mask {
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="text-center md:text-left">
            <h1 style="font-family: 'Cinzel', serif;" class="text-4xl font-bold tracking-tight text-slate-900">EMCER TILES</h1>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-[0.4em] mt-1">Live Stock Management</p>
        </div>
        <div class="flex flex-col items-center md:items-end">
            <span class="text-[9px] font-black text-slate-400 uppercase mb-1">Architect & Developer</span>
            <div class="yashdeep-tag">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <div class="stat-box">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Total Designs</p>
            <h2 id="stat-total" class="text-2xl font-black">0</h2>
        </div>
        <div class="stat-box" style="border-left-color: #b39359;">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Available Boxes</p>
            <h2 id="stat-boxes" class="text-2xl font-black">0</h2>
        </div>
        <div class="stat-box">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Active Brands</p>
            <h2 id="stat-brands" class="text-2xl font-black">0</h2>
        </div>
        <div class="stat-box" style="border-left-color: #3b82f6;">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Filtered Result</p>
            <h2 id="stat-filtered" class="text-2xl font-black text-blue-600">0</h2>
        </div>
    </div>

    <div class="glass-card p-6 mb-10 grid grid-cols-1 md:grid-cols-5 gap-4">
        <input type="text" id="search" oninput="render()" placeholder="🔍 Search Tile Name..." class="md:col-span-2 p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 ring-[#b39359] border-none font-medium">
        <select id="brandFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm"></select>
        <select id="sizeFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm"></select>
        <select id="gradeFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm"></select>
    </div>

    <div class="flex justify-end gap-3 mb-6">
        <button onclick="generatePDF()" class="bg-red-500 hover:bg-black text-white px-6 py-3 rounded-2xl font-bold transition-all shadow-lg">📥 PDF (WITH IMAGES)</button>
        <button onclick="downloadExcel()" class="bg-green-600 hover:bg-black text-white px-6 py-3 rounded-2xl font-bold transition-all shadow-lg text-sm">📊 EXCEL REPORT</button>
        <button onclick="location.reload()" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-200">🔄</button>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="col-span-full py-20 text-center opacity-30">
            <p class="animate-pulse font-black tracking-widest">CONNECTING TO LIVE SERVER...</p>
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNOPQSBbfoEKF3EyuvWLWpF0B2plwgwaZrppeq0mB_BzlMFHPp61IuGwj7LdvQW3b9xA/exec";
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {}, currentFilteredData = [];

    async function init() {
        try {
            const [dRes, sRes] = await Promise.all([fetch(DESIGN_JSON_URL), fetch(APPS_SCRIPT_URL)]);
            const dData = await dRes.json();
            dData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = await sRes.json();
            setupFilters();
            render();
        } catch (e) { alert("Data Sync Failed!"); }
    }

    function setupFilters() {
        const fill = (id, key, label) => {
            const vals = [...new Set(masterData.map(i => i[key]))].filter(Boolean).sort();
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + 
                vals.map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('brandFilter', 'Brand', 'Brands');
        fill('sizeFilter', 'Size', 'Sizes');
        fill('gradeFilter', 'Variant', 'Grades'); // "Variant" column map to Grade
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;
        const sz = document.getElementById('sizeFilter').value;
        const g = document.getElementById('gradeFilter').value;

        currentFilteredData = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b) &&
            (!sz || i.Size === sz) &&
            (!g || i.Variant === g)
        );

        const groups = {};
        let totalBoxes = 0;
        const brands = new Set();

        currentFilteredData.forEach(i => {
            const key = i["Item Description"].toLowerCase().trim();
            if(!groups[key]) groups[key] = { ...i, lots: [], total: 0 };
            groups[key].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[key].total += parseFloat(i.Total);
            totalBoxes += parseFloat(i.Total);
            brands.add(i.Brand);
        });

        document.getElementById('stat-total').innerText = Object.keys(groups).length;
        document.getElementById('stat-boxes').innerText = Math.round(totalBoxes).toLocaleString();
        document.getElementById('stat-brands').innerText = brands.size;
        document.getElementById('stat-filtered').innerText = currentFilteredData.length;

        document.getElementById('stockContainer').innerHTML = Object.values(groups).map(item => {
            const img = designMap[item["Item Description"].toLowerCase().trim()] || 'https://via.placeholder.com/600x400?text=IMAGE+PENDING';
            return `
            <div class="glass-card p-4 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/2 tile-mask">
                    <img src="${img}" class="h-full w-full object-cover min-h-[220px]">
                </div>
                <div class="md:w-1/2 flex flex-col justify-between py-2">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-black text-[#b39359] uppercase">${item.Brand}</span>
                            <span class="text-[10px] font-bold text-gray-400">${item.Size}</span>
                        </div>
                        <h3 class="text-xl font-extrabold uppercase mb-4 text-slate-800 leading-tight">${item["Item Description"]}</h3>
                        
                        <div class="space-y-2 mb-4">
                            ${item.lots.map(l => `
                                <div class="flex justify-between items-center bg-white/50 px-3 py-1.5 rounded-xl border border-gray-100">
                                    <span class="text-[11px] font-bold text-gray-400">LOT: ${l.lot}</span>
                                    <span class="text-sm font-black text-slate-700">${l.qty} BX</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end border-t border-dashed border-gray-200 pt-4">
                        <div>
                            <p class="text-[9px] font-bold text-gray-300 uppercase">Available</p>
                            <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-gray-300 uppercase">Grade</p>
                            <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px] font-black italic">${item.Variant || 'STANDARD'}</span>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("EMCER TILES PVT LTD", 14, 15);
        doc.setFontSize(10);
        doc.text(`Developed By: Yashdeep Jivani | Filtered Designs: ${currentFilteredData.length}`, 14, 22);

        const rows = currentFilteredData.slice(0, 50).map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total, i.Variant]);
        doc.autoTable({
            startY: 28,
            head: [['Brand', 'Design Name', 'Size', 'Lot', 'Boxes', 'Grade']],
            body: rows,
            headStyles: { fillColor: [15, 23, 42] },
            theme: 'striped'
        });
        doc.save("Emcer_Live_Report.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(currentFilteredData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Live_Stock.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
