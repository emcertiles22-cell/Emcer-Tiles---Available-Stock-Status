<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Premium Stock Management</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f1f5f9;
            background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 25%), radial-gradient(circle at 100% 100%, #0f172a 0%, transparent 25%);
            min-height: 100vh;
        }

        .elite-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .elite-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #3b82f6;
            box-shadow: 0 30px 60px -15px rgba(59, 130, 246, 0.3);
        }

        .sparkle-text {
            background: linear-gradient(90deg, #fbbf24, #fff, #fbbf24);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sparkle 3s linear infinite;
            font-weight: 800;
        }

        @keyframes sparkle {
            to { background-position: 200% center; }
        }

        .img-box {
            height: 280px;
            border-radius: 24px;
            overflow: hidden;
            background: #1e293b;
            position: relative;
        }

        .status-pill {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <!-- Premium Header -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
        <div class="text-center md:text-left">
            <h1 class="text-6xl font-black tracking-tighter text-white">EMCER <span class="text-blue-500">TILES</span></h1>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-[0.5em] mt-2">Elite Inventory Management</p>
        </div>
        
        <div class="flex flex-col items-center md:items-end gap-4">
            <div class="bg-slate-900/80 px-6 py-3 rounded-2xl border border-white/5 flex items-center gap-3">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Architect:</span>
                <span class="sparkle-text uppercase text-sm">Yashdeep Jivani</span>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadPDF()" class="bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-xl border border-white/10 text-sm font-bold transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    PDF
                </button>
                <button onclick="downloadExcel()" class="bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 px-5 py-2.5 rounded-xl border border-emerald-500/20 text-sm font-bold transition flex items-center gap-2">
                    EXCEL
                </button>
            </div>
        </div>
    </header>

    <!-- Advanced Filter Bar -->
    <div class="elite-card p-6 mb-12 grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="md:col-span-2">
            <label class="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Search Design</label>
            <input type="text" id="search" oninput="render()" placeholder="Enter item description..." 
                class="w-full bg-slate-800/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold">
        </div>
        <div>
            <label class="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Category</label>
            <select id="brandFilter" onchange="render()" class="w-full bg-slate-800/50 border border-white/10 p-4 rounded-2xl font-bold outline-none cursor-pointer"></select>
        </div>
        <div>
            <label class="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Sort By</label>
            <select id="sortFilter" onchange="render()" class="w-full bg-slate-800/50 border border-white/10 p-4 rounded-2xl font-bold outline-none">
                <option value="high">High Stock</option>
                <option value="low">Low Stock</option>
            </select>
        </div>
    </div>

    <!-- Stock Grid -->
    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 pb-20">
        <div class="col-span-full py-20 text-center">
            <div class="inline-block animate-bounce text-4xl mb-4">💎</div>
            <p class="text-slate-500 font-bold tracking-widest animate-pulse">REFINING ELITE STOCK DATA...</p>
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNOPQSBbfoEKF3EyuvWLWpF0B2plwgwaZrppeq0mB_BzlMFHPp61IuGwj7LdvQW3b9xA/exec";
    let masterData = [];

    async function init() {
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            masterData = await res.json();
            setupFilters();
            render();
        } catch (e) {
            document.getElementById('stockContainer').innerHTML = "<p class='col-span-full text-center text-red-400 font-bold'>Connection Error. Reloading recommended.</p>";
        }
    }

    function setupFilters() {
        const brands = [...new Set(masterData.map(i => i.Brand))].filter(Boolean).sort();
        document.getElementById('brandFilter').innerHTML = `<option value="">All Brands</option>` + 
            brands.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;
        const sort = document.getElementById('sortFilter').value;

        let filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b)
        );

        // Grouping & Totaling
        const groups = {};
        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total || 0);
        });

        let displayList = Object.values(groups);
        
        // Sorting
        if(sort === "high") displayList.sort((a, b) => b.total - a.total);
        else displayList.sort((a, b) => a.total - b.total);

        document.getElementById('stockContainer').innerHTML = displayList.map(item => `
            <div class="elite-card p-6 flex flex-col">
                <div class="img-box mb-6 group">
                    <div class="status-pill text-blue-400">BATCH TRACKING ON</div>
                    <img src="${item.ImgUrl}" class="h-full w-full object-cover transition duration-1000 group-hover:scale-110" 
                         onerror="this.src='https://via.placeholder.com/600x400?text=IMAGE+NOT+SYNCED'">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-60"></div>
                </div>

                <div class="flex-grow">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black text-blue-500 bg-blue-500/10 px-3 py-1 rounded-full uppercase">${item.Brand || 'ELITE'}</span>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${item.Size || '800X2400'}</span>
                    </div>
                    <h2 class="text-2xl font-extrabold text-white uppercase mb-6 leading-tight">${item["Item Description"]}</h2>
                    
                    <div class="space-y-2 mb-8">
                        ${item.lots.map(l => `
                            <div class="flex justify-between items-center bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Lot ${l.lot}</span>
                                <span class="text-sm font-black text-slate-200">${l.qty} BX</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="pt-6 border-t border-white/10 flex justify-between items-end">
                    <div>
                        <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Live Inventory</p>
                        <p class="text-4xl font-black text-white tracking-tighter">${Math.round(item.total)}<span class="text-sm text-blue-500 ml-1">BX</span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Design</p>
                        <span class="bg-slate-800 text-slate-300 px-3 py-1 rounded-lg text-[10px] font-black">${item.Variant || 'STD'}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(20);
        doc.text("EMCER TILES - ELITE STOCK REPORT", 14, 20);
        doc.setFontSize(10);
        doc.text(`Generated by: Yashdeep Jivani | Date: ${new Date().toLocaleDateString()}`, 14, 28);

        const tableData = masterData.map(i => [
            i.Brand, 
            i["Item Description"], 
            i["Lot No"], 
            i.Total, 
            i.Size || '600x600'
        ]);

        doc.autoTable({
            startY: 35,
            head: [['Brand', 'Description', 'Lot No', 'Qty (BX)', 'Size']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [15, 23, 42] }
        });

        doc.save("Emcer_Elite_Report.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "EliteStock");
        XLSX.writeFile(wb, "Emcer_Elite_Inventory.xlsx");
    }

    window.onload = init;
</script>

</body>
</html>
