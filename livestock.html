<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Tiles | Elite Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        
        .premium-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .premium-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.2);
        }

        .img-container {
            height: 240px; width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #1e293b;
        }

        .yashdeep-badge {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        input, select {
            background: rgba(30, 41, 59, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-start mb-12 gap-6">
        <div>
            <h1 class="text-5xl font-black tracking-tighter text-white">EMCER <span class="text-blue-500">TILES</span></h1>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Elite Inventory Management</p>
        </div>
        <div class="flex flex-col items-end">
            <span class="yashdeep-badge mb-2">DEVELOPER: YASHDEEP JIVANI</span>
            <button onclick="downloadExcel()" class="text-[10px] bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full border border-white/10 transition font-bold uppercase tracking-widest">Download Report</button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
        <div class="md:col-span-2">
            <input type="text" id="search" oninput="render()" placeholder="Search design name..." 
                class="w-full p-4 rounded-2xl outline-none focus:ring-2 ring-blue-500 transition-all font-semibold">
        </div>
        <select id="brandFilter" onchange="render()" class="p-4 rounded-2xl font-bold cursor-pointer outline-none"></select>
    </div>

    <!-- Stock Grid -->
    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center py-20 animate-pulse font-bold text-slate-500">LOADING LIVE STOCK DATA...</div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "new deploy script url - https://script.google.com/macros/s/AKfycbzNOPQSBbfoEKF3EyuvWLWpF0B2plwgwaZrppeq0mB_BzlMFHPp61IuGwj7LdvQW3b9xA/exec";
    let masterData = [];

    async function init() {
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            masterData = await res.json();
            setupFilters();
            render();
        } catch (e) {
            document.getElementById('stockContainer').innerHTML = "Connection Error. Please check Script URL.";
        }
    }

    function setupFilters() {
        const brands = [...new Set(masterData.map(i => i.Brand))].filter(Boolean).sort();
        document.getElementById('brandFilter').innerHTML = `<option value="">All Brands</option>` + 
            brands.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;

        const filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b)
        );

        // Grouping
        const groups = {};
        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total || 0);
        });

        const html = Object.values(groups).map(item => `
            <div class="premium-card p-4 flex flex-col">
                <div class="img-container mb-4">
                    <img src="${item.ImgUrl}" class="h-full w-full object-cover transition duration-500 hover:scale-110" 
                         onerror="this.src='https://via.placeholder.com/600x400?text=IMAGE+NOT+FOUND'">
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">${item.Brand}</span>
                        <span class="text-[10px] font-bold text-slate-500">${item.Size || 'N/A'}</span>
                    </div>
                    <h2 class="text-xl font-extrabold text-white uppercase truncate mb-4">${item["Item Description"]}</h2>
                    
                    <div class="space-y-1.5 mb-6">
                        ${item.lots.slice(0, 3).map(l => `
                            <div class="flex justify-between text-[11px] bg-white/5 p-2 rounded-lg border border-white/5">
                                <span class="text-slate-400 font-bold">LOT: ${l.lot}</span>
                                <span class="text-white font-black">${l.qty} BX</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="pt-4 border-t border-white/10 flex justify-between items-end">
                    <div>
                        <p class="text-[9px] font-bold text-slate-500 uppercase">Available Boxes</p>
                        <p class="text-3xl font-black text-white tracking-tighter">${Math.round(item.total)}</p>
                    </div>
                    <div class="bg-blue-600 text-white px-3 py-1 rounded-md text-[10px] font-black italic">ELITE</div>
                </div>
            </div>
        `).join('');

        document.getElementById('stockContainer').innerHTML = html || `<p class="col-span-full text-center py-10">No designs found.</p>`;
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Elite_Stock.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
