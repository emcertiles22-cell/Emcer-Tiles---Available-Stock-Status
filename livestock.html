<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer | Luxury Inventory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --marble-bg: #fdfdfb;
            --premium-gold: #b39359;
            --deep-slate: #1c1c1c;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--marble-bg);
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--deep-slate);
        }
        .luxury-card {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(179, 147, 89, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .luxury-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(179, 147, 89, 0.12);
            border-color: var(--premium-gold);
        }
        .gold-label { color: var(--premium-gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .btn-premium {
            transition: all 0.3s;
            border: 1px solid #e5e7eb;
            background: white;
        }
        .btn-premium:hover {
            background: var(--deep-slate);
            color: white;
            border-color: var(--deep-slate);
        }
        #imgModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(255,255,255,0.95); align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="" class="max-w-[90%] max-h-[80%] rounded-xl shadow-2xl border-4 border-white">
</div>

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 border-b border-gray-200 pb-8">
        <div class="text-center md:text-left">
            <h1 style="font-family: 'Cinzel', serif;" class="text-4xl tracking-widest text-slate-900">EMCER</h1>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-[0.4em] mt-1">Live Inventory Portal</p>
        </div>
        
        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="fetchAllData()" class="btn-premium px-6 py-2.5 rounded-full text-sm font-bold shadow-sm">🔄 REFRESH</button>
            <button onclick="downloadExcel()" class="btn-premium px-6 py-2.5 rounded-full text-sm font-bold shadow-sm">📊 EXCEL</button>
            <button onclick="generatePDF()" class="bg-[#b39359] text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg shadow-gold/20 hover:bg-black transition-all">📄 DOWNLOAD PDF</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
        <div class="relative">
            <input type="text" id="search" oninput="render()" placeholder="Search Design Name..." class="w-full p-4 rounded-2xl border border-gray-200 focus:ring-2 ring-[#b39359] outline-none shadow-sm">
        </div>
        <select id="brandFilter" onchange="render()" class="p-4 rounded-2xl border border-gray-200 outline-none shadow-sm font-semibold"></select>
        <select id="sizeFilter" onchange="render()" class="p-4 rounded-2xl border border-gray-200 outline-none shadow-sm font-semibold"></select>
    </div>

    <div id="loader" class="flex justify-center py-20">
        <div class="animate-bounce font-bold text-[#b39359] tracking-widest uppercase">Fetching Collection...</div>
    </div>
    
    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden"></div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec"; // AHIA TAMARI URL MUKO
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {};

    async function fetchAllData() {
        try {
            const [dRes, sRes] = await Promise.all([fetch(DESIGN_JSON_URL), fetch(APPS_SCRIPT_URL)]);
            const dData = await dRes.json();
            designMap = {};
            dData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = await sRes.json();
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('stockContainer').classList.remove('hidden');
            
            setupFilters();
            render();
        } catch (e) { console.error(e); }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); });
        const fill = (id, set, label) => {
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + 
                [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('brandFilter', brands, 'Brands');
        fill('sizeFilter', sizes, 'Sizes');
    }

    function render() {
        const search = document.getElementById('search').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const size = document.getElementById('sizeFilter').value;
        const container = document.getElementById('stockContainer');
        const groups = {};

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const b = String(item.Brand || "").trim();
            const s = String(item.Size || "").trim();
            const lot = String(item["Lot No"] || "N/A");
            const qty = parseFloat(item["Total"] || 0);

            if (name.toLowerCase().includes(search) && (!brand || b === brand) && (!size || s === size)) {
                const key = `${name}|${b}|${s}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand: b, size: s, lots: [], total: 0 };
                groups[key].lots.push({ lot, qty });
                groups[key].total += qty;
            }
        });

        container.innerHTML = Object.values(groups).map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x300?text=No+Preview';
            return `
            <div class="luxury-card overflow-hidden flex flex-col sm:flex-row">
                <div class="sm:w-1/2 overflow-hidden cursor-zoom-in" onclick="zoom('${img}')">
                    <img src="${img}" class="h-full w-full object-cover hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-6 sm:w-1/2 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] bg-gray-100 px-2 py-1 rounded font-black text-gray-500 uppercase">${item.size}</span>
                            <span class="gold-label text-[10px]">${item.brand}</span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 uppercase mb-4 leading-tight">${item.name}</h3>
                        <div class="space-y-2 mb-4">
                            ${item.lots.map(l => `
                                <div class="flex justify-between text-xs border-b border-gray-50 pb-1">
                                    <span class="text-gray-400 font-medium">Lot: ${l.lot}</span>
                                    <span class="font-bold text-slate-700">${l.qty} Bx</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pt-4 border-t border-gray-100 flex justify-between items-end">
                        <div>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Stock</p>
                            <p class="text-3xl font-bold text-slate-900">${Math.round(item.total)} <span class="text-sm font-medium text-gray-400">Boxes</span></p>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function zoom(url) { document.getElementById('modalImg').src = url; document.getElementById('imgModal').style.display = 'flex'; }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.setTextColor(28, 28, 28);
        doc.text("EMCER TILES", 14, 20);
        
        doc.setFontSize(10);
        doc.setTextColor(150, 150, 150);
        doc.text(`STOCK REPORT | GENERATED: ${new Date().toLocaleString()}`, 14, 28);
        
        const rows = masterData.map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total]);
        doc.autoTable({
            startY: 35,
            head: [['Brand', 'Design Name', 'Size', 'Lot No', 'Qty (Boxes)']],
            body: rows,
            headStyles: { fillColor: [179, 147, 89], textColor: 255 },
            styles: { fontSize: 9 },
            alternateRowStyles: { fillColor: [250, 248, 245] }
        });
        doc.save("Emcer_Luxury_Stock.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Stock_Report.xlsx");
    }

    window.onload = fetchAllData;
</script>
</body>
</html>
