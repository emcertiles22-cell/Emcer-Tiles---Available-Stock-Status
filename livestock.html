<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Live Stock Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fa; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .stock-row:hover { background-color: #f8fafc; transform: translateY(-2px); transition: all 0.2s; }
        .loader { border-top-color: #2563eb; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modal Style for Image */
        #imgModal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        #modalImg { max-width: 90%; max-height: 85%; border: 4px solid white; border-radius: 12px; }
    </style>
</head>
<body>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
    <div class="absolute top-5 right-5 text-white text-3xl font-bold">&times; Close</div>
</div>

<div class="max-w-7xl mx-auto p-4 md:p-8">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-[800] text-slate-900 tracking-tight">EMCER TILES PRIVATE LIMITED</h1>
            <div class="flex items-center gap-2 mt-1">
                <span id="syncStatus" class="flex h-3 w-3 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-600"></span>
                </span>
                <span class="text-sm font-bold text-blue-600 uppercase tracking-widest">Live Inventory Portal</span>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-2">
            <button onclick="refreshData()" class="bg-white border-2 border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                <span id="refreshIcon">🔄</span> REFRESH
            </button>
            <button onclick="downloadExcel()" class="bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100 flex items-center gap-2">
                <span>📊</span> EXCEL
            </button>
            <button onclick="generatePDF()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center gap-2">
                <span>📥</span> DOWNLOAD PDF
            </button>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="glass-card p-5 rounded-2xl shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Designs</p>
            <h2 id="totalDesigns" class="text-2xl font-extrabold text-slate-900">0</h2>
        </div>
        <div class="glass-card p-5 rounded-2xl shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Stock (Boxes)</p>
            <h2 id="totalBoxes" class="text-2xl font-extrabold text-slate-900">0</h2>
        </div>
        <div class="glass-card p-5 rounded-2xl shadow-sm border-l-4 border-l-blue-600">
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Active Brands</p>
            <h2 id="totalBrands" class="text-2xl font-extrabold text-slate-900">0</h2>
        </div>
        <div class="glass-card p-5 rounded-2xl shadow-sm bg-blue-600">
            <p class="text-[10px] font-bold text-blue-100 uppercase tracking-widest">Developer</p>
            <h2 class="text-lg font-extrabold text-white">YASHDEEP JIVANI</h2>
        </div>
    </div>

    <div class="glass-card p-4 rounded-2xl shadow-sm mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="relative">
            <input type="text" id="searchInput" oninput="applyFilters()" placeholder="Search Design Name..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 pl-10 text-sm focus:ring-2 ring-blue-500 outline-none font-semibold">
            <span class="absolute left-3 top-3.5 opacity-40">🔍</span>
        </div>
        <select id="brandFilter" onchange="applyFilters()" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none"></select>
        <select id="sizeFilter" onchange="applyFilters()" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none"></select>
        <select id="variantFilter" onchange="applyFilters()" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-semibold outline-none"></select>
    </div>

    <div id="loadingOverlay" class="flex flex-col items-center justify-center py-20">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-slate-500 font-bold animate-pulse">FETCHING LIVE STOCK DATA...</p>
    </div>

    <div id="stockContainer" class="space-y-4 hidden">
        </div>
</div>

<script>
    let rawData = [], designMap = {};
    let filteredData = [];

    // 1. Initialize
    function init() {
        // Tame tamara Script ID sathe connect karo
        if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(dMap => {
                designMap = dMap;
                fetchMainData();
            }).getDesignData();
        } else {
            document.getElementById('loadingOverlay').innerHTML = "<p class='text-red-500 font-bold'>Error: Local PC mathi access karva mate Google Script Exec URL open karo.</p>";
        }
    }

    // 2. Fetch Data
    function fetchMainData() {
        google.script.run.withSuccessHandler(data => {
            rawData = data;
            setupFilters();
            applyFilters();
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('stockContainer').classList.remove('hidden');
        }).getStockData();
    }

    // 3. Refresh Logic
    function refreshData() {
        const btnIcon = document.getElementById('refreshIcon');
        btnIcon.classList.add('animate-spin');
        fetchMainData();
        setTimeout(() => btnIcon.classList.remove('animate-spin'), 1000);
    }

    // 4. Setup Filters
    function setupFilters() {
        const brands = new Set(), sizes = new Set(), variants = new Set();
        rawData.forEach(item => {
            if(item.Brand) brands.add(item.Brand);
            if(item.Size) sizes.add(item.Size);
            if(item.Variant || item.Grade) variants.add(item.Variant || item.Grade);
        });

        const populate = (id, set, label) => {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">All ${label}</option>` + 
                [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        };

        populate('brandFilter', brands, 'Brands');
        populate('sizeFilter', sizes, 'Sizes');
        populate('variantFilter', variants, 'Variants');
    }

    // 5. Apply Filters & Render
    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const size = document.getElementById('sizeFilter').value;
        const variant = document.getElementById('variantFilter').value;

        const groups = {};
        let totalBoxes = 0;
        let uniqueBrands = new Set();

        rawData.forEach(item => {
            const dName = (item["Item Description"] || "").trim();
            const dBrand = (item.Brand || "").trim();
            const dSize = (item.Size || "").trim();
            const dVariant = (item.Variant || item.Grade || "").trim();
            const dQty = parseFloat(item.Total || item["Total Boxes"] || 0);

            if (dName.toLowerCase().includes(search) && (!brand || dBrand === brand) && 
                (!size || dSize === size) && (!variant || dVariant === variant)) {
                
                const key = `${dName}-${dBrand}-${dSize}`.toLowerCase();
                if (!groups[key]) {
                    groups[key] = { name: dName, brand: dBrand, size: dSize, variant: dVariant, lots: [], total: 0 };
                }
                groups[key].lots.push({ lot: item["Lot No"] || "N/A", qty: dQty });
                groups[key].total += dQty;
                totalBoxes += dQty;
                uniqueBrands.add(dBrand);
            }
        });

        filteredData = Object.values(groups);
        
        // Update Stats
        document.getElementById('totalDesigns').innerText = filteredData.length;
        document.getElementById('totalBoxes').innerText = Math.round(totalBoxes).toLocaleString();
        document.getElementById('totalBrands').innerText = uniqueBrands.size;

        renderCards(filteredData);
    }

    // 6. Render Logic
    function renderCards(items) {
        const container = document.getElementById('stockContainer');
        if (items.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold">NO MATCHING DATA FOUND</div>`;
            return;
        }

        container.innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/200?text=No+Photo';
            return `
            <div class="glass-card flex flex-col md:flex-row rounded-2xl overflow-hidden shadow-sm stock-row">
                <div class="md:w-48 bg-white flex items-center justify-center p-4 cursor-zoom-in border-r border-slate-100" onclick="zoomImg('${img}')">
                    <img src="${img}" class="max-h-32 object-contain rounded-lg">
                </div>
                <div class="flex-1 p-5">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] font-extrabold text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase tracking-wider">${item.brand}</span>
                            <h3 class="text-xl font-bold text-slate-800 uppercase mt-1">${item.name}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Stock</p>
                            <p class="text-2xl font-black text-slate-900">${Math.round(item.total)} <span class="text-sm font-bold text-slate-400">Bx</span></p>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-slate-500 mb-4">${item.size} | ${item.variant}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        ${item.lots.map(l => `
                            <div class="bg-slate-50 p-2 rounded-lg border border-slate-100">
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Lot: ${l.lot}</p>
                                <p class="text-xs font-bold text-slate-700">${l.qty} Boxes</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // 7. Zoom Function
    function zoomImg(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('imgModal').style.display = 'flex';
    }

    // 8. Excel Download
    function downloadExcel() {
        const dataForExcel = filteredData.map(item => ({
            "Design Name": item.name,
            "Brand": item.brand,
            "Size": item.size,
            "Variant": item.variant,
            "Total Stock": item.total
        }));
        
        const ws = XLSX.utils.json_to_sheet(dataForExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "LiveStock");
        XLSX.writeFile(wb, `Emcer_Stock_${new Date().toLocaleDateString()}.xlsx`);
    }

    // 9. PDF Download
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const container = document.getElementById('stockContainer');
        
        // Simple PDF logic - convert current view to PDF
        html2canvas(container).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const imgProps = doc.getImageProperties(imgData);
            const pdfWidth = doc.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            doc.save("Emcer_Live_Stock.pdf");
        });
    }

    window.onload = init;
</script>
</body>
</html>
