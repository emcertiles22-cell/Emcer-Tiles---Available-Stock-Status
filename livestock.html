<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Live Stock | GitHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .stock-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; display: flex; margin-bottom: 1rem; }
        .img-container { width: 120px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; cursor: pointer; }
        #zoomModal { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="zoomModal" onclick="this.style.display='none'"><img id="zoomImg" src="" style="max-width: 90%; max-height: 80%; border: 4px solid white;"></div>

<div class="max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6">
        <div>
            <h1 class="text-xl font-bold">EMCER TILES PVT LTD</h1>
            <p id="status" class="text-xs font-bold text-orange-500 animate-pulse">FETCHING DATA...</p>
        </div>
        <div class="flex gap-2">
            <button onclick="fetchData()" class="bg-slate-100 p-2 rounded-lg text-sm font-bold">🔄 REFRESH</button>
            <button onclick="exportExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold">📊 EXCEL</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <input type="text" id="search" oninput="renderData()" placeholder="🔍 Search Design..." class="p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 ring-blue-500 font-semibold">
        <div class="flex items-center justify-between bg-blue-600 text-white p-3 rounded-xl">
            <span class="text-sm font-bold">TOTAL STOCK:</span>
            <span id="totalCount" class="text-xl font-black">0</span>
        </div>
    </div>

    <div id="stockList"></div>
</div>

<script>
    // 🚨 AHIYA TAMARI APPS SCRIPT NI URL MUKO
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";

    let masterData = [], designMap = {};

    async function fetchData() {
        document.getElementById('status').innerText = "🔄 SYNCING...";
        try {
            const response = await fetch(WEB_APP_URL);
            const resData = await response.json();
            masterData = resData.stock;
            designMap = resData.designs;
            document.getElementById('status').innerText = "✅ LIVE SYNC ACTIVE";
            document.getElementById('status').classList.replace('text-orange-500', 'text-green-600');
            renderData();
        } catch (e) {
            document.getElementById('status').innerText = "❌ CONNECTION ERROR";
        }
    }

    function renderData() {
        const query = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('stockList');
        const groups = {};
        let grandTotal = 0;

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const lot = item["Lot No"] || "N/A";
            const qty = parseFloat(item["Total"] || 0);

            if (name.toLowerCase().includes(query)) {
                if (!groups[name]) groups[name] = { name, total: 0, lots: [] };
                groups[name].lots.push({ lot, qty });
                groups[name].total += qty;
                grandTotal += qty;
            }
        });

        document.getElementById('totalCount').innerText = Math.round(grandTotal);

        const items = Object.values(groups);
        container.innerHTML = items.map(item => {
            const img = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/150?text=No+Photo';
            return `
            <div class="stock-card shadow-sm hover:shadow-md transition-all">
                <div class="img-container" onclick="zoom('${img}')">
                    <img src="${img}" class="max-h-24 rounded">
                </div>
                <div class="flex-1 p-4">
                    <h3 class="font-extrabold text-slate-800 uppercase">${item.name}</h3>
                    <div class="mt-2 grid grid-cols-2 gap-2">
                        ${item.lots.map(l => `<div class="text-[11px] border-b pb-1 font-medium">L: ${l.lot} | <b>${l.qty} Bx</b></div>`).join('')}
                    </div>
                </div>
                <div class="w-24 bg-slate-50 flex flex-col items-center justify-center border-l">
                    <span class="text-[9px] font-bold text-slate-400">TOTAL</span>
                    <span class="text-xl font-black">${Math.round(item.total)}</span>
                </div>
            </div>`;
        }).join('');
    }

    function zoom(url) {
        document.getElementById('zoomImg').src = url;
        document.getElementById('zoomModal').style.display = 'flex';
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Live_Stock.xlsx");
    }

    window.onload = fetchData;
</script>
</body>
</html>
