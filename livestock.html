<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Live Stock Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #c5a059; --dark-bg: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }

        /* Premium Tag Animation */
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px var(--gold); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .yashdeep-tag {
            background: var(--dark-bg); color: #fff; border: 1px solid var(--gold);
            padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 12px;
            animation: sparkle 2s infinite ease-in-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Glassmorphism Cards */
        .tile-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-color: var(--gold);
        }

        /* Stats Branding */
        .stat-box {
            background: white; border-radius: 20px; border-bottom: 4px solid #e2e8f0;
            transition: 0.3s;
        }
        .stat-box:hover { border-bottom-color: var(--gold); transform: translateY(-3px); }

        /* Loader Animation */
        .loader {
            width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--gold);
            border-radius: 50%; display: inline-block; box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <div>
            <h1 style="font-family: 'Cinzel', serif;" class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter">
                EMCER <span class="text-slate-500 font-light text-3xl">TILES</span>
            </h1>
            <div class="flex items-center gap-2 mt-2">
                <span class="h-1 w-8 bg-blue-600 rounded-full"></span>
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.4em]">Live Hybrid Inventory System</p>
            </div>
        </div>
        <div class="text-center md:text-right">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Designed & Developed By</p>
            <div class="yashdeep-tag">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <div class="stat-box p-6"><p class="text-[10px] font-black text-gray-400 uppercase">Active Designs</p><h2 id="stat-total" class="text-3xl font-black">0</h2></div>
        <div class="stat-box p-6"><p class="text-[10px] font-black text-gray-400 uppercase">Total Boxes</p><h2 id="stat-boxes" class="text-3xl font-black">0</h2></div>
        <div class="stat-box p-6"><p class="text-[10px] font-black text-gray-400 uppercase">Brands</p><h2 id="stat-brands" class="text-3xl font-black">0</h2></div>
        <div class="stat-box p-6" style="background: #eff6ff;"><p class="text-[10px] font-black text-blue-400 uppercase">Stock Value</p><h2 class="text-3xl font-black text-blue-600 tracking-tighter">LIVE</h2></div>
    </div>

    <div class="bg-white/70 backdrop-blur-xl p-6 rounded-[35px] border border-white shadow-sm mb-12 flex flex-wrap gap-4 items-end">
        <div class="flex-grow min-w-[300px]">
            <label class="text-[10px] font-black text-slate-400 ml-3 uppercase mb-1 block">Quick Search</label>
            <input type="text" id="search" oninput="render()" placeholder="Search design name..." class="w-full p-4 bg-white rounded-2xl outline-none focus:ring-2 ring-blue-500/20 border border-gray-100 font-bold text-slate-700 shadow-inner">
        </div>
        <div class="flex gap-4 flex-wrap w-full md:w-auto">
            <select id="brandFilter" onchange="render()" class="p-4 bg-white rounded-2xl outline-none font-bold text-sm min-w-[160px] border border-gray-100 shadow-sm cursor-pointer"></select>
            <div class="flex gap-2">
                <button onclick="generatePDF()" class="bg-slate-900 hover:bg-black text-white p-4 rounded-2xl transition shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                </button>
                <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-2xl transition shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-10 pb-32">
        <div class="col-span-full flex flex-col items-center py-32">
            <span class="loader mb-4"></span>
            <p class="font-black text-slate-300 uppercase tracking-widest text-sm">Syncing Premium Assets...</p>
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNOPQSBbfoEKF3EyuvWLWpF0B2plwgwaZrppeq0mB_BzlMFHPp61IuGwj7LdvQW3b9xA/exec";

    let masterData = [], currentFilteredData = [];

    async function init() {
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            masterData = await res.json();
            setupFilters();
            render();
        } catch (e) {
            console.error("Sync Error:", e);
            document.getElementById('stockContainer').innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Network Sync Failed. Please refresh.</p>`;
        }
    }

    function setupFilters() {
        const brands = [...new Set(masterData.map(i => i.Brand))].filter(Boolean).sort();
        document.getElementById('brandFilter').innerHTML = `<option value="">All Brands</option>` + 
            brands.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;

        const filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b)
        );

        const groups = {};
        let totalBoxes = 0;
        const brandsFound = new Set();

        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total);
            totalBoxes += parseFloat(i.Total);
            brandsFound.add(i.Brand);
        });

        document.getElementById('stat-total').innerText = Object.keys(groups).length;
        document.getElementById('stat-boxes').innerText = Math.round(totalBoxes).toLocaleString();
        document.getElementById('stat-brands').innerText = brandsFound.size;

        const container = document.getElementById('stockContainer');
        const items = Object.values(groups);

        if(items.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-20 opacity-20 font-black text-2xl uppercase">No Stock Found</div>`;
            return;
        }

        container.innerHTML = items.map(item => {
            // ImgUrl is sent directly from our Master Code.gs (Hybrid Logic)
            const img = item.ImgUrl || `https://via.placeholder.com/600x400?text=${encodeURIComponent(item["Item Description"])}`;

            return `
            <div class="tile-card flex flex-col md:flex-row p-5 gap-6">
                <div class="md:w-1/2 relative group">
                    <div class="rounded-[24px] overflow-hidden bg-slate-100 h-[280px] w-full">
                        <img src="${img}" class="h-full w-full object-cover transition duration-700 group-hover:scale-110" 
                             onerror="this.src='https://via.placeholder.com/600x400?text=IMAGE+PENDING'">
                    </div>
                    <div class="absolute top-4 left-4">
                        <span class="bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-black uppercase text-slate-800 shadow-sm border border-white">
                            ${item.Size || '600x600'}
                        </span>
                    </div>
                </div>
                
                <div class="md:w-1/2 flex flex-col justify-between py-2">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-tighter">${item.Brand}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${item.Variant || 'STD'}</span>
                        </div>
                        <h2 class="text-2xl font-black text-slate-800 uppercase leading-tight mb-6 tracking-tighter">${item["Item Description"]}</h2>
                        
                        <div class="space-y-2">
                            ${item.lots.map(l => `
                                <div class="flex justify-between items-center bg-slate-50/50 px-4 py-2.5 rounded-2xl border border-slate-100">
                                    <div class="flex flex-col">
                                        <span class="text-[8px] font-black text-slate-300 uppercase tracking-widest">LOT NUMBER</span>
                                        <span class="text-xs font-extrabold text-slate-600">${l.lot}</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-lg font-black text-slate-800">${l.qty}</span>
                                        <span class="text-[10px] font-bold text-slate-400 ml-1">BOX</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="pt-6 mt-6 border-t border-dashed border-slate-200 flex justify-between items-end">
                        <div>
                            <p class="text-[9px] font-black text-slate-300 uppercase mb-1">Stock Available</p>
                            <p class="text-4xl font-black text-slate-900 tracking-tighter">${Math.round(item.total)}<span class="text-sm text-slate-400 ml-2 font-bold uppercase tracking-widest">In Stock</span></p>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // Reports Logic
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("EMCER TILES - LIVE STOCK REPORT", 14, 22);
        doc.setFontSize(10);
        doc.text("Developer: Yashdeep Jivani | Generated on: " + new Date().toLocaleString(), 14, 30);
        
        const rows = masterData.map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total, i.Variant]);
        doc.autoTable({ startY: 35, head: [['Brand', 'Design', 'Size', 'Lot', 'Qty', 'Grade']], body: rows, theme: 'grid' });
        doc.save("Emcer_Live_Stock.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, "Emcer_Live_Stock.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
