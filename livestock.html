<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --gold: #c5a059;
            --deep-black: #090d16;
            --card-black: #111827;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--deep-black); 
            color: #f1f5f9; 
        }
        .main-container { max-width: 1250px; margin: auto; padding: 20px; }
        
        /* Premium Developer Badge */
        .yashdeep-premium {
            background: #1f2937; color: #fff; border: 1px solid var(--gold);
            padding: 6px 18px; border-radius: 50px; font-weight: 800; font-size: 11px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.15);
            letter-spacing: 0.05em;
        }

        /* Pure Dark Stock Cards */
        .stock-card { 
            background: var(--card-black);
            border: 1px solid rgba(255, 255, 255, 0.04); 
            display: flex; 
            margin-bottom: 25px; 
            min-height: 240px; 
            position: relative; 
            page-break-inside: avoid;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stock-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.7);
        }

        .variant-badge { 
            position: absolute; top: 0; right: 20%; 
            background: var(--gold); color: #000; 
            padding: 5px 16px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; z-index: 10; 
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        
        .brand-tag { 
            font-size: 10px; background: rgba(59, 130, 246, 0.12); 
            color: #60a5fa; padding: 4px 10px; border-radius: 6px; 
            font-weight: 800; display: inline-block; margin-bottom: 8px; 
            text-transform: uppercase;
        }
        
        .card-img { 
            width: 32%; border-right: 1px solid rgba(255, 255, 255, 0.04); 
            padding: 12px; display: flex; align-items: center; justify-content: center; 
            background: #030712;
            cursor: pointer;
        }
        .card-img img { 
            max-height: 200px; width: auto; max-width: 100%; 
            object-fit: contain; display: block; border-radius: 12px;
            transition: 0.4s ease;
        }
        .stock-card:hover .card-img img { transform: scale(1.03); }

        .card-info { width: 48%; padding: 22px; display: flex; flex-direction: column; }
        .design-name { font-size: 24px; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 4px; color: #fff; letter-spacing: -0.02em; }
        .design-meta { color: #9ca3af; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
        
        .lot-row { 
            display: flex; justify-content: space-between; 
            border-bottom: 1px dashed rgba(255,255,255,0.06); 
            padding: 8px 0; font-size: 13px; font-weight: 600; color: #d1d5db;
        }
        
        .card-total { 
            width: 20%; border-left: 1px solid rgba(255, 255, 255, 0.04); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #0b0f19; 
        }
        .total-val { font-size: 46px; font-weight: 900; line-height: 1; color: #fff; }
        
        /* Rigid Pure Dark Filter Control Grid */
        .filter-grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 16px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 30px;
        }
        
        .filter-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #9ca3af; margin-bottom: 6px; letter-spacing: 0.05em; }
        
        select, input { 
            background: #1f2937 !important; 
            color: #fff !important; 
            border: 1px solid rgba(255,255,255,0.08) !important; 
            border-radius: 10px;
            padding: 12px; font-weight: 700; font-size: 13px; outline: none; 
            transition: 0.2s;
            text-transform: uppercase;
        }
        select:focus, input:focus { border-color: var(--gold); }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .dashboard-box { background: #111827; border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; }
        .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #9ca3af; }
        .stat-val { font-size: 24px; font-weight: 900; }

        @media print { 
            .no-print { display: none !important; } 
            body { background-color: #fff; color: #000; }
            .stock-card { background: #fff; border: 1px solid #000; color: #000; }
            .design-name, .total-val { color: #000; }
            .card-total { background: #f3f4f6; }
        }
    </style>
</head>
<body>

<div id="imageModal" onclick="this.style.display='none'">
    <img id="modalImg" class="max-w-full max-h-[90vh] rounded-lg border border-neutral-800" src="">
</div>

<div class="main-container">
    <div class="flex flex-col md:flex-row justify-between items-center pt-4 pb-4 gap-4">
        <div>
            <h1 class="text-3xl font-black text-white tracking-tight leading-none">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-[11px] text-blue-400 font-black uppercase tracking-[0.25em] mt-2">Live Cloud Stock Portal</p>
            <p id="lastUpdated" class="text-[10px] text-amber-500/90 font-bold uppercase mt-1">Fetching Assets...</p>
        </div>
        <div class="flex flex-col items-center md:items-end no-print gap-3">
            <div class="flex gap-2">
                <button onclick="downloadPDF(this)" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase transition shadow-md">📄 Download PDF</button>
                <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase transition border border-gray-700">🔄 Refresh</button>
            </div>
            <div class="yashdeep-premium">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </div>

    <div class="h-[1px] bg-gradient-to-r from-transparent via-neutral-800 to-transparent my-4"></div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 no-print">
        <div class="dashboard-box p-4 text-center"><div class="stat-label">Total Designs</div><div id="statDesigns" class="stat-val mt-1">0</div></div>
        <div class="dashboard-box p-4 text-center"><div class="stat-label">Total Boxes</div><div id="statBoxes" class="stat-val mt-1 text-emerald-400">0</div></div>
        <div class="dashboard-box p-4 text-center"><div class="stat-label">Brands</div><div id="statBrands" class="stat-val mt-1">0</div></div>
        <div class="dashboard-box p-4 text-center" style="border-color: rgba(197, 160, 89, 0.25);"><div class="stat-label text-amber-500">Filtered View</div><div id="statFiltered" class="stat-val mt-1 text-amber-400">0</div></div>
    </div>

    <div class="filter-grid-layout no-print shadow-xl">
        <div class="filter-group"><label>Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type name..."></div>
        <div class="filter-group"><label>Brand</label><select id="filterBrand" onchange="applyFilters()"></select></div>
        <div class="filter-group"><label>Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"></select></div>
        <div class="filter-group"><label>Series</label><select id="filterSeries" onchange="applyFilters()"></select></div>
        <div class="filter-group"><label>Variant</label><select id="filterVariant" onchange="applyFilters()"></select></div>
    </div>

    <div id="reportList">
        <div class="text-center py-20 opacity-30 font-black tracking-widest text-sm uppercase text-slate-400">Syncing Master Sheet Engine...</div>
    </div>
</div>

<script>
    // 🔗 TAMARI CURRENT WEB APP URL HERE
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwo7Rgp4RgkicELRyGGOBZ-paQYl8up1BCIrHDAfVWOQ4NrBW5T7O5JUYudmZqEUAjAA/exec";

    let masterData = [];

    async function initPortal() {
        try {
            const resStock = await fetch(APPS_SCRIPT_URL);
            if (resStock.ok) {
                masterData = await resStock.json();
                
                // Pure static frozen time tracking right at download/sync trigger point
                document.getElementById('lastUpdated').innerText = "LIVE SYNCED: " + new Date().toLocaleString();
                
                setupFilters(); 
                applyFilters();
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById('reportList').innerHTML = `<div class='text-center text-red-400 font-bold py-10'>Database Synchronization Refused. Verify deployment configuration.</div>`;
        }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), variants = new Set();
        masterData.forEach(i => { if(i.Brand) brands.add(i.Brand); if(i.Size) sizes.add(i.Size); if(i.Variant) variants.add(i.Variant); });
        const fill = (id, set) => document.getElementById(id).innerHTML = `<option value="">All</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        fill('filterBrand', brands); fill('filterSize', sizes); fill('filterVariant', variants);
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const sz = document.getElementById('filterSize').value, srs = new Set();
        masterData.forEach(i => { if(sz==="" || i.Size===sz) if(i.Series) srs.add(i.Series); });
        document.getElementById('filterSeries').innerHTML = '<option value="">All</option>' + [...srs].sort().map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function applyFilters() {
        const f = { 
            n: document.getElementById('searchName').value.toLowerCase(), 
            b: document.getElementById('filterBrand').value, 
            sz: document.getElementById('filterSize').value, 
            s: document.getElementById('filterSeries').value, 
            v: document.getElementById('filterVariant').value 
        };
        
        const groups = {}; let total = 0, brands = new Set();
        
        masterData.forEach(item => {
            const desc = (item["Item Description"]||"").trim(), 
                  brand = (item.Brand||"").trim(), 
                  series = (item.Series||"").trim(), 
                  size = (item.Size||"").trim(), 
                  variant = (item.Variant||"").trim(), 
                  qty = Number(item.Total || item["Net Qty"] || 0);
            
            const imgUrl = item.ImgUrl || 'https://via.placeholder.com/400';
            const lotNo = item["Lot No"] || item["Lot no."] || "N/A";

            if (desc.toLowerCase().includes(f.n) && (!f.b || brand===f.b) && (!f.sz || size===f.sz) && (!f.s || series===f.s) && (!f.v || variant===f.v)) {
                const k = `${desc}|${brand}|${series}|${size}|${variant}`.toLowerCase();
                if (!groups[k]) groups[k] = { desc, brand, series, size, variant, imgUrl, lots: [], total: 0 };
                groups[k].lots.push({ lot: lotNo, qty });
                groups[k].total += qty; total += qty; brands.add(brand);
            }
        });
        
        const items = Object.values(groups);
        document.getElementById('statDesigns').innerText = items.length;
        document.getElementById('statBoxes').innerText = total.toLocaleString();
        document.getElementById('statBrands').innerText = brands.size;
        document.getElementById('statFiltered').innerText = items.length;
        render(items);
    }

    function render(items) {
        if(items.length === 0) {
            document.getElementById('reportList').innerHTML = `<div class="text-center py-20 opacity-20 font-bold uppercase text-slate-400">No Premium Inventory Matches</div>`;
            return;
        }

        document.getElementById('reportList').innerHTML = items.map(item => {
            const displayImg = item.imgUrl.includes('placeholder') ? item.imgUrl : "https://images.weserv.nl/?url=" + encodeURIComponent(item.imgUrl.replace('https://', ''));
            
            return `
            <div class="stock-card">
                <div class="variant-badge">${item.variant || 'STD'}</div>
                <div class="card-img" onclick="document.getElementById('modalImg').src='${item.imgUrl}'; document.getElementById('imageModal').style.display='flex'">
                    <img src="${displayImg}" loading="lazy" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/400?text=IMAGE+PENDING'">
                </div>
                <div class="card-info">
                    <div><span class="brand-tag">${item.brand}</span></div>
                    <div class="design-name">${item.desc}</div>
                    <div class="design-meta">${item.series || 'REGULAR'} | ${item.size}</div>
                    <div class="flex-grow mt-2">
                        ${item.lots.map(l => `
                            <div class="lot-row">
                                <span class="text-slate-400 text-xs">LOT: ${l.lot}</span>
                                <span class="font-bold text-slate-100">${l.qty} Bx</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="total-val">${Math.round(item.total)}</div>
                    <div class="text-[10px] font-black text-slate-500 uppercase tracking-wider mt-1">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    async function downloadPDF(btn) {
        const element = document.getElementById('reportList');
        const originalText = btn.innerText;
        btn.innerText = "Compiling PDF..."; btn.disabled = true;

        const opt = {
            margin: 10,
            filename: 'NexTile_Elite_Stock.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, allowTaint: false, backgroundColor: '#090d16' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all'] }
        };

        try {
            await html2pdf().set(opt).from(element).save();
        } catch (e) { alert("PDF Compiler Interrupted"); }
        finally { btn.innerText = originalText; btn.disabled = false; }
    }

    window.onload = initPortal;
</script>
</body>
</html>
