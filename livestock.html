<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer | Elite Inventory Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --premium-gold: #b39359;
            --marble-bg: #f8f9fa;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--marble-bg);
            color: #1a1a1a;
        }
        .luxury-card {
            background: #fff;
            border-radius: 24px;
            border: 1px solid rgba(179, 147, 89, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            transition: all 0.4s ease;
        }
        .luxury-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(179, 147, 89, 0.1);
            border-color: var(--premium-gold);
        }
        .filter-chip {
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .filter-chip.active {
            background: var(--premium-gold);
            color: white;
            border-color: var(--premium-gold);
        }
        .stat-badge {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
        <div>
            <h1 style="font-family: 'Cinzel', serif;" class="text-5xl tracking-tighter text-slate-900">EMCER</h1>
            <p class="text-sm font-bold text-[#b39359] uppercase tracking-[0.5em] mt-2">Elite Stock Management</p>
        </div>
        
        <div class="flex flex-wrap gap-3">
            <button onclick="downloadExcel()" class="bg-white border border-gray-200 text-slate-700 px-6 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-50 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                EXCEL
            </button>
            <button onclick="generateFilteredPDF()" class="bg-[#b39359] text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-gold/20 hover:scale-105 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                PDF REPORT (WITH JPG)
            </button>
        </div>
    </header>

    <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 mb-10 grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Search Design</label>
            <input type="text" id="search" oninput="render()" placeholder="Enter name..." class="w-full bg-gray-50 p-4 rounded-2xl border-none focus:ring-2 ring-[#b39359] outline-none">
        </div>
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Brand</label>
            <select id="brandFilter" onchange="render()" class="w-full bg-gray-50 p-4 rounded-2xl border-none outline-none font-semibold"></select>
        </div>
        <div class="space-y-2">
            <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Size</label>
            <select id="sizeFilter" onchange="render()" class="w-full bg-gray-50 p-4 rounded-2xl border-none outline-none font-semibold"></select>
        </div>
        <div class="flex items-end pb-1">
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black">🔄 REFRESH LIVE</button>
        </div>
    </div>

    <div id="counterArea" class="mb-6 text-sm font-medium text-gray-500"></div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-10">
        <div class="col-span-full flex flex-col items-center py-20 opacity-50">
            <div class="w-12 h-12 border-4 border-[#b39359] border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-bold tracking-widest text-xs uppercase">Connecting to Emcer Cloud...</p>
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {}, currentFilteredData = [];

    async function init() {
        try {
            const [dRes, sRes] = await Promise.all([fetch(DESIGN_JSON_URL), fetch(APPS_SCRIPT_URL)]);
            const dData = await dRes.json();
            dData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = await sRes.json();
            setupFilters();
            render();
        } catch (e) { alert("Error connecting to server!"); }
    }

    function setupFilters() {
        const brands = [...new Set(masterData.map(i => i.Brand))].filter(Boolean).sort();
        const sizes = [...new Set(masterData.map(i => i.Size))].filter(Boolean).sort();
        
        document.getElementById('brandFilter').innerHTML = '<option value="">All Brands</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
        document.getElementById('sizeFilter').innerHTML = '<option value="">All Sizes</option>' + sizes.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function render() {
        const search = document.getElementById('search').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const size = document.getElementById('sizeFilter').value;
        const container = document.getElementById('stockContainer');
        
        const groups = {};
        currentFilteredData = [];

        masterData.forEach(item => {
            const name = String(item["Item Description"] || "").trim();
            const b = String(item.Brand || "");
            const s = String(item.Size || "");
            if (name.toLowerCase().includes(search) && (!brand || b === brand) && (!size || s === size)) {
                const key = `${name}|${b}|${s}`.toLowerCase();
                if (!groups[key]) groups[key] = { name, brand: b, size: s, lots: [], total: 0 };
                groups[key].lots.push({ lot: item["Lot No"], qty: parseFloat(item.Total) });
                groups[key].total += parseFloat(item.Total);
                currentFilteredData.push(item);
            }
        });

        const items = Object.values(groups);
        document.getElementById('counterArea').innerHTML = `Showing <b>${items.length}</b> Designs out of ${masterData.length}`;

        container.innerHTML = items.map(item => {
            const imgUrl = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/600x400?text=Image+Not+Available';
            return `
            <div class="luxury-card overflow-hidden flex flex-col sm:flex-row">
                <div class="sm:w-1/2 relative group overflow-hidden">
                    <img src="${imgUrl}" class="h-full w-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                         <button onclick="window.open('${imgUrl}')" class="bg-white/20 backdrop-blur-md text-white text-[10px] px-4 py-2 rounded-full font-bold uppercase tracking-widest">Full Preview</button>
                    </div>
                </div>
                <div class="p-8 sm:w-1/2 flex flex-col">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[#b39359] text-[10px] font-black tracking-widest uppercase">${item.brand}</span>
                        <span class="bg-slate-100 text-slate-500 text-[9px] px-2 py-1 rounded font-bold">${item.size}</span>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 uppercase mb-6">${item.name}</h2>
                    
                    <div class="flex-grow space-y-3">
                        ${item.lots.map(l => `
                            <div class="flex justify-between items-center bg-gray-50/50 p-2 rounded-xl border border-gray-100">
                                <span class="text-[11px] font-bold text-gray-400">LOT: ${l.lot}</span>
                                <span class="text-sm font-black text-slate-700">${l.qty} BOX</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="mt-8 pt-6 border-t border-dashed border-gray-200 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-gray-300 uppercase">Total Available</p>
                            <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                        </div>
                        <button onclick="shareWhatsApp('${item.name}', ${item.total})" class="bg-green-50 p-3 rounded-full text-green-600 hover:bg-green-600 hover:text-white transition-colors">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function shareWhatsApp(name, qty) {
        const msg = encodeURIComponent(`*EMCER STOCK INQUIRY*\nDesign: ${name}\nAvailable: ${qty} Boxes\nPlease check availability.`);
        window.open(`https://wa.me/?text=${msg}`);
    }

    async function generateFilteredPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("helvetica", "bold");
        doc.text("EMCER TILES - FILTERED STOCK REPORT", 14, 20);
        doc.setFontSize(10);
        doc.text(`Total Designs Found: ${currentFilteredData.length} | Date: ${new Date().toLocaleDateString()}`, 14, 28);

        const tableBody = currentFilteredData.map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total]);

        doc.autoTable({
            startY: 35,
            head: [['Brand', 'Item Description', 'Size', 'Lot', 'Qty']],
            body: tableBody,
            theme: 'striped',
            headStyles: { fillColor: [179, 147, 89] }
        });

        doc.save("Filtered_Emcer_Stock.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(currentFilteredData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "FilteredStock");
        XLSX.writeFile(wb, "Emcer_Filtered_Excel.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
