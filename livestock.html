<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTile - Premium Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --glass: rgba(255, 255, 255, 0.9); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(rgba(241, 245, 249, 0.94), rgba(241, 245, 249, 0.94)), 
                        url('https://www.transparenttextures.com/patterns/pavement.png');
            background-attachment: fixed;
            color: #1e293b; 
        }
        .main-container { max-width: 1300px; margin: auto; padding: 25px; }
        .dev-tag { font-weight: 800; color: white; background: var(--primary); padding: 4px 12px; border-radius: 50px; font-size: 10px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .stock-card { background: var(--glass); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid white; display: flex; margin-top: 25px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); transition: 0.3s; }
        .stock-card:hover { transform: scale(1.01); border-color: var(--primary); }
        .card-img { width: 25%; padding: 15px; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .card-info { width: 50%; padding: 25px; }
        .card-total { width: 25%; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #e2e8f0; }
        #bookingModal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); justify-content:center; align-items:center; }
        .modal-box { background: white; padding: 35px; border-radius: 30px; width: 95%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        input, select { border-radius: 12px; border: 2px solid #e2e8f0; padding: 12px; width: 100%; font-weight: 600; outline: none; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

<div id="bookingModal">
    <div class="modal-box">
        <h2 class="text-3xl font-extrabold mb-1">Confirm Booking</h2>
        <p id="bookItemName" class="text-blue-600 font-bold mb-8 text-sm uppercase"></p>
        <div class="space-y-5">
            <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Party Name / Salesman</label><input type="text" id="partyName" placeholder="Enter details"></div>
            <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Order Quantity (Boxes)</label><input type="number" id="bookQty" placeholder="0"></div>
            <div class="flex gap-4 pt-4">
                <button onclick="confirmBooking()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold uppercase shadow-lg hover:bg-blue-700 transition">Confirm</button>
                <button onclick="document.getElementById('bookingModal').style.display='none'" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>
</div>

<div class="main-container">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Emcer Tiles <span class="text-blue-600">Private Limited</span></h1>
            <p id="updateTime" class="text-[11px] font-bold text-slate-500 mt-2 uppercase tracking-widest">Synchronizing Live Warehouse...</p>
        </div>
        <div class="flex flex-col items-end gap-3">
            <div class="flex gap-3">
                <button onclick="downloadPDF()" class="bg-red-500 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase shadow-md hover:bg-red-600 transition">PDF Report</button>
                <button onclick="location.reload()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold text-xs uppercase">Refresh</button>
            </div>
            <div class="text-[10px] font-bold text-slate-400">Designed & Developed By: <span class="dev-tag">Yashdeep Jivani</span></div>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Designs</div><div id="stat-designs" class="text-3xl font-extrabold">0</div></div>
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Stock</div><div id="stat-boxes" class="text-3xl font-extrabold">0</div></div>
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Brands</div><div id="stat-brands" class="text-3xl font-extrabold">0</div></div>
        <div class="glass-card p-5 text-center"><div class="text-xs font-bold text-slate-400 uppercase mb-1">Filtered</div><div id="stat-results" class="text-3xl font-extrabold">0</div></div>
    </div>

    <div class="glass-card p-8 grid grid-cols-1 md:grid-cols-5 gap-6 mb-10 shadow-xl">
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Search Design</label><input type="text" id="searchName" oninput="applyFilters()" placeholder="Type here..."></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Brand</label><select id="filterBrand" onchange="applyFilters()"><option value="">All Brands</option></select></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Size</label><select id="filterSize" onchange="updateSeriesOptions(); applyFilters();"><option value="">All Sizes</option></select></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Series</label><select id="filterSeries" onchange="applyFilters()"><option value="">All Series</option></select></div>
        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Grade</label><select id="filterGrade" onchange="applyFilters()"><option value="">All Grades</option></select></div>
    </div>

    <div id="reportList" class="space-y-8 pb-20">
        <div class="py-20 text-center font-bold text-slate-400 animate-pulse uppercase tracking-widest">Accessing Real-time Stock...</div>
    </div>
</div>

<script>
    // --- ⚠️ CONFIG ⚠️ ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqrGsL98Dbg432wq-eD9ZALoYNamd9wzyJL8tNTG-FvH4EfBQ3jkWa9tZzCpxrkgG5iw/exec';
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('mode') === 'admin123'; // Admin Secret Key

    let masterData = [], designMap = {}, selectedItem = null;

    async function init() {
        try {
            const resImg = await fetch('design.json?v=' + Date.now());
            if (resImg.ok) {
                const designs = await resImg.json();
                designs.forEach(d => { if(d.name) designMap[d.name.toLowerCase().replace(/[^a-z0-9]/g, '')] = d.url; });
            }
            fetchLiveStock();
        } catch (e) { console.log("Init error"); fetchLiveStock(); }
    }

    async function fetchLiveStock() {
        try {
            const response = await fetch(SCRIPT_URL);
            masterData = await response.json();
            document.getElementById('updateTime').innerText = "LIVE: " + new Date().toLocaleTimeString();
            setupFilters();
            applyFilters();
        } catch (err) { document.getElementById('updateTime').innerText = "CONNECTION LOST - RETRYING..."; }
    }

    function setupFilters() {
        const brands = new Set(), sizes = new Set(), grades = new Set();
        masterData.forEach(item => {
            if (item["Brand"]) brands.add(item["Brand"].toString().trim());
            if (item["Size"]) sizes.add(item["Size"].toString().trim());
            if (item["Variant"]) grades.add(item["Variant"].toString().trim());
        });
        const fill = (id, set, label) => {
            const el = document.getElementById(id); const val = el.value;
            el.innerHTML = `<option value="">${label}</option>` + [...set].sort().map(v => `<option value="${v}">${v}</option>`).join('');
            el.value = val;
        };
        fill('filterBrand', brands, 'All Brands');
        fill('filterSize', sizes, 'All Sizes');
        fill('filterGrade', grades, 'All Grades');
        updateSeriesOptions();
    }

    function updateSeriesOptions() {
        const sSize = document.getElementById('filterSize').value;
        const seriesSet = new Set();
        masterData.forEach(item => {
            if (!sSize || item["Size"].toString().trim() === sSize) {
                if (item["Series"]) seriesSet.add(item["Series"].toString().trim());
            }
        });
        const el = document.getElementById('filterSeries'); const val = el.value;
        el.innerHTML = '<option value="">All Series</option>' + [...seriesSet].sort().map(v => `<option value="${v}">${v}</option>`).join('');
        el.value = val;
    }

    function applyFilters() {
        const nV = document.getElementById('searchName').value.toLowerCase();
        const bV = document.getElementById('filterBrand').value, sV = document.getElementById('filterSize').value, srV = document.getElementById('filterSeries').value, gV = document.getElementById('filterGrade').value;
        
        const groups = {};
        let totalBoxes = 0; const uB = new Set(), uD = new Set();

        masterData.forEach(i => {
            const name = String(i["Item Description"] || ""), brand = String(i["Brand"] || ""), series = String(i["Series"] || ""), size = String(i["Size"] || ""), grade = String(i["Variant"] || ""), qty = parseFloat(i["Total"] || 0), lot = String(i["Lot No"] || "");
            
            if (name.toLowerCase().includes(nV) && (!bV || brand === bV) && (!sV || size === sV) && (!srV || series === srV) && (!gV || grade === gV)) {
                const k = `${name}|${series}|${size}|${grade}|${brand}`.toLowerCase();
                if (!groups[k]) groups[k] = { name, series, size, grade, brand, lots: [], total: 0 };
                groups[k].lots.push({ lot, qty }); 
                groups[k].total += qty;
                totalBoxes += qty; uB.add(brand); uD.add(name);
            }
        });
        document.getElementById('stat-designs').innerText = uD.size;
        document.getElementById('stat-boxes').innerText = totalBoxes.toLocaleString();
        document.getElementById('stat-brands').innerText = uB.size;
        document.getElementById('stat-results').innerText = Object.keys(groups).length;
        render(Object.values(groups));
    }

    function render(items) {
        const area = document.getElementById('reportList');
        if (!items.length) { area.innerHTML = `<div class='py-20 text-center font-bold text-slate-400'>NO DESIGNS MATCH YOUR FILTER</div>`; return; }
        
        area.innerHTML = items.map(item => {
            const clean = item.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            const imgUrl = designMap[clean] || 'https://via.placeholder.com/400x600?text=No+Photo';
            return `
            <div class="stock-card shadow-lg">
                <div class="card-img" onclick="window.open('${imgUrl}')"><img src="${imgUrl}" class="max-h-48 rounded-lg shadow-sm"></div>
                <div class="card-info">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-extrabold text-blue-600 bg-blue-50 px-2 py-1 rounded-md uppercase tracking-widest">${item.brand} • ${item.series}</span>
                        <span class="bg-slate-900 text-white px-3 py-1 rounded-full text-[9px] font-extrabold uppercase">${item.grade}</span>
                    </div>
                    <div class="text-3xl font-extrabold uppercase tracking-tight text-slate-800 mb-1">${item.name}</div>
                    <div class="text-xs font-semibold text-slate-400 mb-4 tracking-wider">${item.size}</div>
                    <div class="space-y-2">
                        ${item.lots.map(l => `
                            <div class="flex justify-between items-center py-2 border-b border-slate-100">
                                <span class="font-bold text-xs text-slate-500 uppercase">LOT: ${l.lot}</span>
                                <div class="flex items-center gap-4">
                                    <span class="font-extrabold text-slate-800 text-base">${Math.round(l.qty)} BX</span>
                                    ${isAdmin ? `<button onclick="openBooking('${item.name}', '${l.lot}', '${item.size}', '${item.grade}', '${item.series}')" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg font-bold uppercase text-[10px] shadow-md hover:bg-blue-700 transition">Book</button>` : ''}
                                </div>
                            </div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Available</div>
                    <div class="text-5xl font-extrabold text-slate-900 my-1">${Math.round(item.total)}</div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    function openBooking(name, lot, size, grade, series) {
        selectedItem = { name, lot, size, grade, series };
        document.getElementById('bookItemName').innerText = `${name} (LOT: ${lot})`;
        document.getElementById('bookingModal').style.display = 'flex';
    }

    async function confirmBooking() {
        const p = document.getElementById('partyName').value, q = document.getElementById('bookQty').value;
        if(!p || !q) return alert("Fill Party Name & Quantity");
        
        const btn = document.querySelector('#bookingModal button'); btn.innerText = "Saving..."; btn.disabled = true;
        
        try {
            const payload = { ...selectedItem, orderQty: q, partyName: p };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert(`SUCCESS: ${q} Boxes Booked for ${p}`);
            document.getElementById('bookingModal').style.display = 'none';
            fetchLiveStock(); // રિયલ-ટાઇમમાં સ્ટોક ઘટાડવા માટે
        } catch (e) { alert("Server Error"); }
        btn.innerText = "Confirm"; btn.disabled = false;
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf; const element = document.getElementById('reportList');
        const canvas = await html2canvas(element, { scale: 2, useCORS: true });
        const imgData = canvas.toDataURL('image/jpeg', 0.8);
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        pdf.setFontSize(16); pdf.text("NexTile - ELITE STOCK REPORT", 15, 15);
        pdf.addImage(imgData, 'JPEG', 0, 20, pdfWidth, pdfHeight);
        pdf.save(`NexTile_Report_${new Date().getTime()}.pdf`);
    }

    init(); setInterval(fetchLiveStock, 60000);
</script>
</body>
</html>
