<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Drive Image Fix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .yashdeep-premium {
            background: #0f172a; color: #b39359; border: 1px solid #b39359;
            padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 12px;
            box-shadow: 0 0 10px rgba(179, 147, 89, 0.3);
        }
        .tile-card {
            background: white; border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05); transition: 0.3s ease;
        }
        .tile-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6">

<div class="max-w-7xl mx-auto">
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">EMCER TILES PVT LTD</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Live Drive Image Engine</p>
        </div>
        <div class="yashdeep-premium">✨ YASHDEEP JIVANI ✨</div>
    </header>

    <div class="bg-white p-4 rounded-2xl shadow-sm mb-8 flex flex-wrap gap-4 items-end border border-gray-100">
        <div class="flex-grow">
            <input type="text" id="search" oninput="render()" placeholder="Search Design..." class="w-full p-3 bg-gray-50 rounded-xl outline-none border-none font-semibold text-sm">
        </div>
        <select id="brandFilter" onchange="render()" class="p-3 bg-gray-100 rounded-xl font-bold text-xs border-none"></select>
        <select id="sizeFilter" onchange="render()" class="p-3 bg-gray-100 rounded-xl font-bold text-xs border-none"></select>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-20"></div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {};

    // 🚀 MASTER DRIVE FIX: Direct ID Extraction & Display
    function getFinalImage(url, designName) {
        if (!url || url === "") {
            // Check in GitHub design.json if Sheet link is empty
            const webImg = designMap[designName?.toLowerCase().trim()];
            return webImg || 'https://via.placeholder.com/500x350?text=NO+IMAGE+FOUND';
        }

        if (url.includes('drive.google.com')) {
            let fileId = "";
            if (url.includes('/d/')) {
                fileId = url.split('/d/')[1].split('/')[0];
            } else if (url.includes('id=')) {
                fileId = url.split('id=')[1].split('&')[0];
            }
            // Direct View Link for Google Drive
            return `https://drive.google.com/uc?export=view&id=${fileId}`;
        }
        return url; // Return as is if it's already a direct web link
    }

    async function init() {
        try {
            const [dRes, sRes] = await Promise.all([fetch(DESIGN_JSON_URL), fetch(APPS_SCRIPT_URL)]);
            const dData = await dRes.json();
            dData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = await sRes.json();
            setupFilters();
            render();
        } catch (e) { console.log("Init Error"); }
    }

    function setupFilters() {
        const fill = (id, key, label) => {
            const vals = [...new Set(masterData.map(i => i[key]))].filter(Boolean).sort();
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + 
                vals.map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('brandFilter', 'Brand', 'Brands');
        fill('sizeFilter', 'Size', 'Sizes');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;
        const sz = document.getElementById('sizeFilter').value;

        const filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b) &&
            (!sz || i.Size === sz)
        );

        const groups = {};
        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total);
        });

        document.getElementById('stockContainer').innerHTML = Object.values(groups).map(item => {
            const img = getFinalImage(item.DesignURL, item["Item Description"]);

            return `
            <div class="tile-card flex flex-col md:flex-row p-4 gap-6">
                <div class="md:w-1/2 rounded-xl overflow-hidden bg-gray-50 min-h-[220px]">
                    <img src="${img}" class="h-full w-full object-cover" onerror="this.src='https://via.placeholder.com/500x350?text=DRIVE+ACCESS+ERROR'">
                </div>
                <div class="md:w-1/2 flex flex-col justify-between py-1">
                    <div>
                        <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${item.Brand}</span>
                        <h2 class="text-xl font-black text-slate-800 uppercase mt-2 mb-4 leading-tight">${item["Item Description"]}</h2>
                        <div class="space-y-1.5">
                            ${item.lots.map(l => `
                                <div class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded-lg border border-gray-100">
                                    <span class="text-[11px] font-bold text-gray-400 uppercase tracking-tighter">Lot: ${l.lot}</span>
                                    <span class="text-sm font-black text-slate-700">${l.qty} BX</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pt-4 border-t border-dashed flex justify-between items-end mt-4">
                        <div>
                            <p class="text-[9px] font-black text-gray-300 uppercase">Available</p>
                            <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                        </div>
                        <span class="bg-slate-900 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">${item.Size}</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    window.onload = init;
</script>
</body>
</html>
