<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Live Stock</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        .premium-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .premium-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .yashdeep-badge {
            background: #0f172a; color: #fbbf24;
            padding: 6px 16px; border-radius: 50px;
            font-weight: 800; font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 1px solid #fbbf24;
        }

        .img-container {
            height: 280px; width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #f1f5f9;
        }

        /* Glassmorphism Filter Bar */
        .filter-bar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid white;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter">EMCER TILES</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Master Hybrid Stock Engine</p>
        </div>
        <div class="text-right">
            <div class="yashdeep-badge uppercase tracking-widest">✨ Yashdeep Jivani ✨</div>
        </div>
    </header>

    <div class="filter-bar p-6 rounded-3xl shadow-sm mb-10 flex flex-wrap gap-4 items-end">
        <div class="flex-grow min-w-[280px]">
            <label class="text-[10px] font-black text-slate-400 ml-2 uppercase">Search Assets</label>
            <input type="text" id="search" oninput="render()" placeholder="Enter Design Name..." 
                class="w-full mt-1 p-4 bg-white rounded-2xl outline-none border border-slate-100 font-bold focus:ring-2 ring-blue-500/10 transition-all">
        </div>
        <select id="brandFilter" onchange="render()" 
            class="p-4 bg-white rounded-2xl font-bold text-sm min-w-[160px] border border-slate-100 cursor-pointer shadow-sm"></select>
        <div class="flex gap-2">
            <button onclick="downloadExcel()" class="bg-emerald-600 text-white p-4 rounded-2xl shadow-lg hover:bg-emerald-700 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </button>
        </div>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-10 pb-20">
        <div class="col-span-full py-20 text-center opacity-30 font-black tracking-widest uppercase">Initializing Hybrid Data...</div>
    </div>
</div>

<script>
    // TAMARI APPS SCRIPT URL AHIA MUKO
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";

    let masterData = [];

    async function init() {
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            masterData = await res.json();
            setupFilters();
            render();
        } catch (e) {
            document.getElementById('stockContainer').innerHTML = "<p class='col-span-full text-center'>Connection Error. Check Script URL.</p>";
        }
    }

    function setupFilters() {
        const brands = [...new Set(masterData.map(i => i.Brand))].filter(Boolean).sort();
        document.getElementById('brandFilter').innerHTML = `<option value="">All Brands</option>` + 
            brands.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;

        const filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b)
        );

        // Grouping by Design Name
        const groups = {};
        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total);
        });

        document.getElementById('stockContainer').innerHTML = Object.values(groups).map(item => {
            // Tamara Code.gs ma "ImgUrl" badhu logic handle kare chhe
            const img = item.ImgUrl || `https://via.placeholder.com/600x400?text=${encodeURIComponent(item["Item Description"])}`;

            return `
            <div class="premium-card p-5 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/2">
                    <div class="img-container shadow-inner">
                        <img src="${img}" class="h-full w-full object-cover transition duration-700 hover:scale-105" loading="lazy"
                             onerror="this.src='https://via.placeholder.com/600x400?text=IMAGE+NOT+FOUND'">
                    </div>
                </div>
                <div class="md:w-1/2 flex flex-col justify-between py-2">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">${item.Brand}</span>
                            <span class="text-[10px] font-bold text-slate-300 uppercase">${item.Size || '600X600'}</span>
                        </div>
                        <h2 class="text-2xl font-extrabold text-slate-800 uppercase leading-tight mb-5">${item["Item Description"]}</h2>
                        
                        <div class="space-y-2">
                            ${item.lots.map(l => `
                                <div class="flex justify-between items-center bg-slate-50 px-4 py-2 rounded-xl border border-slate-100/50">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Lot: ${l.lot}</span>
                                    <span class="text-sm font-black text-slate-700">${l.qty} BX</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="pt-5 border-t border-dashed border-slate-200 flex justify-between items-end mt-4">
                        <div>
                            <p class="text-[9px] font-black text-slate-300 uppercase">Available Stock</p>
                            <p class="text-4xl font-black text-slate-900 tracking-tighter">${Math.round(item.total)}</p>
                        </div>
                        <div class="bg-slate-900 text-white px-3 py-1 rounded-lg text-[10px] font-black">${item.Variant || 'STD'}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Live_Stock.xlsx");
    }

    window.onload = init;
</script>

</body>
</html>
