<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Live Stock | Elite Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; transition: all 0.2s; }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto p-4 md:p-8">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-[800] text-slate-900 tracking-tight">EMCER TILES PRIVATE LIMITED</h1>
            <div class="flex items-center gap-2 mt-1">
                <span id="indicator" class="h-2 w-2 rounded-full bg-orange-500 animate-pulse"></span>
                <span id="status" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Initialising...</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="fetchStock()" class="bg-white border border-slate-200 p-2.5 rounded-xl font-bold hover:bg-slate-50 transition-all shadow-sm">🔄 REFRESH</button>
            <button onclick="downloadExcel()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-100 flex items-center gap-2">📊 EXCEL</button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="md:col-span-2 relative">
            <input type="text" id="searchInput" oninput="displayData()" placeholder="🔍 Search Design or Lot No..." class="w-full bg-white border border-slate-200 rounded-xl p-3.5 pl-10 font-semibold outline-none focus:ring-2 ring-blue-500 shadow-sm">
        </div>
        <div class="bg-blue-600 rounded-xl p-3.5 flex justify-between items-center text-white shadow-lg shadow-blue-100">
            <span class="text-xs font-bold uppercase">Total Boxes:</span>
            <span id="grandTotal" class="text-2xl font-black">0</span>
        </div>
    </div>

    <div id="loading" class="flex flex-col items-center justify-center py-20">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-4"></div>
        <p class="text-slate-400 font-bold text-sm">FETCHING LIVE DATA...</p>
    </div>

    <div id="stockGrid" class="grid grid-cols-1 gap-4"></div>
</div>

<script>
    // 🚨 TAMARI APPS SCRIPT NI WEB APP URL AHIYA MUKO
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";

    let masterData = [];

    async function fetchStock() {
        const statusText = document.getElementById('status');
        const indicator = document.getElementById('indicator');
        
        try {
            const response = await fetch(APPS_SCRIPT_URL);
            masterData = await response.json();
            
            statusText.innerText = "Live Sync Active";
            statusText.className = "text-xs font-bold text-green-600 uppercase tracking-widest";
            indicator.className = "h-2 w-2 rounded-full bg-green-500";
            
            document.getElementById('loading').classList.add('hidden');
            displayData();
        } catch (error) {
            console.error(error);
            statusText.innerText = "Connection Error";
            statusText.className = "text-xs font-bold text-red-500 uppercase tracking-widest";
            indicator.className = "h-2 w-2 rounded-full bg-red-500";
        }
    }

    function displayData() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('stockGrid');
        const groups = {};
        let totalSum = 0;

        // Grouping data by Item Description
        masterData.forEach(item => {
            const name = String(item["Item Description"] || "Unknown").trim();
            const lot = String(item["Lot No"] || "N/A");
            const qty = parseFloat(item["Total"] || 0);

            if (name.toLowerCase().includes(searchTerm) || lot.toLowerCase().includes(searchTerm)) {
                if (!groups[name]) {
                    groups[name] = { name, total: 0, details: [] };
                }
                groups[name].details.push({ lot, qty });
                groups[name].total += qty;
                totalSum += qty;
            }
        });

        document.getElementById('grandTotal').innerText = Math.round(totalSum).toLocaleString();

        const items = Object.values(groups);
        if (items.length === 0) {
            grid.innerHTML = `<div class="text-center py-10 text-slate-400 font-bold">No Records Found</div>`;
            return;
        }

        grid.innerHTML = items.map(item => `
            <div class="glass-card p-5 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex-1 w-full">
                    <h3 class="text-lg font-extrabold text-slate-800 uppercase tracking-tight">${item.name}</h3>
                    <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2">
                        ${item.details.map(d => `
                            <div class="flex gap-2 text-xs font-bold">
                                <span class="text-slate-400 uppercase">Lot:</span>
                                <span class="text-slate-700">${d.lot}</span>
                                <span class="text-blue-600">(${d.qty} Bx)</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="w-full md:w-32 bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Stock Total</p>
                    <p class="text-2xl font-black text-slate-900">${Math.round(item.total)}</p>
                    <p class="text-[10px] font-extrabold text-blue-600 uppercase">Boxes</p>
                </div>
            </div>
        `).join('');
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "StockStatus");
        XLSX.writeFile(wb, `Emcer_Stock_${new Date().toLocaleDateString()}.xlsx`);
    }

    window.onload = fetchStock;
</script>
</body>
</html>
