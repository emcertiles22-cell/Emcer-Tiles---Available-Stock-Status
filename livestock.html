<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Advanced Stock Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; min-height: 100vh; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .sparkle-text { background: linear-gradient(90deg, #fbbf24, #fff, #fbbf24); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: sparkle 3s linear infinite; font-weight: 800; }
        @keyframes sparkle { to { background-position: 200% center; } }
        select, input { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter">EMCER <span class="text-blue-500">ELITE</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em]">Multi-Filter Inventory</p>
        </div>
        <div class="text-right">
            <div class="sparkle-text uppercase text-sm mb-2">Architect: Yashdeep Jivani</div>
            <button onclick="downloadExcel()" class="bg-emerald-600/20 text-emerald-400 px-4 py-2 rounded-xl border border-emerald-600/20 text-xs font-bold transition">DOWNLOAD EXCEL</button>
        </div>
    </header>

    <div class="glass-card p-6 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="md:col-span-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Search Design</label>
                <input type="text" id="search" oninput="render()" placeholder="Enter name..." class="w-full mt-1 p-3 rounded-xl outline-none focus:ring-2 ring-blue-500/50">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Brand</label>
                <select id="brandFilter" onchange="render()" class="w-full mt-1 p-3 rounded-xl outline-none"></select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Variant</label>
                <select id="variantFilter" onchange="render()" class="w-full mt-1 p-3 rounded-xl outline-none"></select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Size</label>
                <select id="sizeFilter" onchange="render()" class="w-full mt-1 p-3 rounded-xl outline-none"></select>
            </div>
        </div>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
        <p class="col-span-full text-center py-20 text-slate-500 animate-pulse font-bold">CONNECTING TO LIVE SERVER...</p>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbySrgMW7JqD8ZMQKqX-SyixwmQOCWiWM4cwx89R2aYne47qroQ1zIIdht18VOK_KcWS/exec";
    let masterData = [];

    async function init() {
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            masterData = await res.json();
            setupFilters();
            render();
        } catch (e) {
            document.getElementById('stockContainer').innerHTML = "Error loading data.";
        }
    }

    function setupFilters() {
        const getUnique = (key) => [...new Set(masterData.map(i => i[key]))].filter(Boolean).sort();
        
        const brands = getUnique('Brand');
        const variants = getUnique('Variant');
        const sizes = getUnique('Size');

        document.getElementById('brandFilter').innerHTML = `<option value="">All Brands</option>` + brands.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('variantFilter').innerHTML = `<option value="">All Variants</option>` + variants.map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('sizeFilter').innerHTML = `<option value="">All Sizes</option>` + sizes.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;
        const v = document.getElementById('variantFilter').value;
        const sz = document.getElementById('sizeFilter').value;

        const filtered = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b) &&
            (!v || i.Variant === v) &&
            (!sz || i.Size === sz)
        );

        const groups = {};
        filtered.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total || 0);
        });

        document.getElementById('stockContainer').innerHTML = Object.values(groups).map(item => `
            <div class="glass-card p-5 flex flex-col">
                <div class="h-60 rounded-2xl overflow-hidden mb-4 bg-slate-800">
                    <img src="${item.ImgUrl}" class="w-full h-full object-cover hover:scale-110 transition duration-700" 
                         onerror="this.src='https://placehold.co/600x400/1e293b/64748b?text=${encodeURIComponent(item["Item Description"])}'">
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">${item.Brand || 'EMCER'}</span>
                        <span class="text-[10px] font-bold text-slate-500">${item.Size || 'N/A'}</span>
                    </div>
                    <h2 class="text-xl font-black text-white uppercase mb-4 truncate">${item["Item Description"]}</h2>
                    <div class="space-y-1">
                        ${item.lots.map(l => `
                            <div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs">
                                <span class="text-slate-400 italic">Lot: ${l.lot}</span>
                                <span class="font-bold text-blue-200">${l.qty} BX</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-end">
                    <div>
                        <p class="text-[9px] font-bold text-slate-500 uppercase">Live Stock</p>
                        <p class="text-3xl font-black text-white tracking-tighter">${Math.round(item.total)}<span class="text-xs text-blue-500 ml-1">BX</span></p>
                    </div>
                    <div class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-lg text-[10px] font-black">${item.Variant || 'STD'}</div>
                </div>
            </div>
        `).join('');
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(masterData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, "Emcer_Live_Stock.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
