<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Drive Connected ERP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b39359; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }

        /* Developer Sparkle Effect */
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px #fff, 0 0 20px var(--gold); }
            50% { opacity: 0.7; transform: scale(1.02); text-shadow: none; }
        }
        .yashdeep-tag {
            background: var(--dark); color: white; border: 1.5px solid var(--gold);
            padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 13px;
            animation: sparkle 2s infinite ease-in-out;
        }

        /* Stat Cards je tame image ma moklya hata */
        .stat-card {
            background: white; border-radius: 20px; padding: 24px;
            border: 2px solid #000; box-shadow: 6px 6px 0px #000; transition: 0.3s;
        }
        .stat-card:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0px var(--gold); }

        /* Luxury Horizontal Tile Cards */
        .tile-card {
            background: white; border-radius: 24px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05); transition: 0.4s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .tile-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 style="font-family: 'Cinzel', serif;" class="text-4xl font-black text-slate-900 tracking-tight leading-none uppercase">Emcer Tiles Private Limited</h1>
            <p class="text-[11px] font-bold text-blue-600 mt-2 uppercase tracking-[0.4em]" id="syncStatus">● LIVE DRIVE CONNECTED</p>
        </div>
        <div class="text-center md:text-right">
            <p class="text-[10px] font-black text-slate-400 uppercase mb-1">System Developer</p>
            <div class="yashdeep-tag">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
        <div class="stat-card"><p class="text-[10px] font-black text-gray-400 uppercase">Total Designs</p><h2 id="stat-total" class="text-3xl font-black">0</h2></div>
        <div class="stat-card"><p class="text-[10px] font-black text-gray-400 uppercase">Live Boxes</p><h2 id="stat-boxes" class="text-3xl font-black">0</h2></div>
        <div class="stat-card"><p class="text-[10px] font-black text-gray-400 uppercase">Brands</p><h2 id="stat-brands" class="text-3xl font-black">0</h2></div>
        <div class="stat-card" style="border-color: #3b82f6;"><p class="text-[10px] font-black text-gray-400 uppercase">Filtered</p><h2 id="stat-filtered" class="text-3xl font-black text-blue-600">0</h2></div>
    </div>

    <div class="bg-white p-6 rounded-[30px] shadow-sm border border-gray-100 mb-8 flex flex-wrap items-end gap-4">
        <div class="flex-grow min-w-[250px]">
            <label class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">Search Tile Name</label>
            <input type="text" id="search" oninput="render()" placeholder="Enter design name..." class="w-full mt-1 p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 ring-blue-500 border-none font-semibold">
        </div>
        <select id="brandFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm min-w-[150px] shadow-sm border-none"></select>
        <select id="sizeFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm min-w-[130px] shadow-sm border-none"></select>
        <select id="gradeFilter" onchange="render()" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm min-w-[130px] shadow-sm border-none"></select>
    </div>

    <div class="flex justify-end gap-3 mb-8">
        <button onclick="generatePDF()" class="bg-red-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition-all shadow-lg text-sm">📥 PDF REPORT</button>
        <button onclick="downloadExcel()" class="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition-all shadow-lg text-sm">📊 EXCEL EXPORT</button>
        <button onclick="location.reload()" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-200">🔄</button>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-20">
        <div class="col-span-full py-20 text-center opacity-20 font-black tracking-[0.5em]">SYNCING WITH DRIVE...</div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";
    const FOLDER_ID = "18QBPsz0Rnp0qt-UxSQtURSbiXtpSh4HT";

    let masterData = [], currentFilteredData = [];

    // Permanent Google Drive Logic
    function getDriveImageUrl(fileName) {
        // This assumes your image file name in Drive matches the Design Description exactly (e.g. "CALACATTA.jpg")
        // Note: For real-time sync without fetching file IDs, it's best to have the direct link in Sheet.
        // But we will use the Google Drive ID formatting for links if they are in the sheet.
        return `https://lh3.googleusercontent.com/d/18QBPsz0Rnp0qt-UxSQtURSbiXtpSh4HT`; // Base folder preview
    }

    async function init() {
        try {
            const response = await fetch(APPS_SCRIPT_URL);
            masterData = await response.json();
            setupFilters();
            render();
        } catch (e) { alert("Data Fetch Error!"); }
    }

    function setupFilters() {
        const fill = (id, key, label) => {
            const vals = [...new Set(masterData.map(i => i[key]))].filter(Boolean).sort();
            document.getElementById(id).innerHTML = `<option value="">All ${label}</option>` + 
                vals.map(v => `<option value="${v}">${v}</option>`).join('');
        };
        fill('brandFilter', 'Brand', 'Brands');
        fill('sizeFilter', 'Size', 'Sizes');
        fill('gradeFilter', 'Variant', 'Grades'); // Mapping Variant to Grade
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const b = document.getElementById('brandFilter').value;
        const sz = document.getElementById('sizeFilter').value;
        const g = document.getElementById('gradeFilter').value;

        currentFilteredData = masterData.filter(i => 
            String(i["Item Description"]).toLowerCase().includes(s) &&
            (!b || i.Brand === b) &&
            (!sz || i.Size === sz) &&
            (!g || i.Variant === g)
        );

        const groups = {};
        let totalBoxes = 0;
        const brands = new Set();

        currentFilteredData.forEach(i => {
            const nameKey = i["Item Description"].toLowerCase().trim();
            if(!groups[nameKey]) groups[nameKey] = { ...i, lots: [], total: 0 };
            groups[nameKey].lots.push({ lot: i["Lot No"], qty: i.Total });
            groups[nameKey].total += parseFloat(i.Total);
            totalBoxes += parseFloat(i.Total);
            brands.add(i.Brand);
        });

        document.getElementById('stat-total').innerText = Object.keys(groups).length;
        document.getElementById('stat-boxes').innerText = Math.round(totalBoxes).toLocaleString();
        document.getElementById('stat-brands').innerText = brands.size;
        document.getElementById('stat-filtered').innerText = currentFilteredData.length;

        document.getElementById('stockContainer').innerHTML = Object.values(groups).map(item => {
            // Priority: Link from Google Sheet (item.DesignURL)
            let img = item.DesignURL || `https://via.placeholder.com/600x400?text=${item["Item Description"]}`;
            
            // Auto convert Google Drive Links
            if (img.includes('drive.google.com')) {
                const fileId = img.split('/d/')[1]?.split('/')[0] || img.split('id=')[1];
                img = `https://lh3.googleusercontent.com/d/${fileId}`;
            }

            return `
            <div class="tile-card flex flex-col md:flex-row p-4 gap-6">
                <div class="md:w-1/2 rounded-2xl overflow-hidden bg-gray-100 border border-gray-100">
                    <img src="${img}" class="h-full w-full object-cover min-h-[220px]" onerror="this.src='https://via.placeholder.com/600x400?text=IMAGE+ERROR'">
                </div>
                <div class="md:w-1/2 flex flex-col justify-between py-1">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-black text-blue-600 uppercase bg-blue-50 px-2 py-0.5 rounded-md">${item.Brand}</span>
                            <span class="text-[10px] font-bold text-gray-400">${item.Size}</span>
                        </div>
                        <h2 class="text-xl font-black text-slate-800 uppercase mb-3 leading-tight">${item["Item Description"]}</h2>
                        <div class="space-y-1.5 mb-4">
                            ${item.lots.map(l => `
                                <div class="flex justify-between items-center bg-gray-50 px-3 py-1.5 rounded-xl border border-gray-100">
                                    <span class="text-[11px] font-bold text-gray-400">LOT NO: ${l.lot}</span>
                                    <span class="text-sm font-black text-slate-700">${l.qty} BX</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pt-3 border-t border-dashed flex justify-between items-end">
                        <div>
                            <p class="text-[9px] font-black text-gray-300 uppercase">Available</p>
                            <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                        </div>
                        <span class="bg-slate-900 text-white px-3 py-1 rounded-lg text-[10px] font-black italic">${item.Variant || 'GRADE-A'}</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("EMCER TILES PRIVATE LIMITED", 14, 15);
        doc.setFontSize(10);
        doc.text(`Developer: Yashdeep Jivani | Total Results: ${currentFilteredData.length}`, 14, 22);

        const rows = currentFilteredData.map(i => [i.Brand, i["Item Description"], i.Size, i["Lot No"], i.Total, i.Variant]);
        doc.autoTable({
            startY: 28,
            head: [['Brand', 'Design Name', 'Size', 'Lot', 'Boxes', 'Grade']],
            body: rows,
            headStyles: { fillColor: [15, 23, 42] }
        });
        doc.save("Emcer_Live_Stock.pdf");
    }

    function downloadExcel() {
        const ws = XLSX.utils.json_to_sheet(currentFilteredData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Stock");
        XLSX.writeFile(wb, "Emcer_Stock_Report.xlsx");
    }

    window.onload = init;
</script>
</body>
</html>
