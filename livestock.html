<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emcer Elite | Local & Cloud Inventory</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b39359; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; }

        /* Developer Sparkle Name */
        @keyframes shine { 0% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); text-shadow: 0 0 15px var(--gold); } 100% { opacity: 0.7; transform: scale(1); } }
        .yashdeep-name {
            background: var(--dark); color: white; border: 1px solid var(--gold);
            padding: 4px 15px; border-radius: 50px; font-weight: 800; font-size: 11px;
            animation: shine 2s infinite ease-in-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px); border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.4s ease;
        }
        .local-upload-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white; border-radius: 12px; font-weight: 700; padding: 10px 20px;
        }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div>
            <h1 style="font-family: 'Cinzel', serif;" class="text-4xl font-bold tracking-tight text-slate-900">EMCER TILES</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Local & Cloud Connected</p>
            </div>
        </div>
        <div class="flex flex-col items-center md:items-end">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">System Admin</p>
            <div class="yashdeep-name">✨ YASHDEEP JIVANI ✨</div>
        </div>
    </header>

    <div class="glass-card p-6 mb-8 flex flex-wrap items-center gap-4 shadow-sm">
        <input type="text" id="search" oninput="render()" placeholder="🔍 Search Tile Name..." class="flex-grow p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 ring-[#b39359] border-none font-medium">
        
        <div class="flex flex-col">
            <label class="text-[9px] font-bold text-blue-600 mb-1">UPLOAD LOCAL DESIGN (JPG)</label>
            <input type="file" id="localImgInput" accept="image/*" onchange="handleLocalImage(event)" class="text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
        </div>
    </div>

    <div id="stockContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="col-span-full py-20 text-center opacity-30 font-black">SYNCING DATA...</div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnzgi_K-xT08WBT6_F2eeUSrdHfI18qcihJozbCUIBvWJ6RFSEZ0BtnRTKyd9hG-U53A/exec";
    const DESIGN_JSON_URL = "https://raw.githubusercontent.com/emcertiles22-cell/Emcer-Tiles---Available-Stock-Status/main/design.json";

    let masterData = [], designMap = {}, localDesignMap = {};

    async function init() {
        try {
            const [dRes, sRes] = await Promise.all([fetch(DESIGN_JSON_URL), fetch(APPS_SCRIPT_URL)]);
            const dData = await dRes.json();
            dData.forEach(d => designMap[d.name?.toLowerCase().trim()] = d.url);
            masterData = await sRes.json();
            render();
        } catch (e) { console.error("Sync Error"); }
    }

    // Function to handle PC images
    function handleLocalImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const designName = prompt("Aa image kai design maate chhe? (Write Full Name)");
        if (!designName) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            // Save local image in memory
            localDesignMap[designName.toLowerCase().trim()] = e.target.result;
            alert(`Design "${designName}" ni image local PC mathi set thai gai!`);
            render();
        };
        reader.readAsDataURL(file);
    }

    function render() {
        const s = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('stockContainer');
        const groups = {};

        masterData.forEach(item => {
            const name = String(item["Item Description"]).trim();
            if (name.toLowerCase().includes(s)) {
                const key = name.toLowerCase();
                if (!groups[key]) groups[key] = { ...item, lots: [], total: 0 };
                groups[key].lots.push({ lot: item["Lot No"], qty: item.Total });
                groups[key].total += parseFloat(item.Total);
            }
        });

        container.innerHTML = Object.values(groups).map(item => {
            const nameKey = item["Item Description"].toLowerCase().trim();
            
            // Priority: 1. Local Image, 2. Web Image, 3. Placeholder
            const img = localDesignMap[nameKey] || designMap[nameKey] || 'https://via.placeholder.com/600x400?text=NO+IMAGE+FOUND';
            
            const isLocal = localDesignMap[nameKey] ? '<span class="bg-blue-600 text-white text-[8px] px-2 py-0.5 rounded-full ml-2">LOCAL PC</span>' : '';

            return `
            <div class="glass-card p-4 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/2 overflow-hidden rounded-2xl shadow-inner bg-gray-100">
                    <img src="${img}" class="h-full w-full object-cover min-h-[200px]">
                </div>
                <div class="md:w-1/2 flex flex-col justify-between py-2">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-black text-[#b39359] uppercase">${item.Brand} ${isLocal}</span>
                            <span class="text-[10px] font-bold text-gray-400">${item.Size}</span>
                        </div>
                        <h3 class="text-xl font-extrabold uppercase mb-4 text-slate-800 leading-tight">${item["Item Description"]}</h3>
                        <div class="space-y-1.5">
                            ${item.lots.map(l => `
                                <div class="flex justify-between text-[11px] border-b border-gray-50 pb-1">
                                    <span class="text-gray-400 font-bold">LOT ${l.lot}</span>
                                    <span class="font-black">${l.qty} BX</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-dashed border-gray-200">
                        <p class="text-[9px] font-bold text-gray-300 uppercase">Available Stock</p>
                        <p class="text-3xl font-black text-slate-900">${Math.round(item.total)}</p>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    window.onload = init;
</script>
</body>
</html>
