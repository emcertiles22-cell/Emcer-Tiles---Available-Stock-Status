<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NexTile - Emcer Live Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        .main-container { max-width: 1000px; margin: auto; padding: 15px; }
        .header-line { height: 4px; background: #000; margin: 15px 0; }
        
        /* Card UI */
        .stock-card { border: 2px solid #000; display: flex; margin-bottom: 25px; min-height: 220px; page-break-inside: avoid; }
        .card-img { width: 30%; border-right: 2px solid #000; padding: 15px; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .card-img img { max-height: 200px; width: auto; max-width: 100%; object-fit: contain; }
        
        .card-info { width: 50%; padding: 20px; display: flex; flex-direction: column; position: relative; }
        .design-name { font-size: 26px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
        .design-meta { color: #2563eb; font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
        .lot-row { display: flex; justify-content: space-between; border-bottom: 1px dotted #cbd5e1; padding: 6px 0; font-size: 14px; font-weight: 700; }
        
        .card-total { width: 20%; border-left: 2px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; }
        .total-val { font-size: 55px; font-weight: 900; line-height: 1; }
        .total-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        /* Full View Image Modal */
        #imgModal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modalImg { max-width: 90%; max-height: 90%; border: 5px solid #fff; }

        .btn-refresh { background: #000; color: #fff; padding: 8px 16px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>

<div class="main-container">
    <div class="flex justify-between items-end pt-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 leading-none">EMCER TILES PRIVATE LIMITED</h1>
            <p class="text-sm text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Daily Stock Status</p>
        </div>
        <div class="text-right">
            <button onclick="location.reload()" class="btn-refresh no-print mb-2">🔄 Refresh Stock</button>
            <div class="text-[11px] font-black text-blue-600">DEVELOPER: YASHDEEP JIVANI</div>
        </div>
    </div>
    <div class="header-line"></div>

    <div id="status-bar" class="no-print mb-6 text-[10px] font-bold flex gap-4">
        <span id="stock-status" class="bg-slate-100 px-3 py-1 rounded">STOCK: LOADING...</span>
        <span id="design-status" class="bg-slate-100 px-3 py-1 rounded">IMAGES: LOADING...</span>
    </div>

    <div id="reportList">
        <div class="py-32 text-center text-slate-200 font-black text-2xl uppercase tracking-tighter">Connecting to GitHub...</div>
    </div>
</div>

<script>
    let inventory = {};
    let designMap = {};

    // 1. Load Data from GitHub Automatic
    async function initPortal() {
        try {
            // Fetch Designs & Images
            const resImg = await fetch('design.json?v=' + Date.now());
            if (resImg.ok) {
                const designs = await resImg.json();
                designs.forEach(d => { if(d.name) designMap[d.name.toLowerCase().trim()] = d.url; });
                document.getElementById('design-status').innerHTML = "✅ IMAGES READY";
            }

            // Fetch Live Stock
            const resStock = await fetch('stock.json?v=' + Date.now());
            if (!resStock.ok) throw new Error("stock.json missing");
            
            let stockText = await resStock.text();
            stockText = stockText.trim();
            
            // Auto-fix JSON if it's broken
            if (stockText.includes('}{')) stockText = '[' + stockText.replace(/}{/g, '},{') + ']';
            if (!stockText.startsWith('[')) stockText = '[' + stockText + ']';

            const stockJson = JSON.parse(stockText);
            processStock(stockJson);
            
            document.getElementById('stock-status').innerHTML = "✅ STOCK UPDATED: " + new Date().toLocaleTimeString();
        } catch (err) {
            console.error(err);
            document.getElementById('reportList').innerHTML = `<div class="py-20 text-center text-red-500 font-bold uppercase">Error: stock.json not found on GitHub!<br><span class="text-xs text-slate-400">Make sure file name is exactly stock.json</span></div>`;
        }
    }

    function processStock(data) {
        const raw = Array.isArray(data) ? data : (data.data || [data]);
        inventory = {};

        raw.forEach(item => {
            const name = (item["Item Description"] || item["name"] || "Unknown").trim();
            const surface = (item["Series"] || item["Surface"] || "N/A");
            const size = (item["Size"] || "N/A");
            const qty = Number(item["Net Qty"] || item["Qty"] || 0);
            const lot = (item["Lot no."] || item["Lot"] || "N/A");

            const key = `${name}|${surface}|${size}`.toLowerCase();
            if (!inventory[key]) {
                inventory[key] = { name, surface, size, lots: [], total: 0 };
            }
            inventory[key].lots.push({ lot, qty });
            inventory[key].total += qty;
        });
        render();
    }

    function render() {
        const area = document.getElementById('reportList');
        const items = Object.values(inventory);
        
        if (items.length === 0) {
            area.innerHTML = "<div class='py-20 text-center text-slate-300 font-bold'>STOCK FILE IS EMPTY</div>";
            return;
        }

        area.innerHTML = items.map(item => {
            const imgKey = item.name.toLowerCase().trim();
            const imgUrl = designMap[imgKey] || 'https://via.placeholder.com/400x600?text=No+Photo';
            
            return `
            <div class="stock-card shadow-sm">
                <div class="card-img" onclick="openFullImg('${imgUrl}')">
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/400x600?text=Image+Error'">
                </div>
                <div class="card-info">
                    <div class="design-name">${item.name}</div>
                    <div class="design-meta">${item.surface} | ${item.size}</div>
                    <div class="flex-grow">
                        ${item.lots.map(l => `
                            <div class="lot-row">
                                <span class="text-slate-400 uppercase">LOT: ${l.lot}</span>
                                <span class="text-slate-900">${l.qty} Bx</span>
                            </div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="total-label">Total</div>
                    <div class="total-val">${item.total}</div>
                    <div class="total-label">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }

    function openFullImg(src) {
        document.getElementById('imgModal').style.display = "flex";
        document.getElementById('modalImg').src = src;
    }

    // Start
    initPortal();
</script>
</body>
</html>
