<div class="flex justify-between items-center px-4 py-4 bg-slate-50 border-b">
    <div class="flex gap-4">
        <input type="file" id="fileInput" class="hidden" accept=".json" onchange="handleFileUpload(event)">
        <button onclick="document.getElementById('fileInput').click()" class="bg-black text-white px-6 py-2 font-bold text-sm uppercase">
            📁 Upload JSON
        </button>
        <button onclick="resetSystem()" class="text-red-500 font-bold text-sm uppercase">Reset</button>
    </div>
    <div id="status" class="text-[10px] font-bold text-green-500 uppercase">● System Ready</div>
</div>

<script>
    let groups = {};
    let designImages = {};

    // 1. Manuel Upload Function (Tamara mate)
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const stockJson = JSON.parse(e.target.result);
                processData(stockJson);
                document.getElementById('status').innerText = "● Local Data Loaded";
            } catch (err) {
                alert("Invalid JSON file!");
            }
        };
        reader.readAsText(file);
    }

    // 2. GitHub thi automatic load karva mate (Senior mate)
    async function loadLiveData() {
        try {
            const resImg = await fetch('design.json');
            if(resImg.ok) {
                const imgData = await resImg.json();
                imgData.forEach(d => { if(d.url) designImages[d.name.toLowerCase().trim()] = d.url; });
            }

            const resStock = await fetch('stock.json');
            if(resStock.ok) {
                const stockJson = await resStock.json();
                processData(stockJson);
                document.getElementById('status').innerText = "● Live Data Updated";
            }
        } catch (e) {
            console.log("No default files found on GitHub, waiting for manual upload.");
        }
    }

    // Common processing function
    function processData(stockJson) {
        const raw = Array.isArray(stockJson) ? stockJson : (stockJson.data || [stockJson]);
        groups = {}; // Reset previous data
        
        raw.forEach(item => {
            const name = (item["Item Description"] || "Unknown").trim();
            const surf = (item["Series"] || "N/A").trim();
            const size = (item["Size"] || "N/A").trim();
            const qty = Number(item["Net Qty"]) || 0;
            const lot = (item["Lot no."] || "N/A").trim();
            const key = `${name}|${surf}|${size}`.toLowerCase();
            
            if(!groups[key]) groups[key] = { name, surface: surf, size, lots: [], total: 0 };
            groups[key].lots.push({ lot, qty });
            groups[key].total += qty;
        });
        renderUI();
    }

    function resetSystem() {
        groups = {};
        document.getElementById('reportList').innerHTML = '<div class="py-10 text-center font-bold text-slate-300 uppercase">No Data Loaded</div>';
        document.getElementById('status').innerText = "● System Reset";
    }

    // Start loading on page load
    loadLiveData();
</script>
