<div class="filter-box no-print">
    <div class="flex flex-col">
        <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Search Design</label>
        <input type="text" id="searchName" oninput="applyFilters()" placeholder="Type design name..." class="border p-2 font-bold text-sm outline-none focus:border-blue-600">
    </div>
    <div class="flex flex-col">
        <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Step 1: Select Size</label>
        <select id="filterSize" onchange="updateSeriesDropdown(); applyFilters();">
            <option value="">All Sizes</option>
        </select>
    </div>
    <div class="flex flex-col">
        <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Step 2: Select Series</label>
        <select id="filterSeries" onchange="applyFilters()">
            <option value="">All Series</option>
        </select>
    </div>
    <div class="flex flex-col">
        <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Step 3: Select Grade</label>
        <select id="filterGrade" onchange="applyFilters()">
            <option value="">All Grades</option>
        </select>
    </div>
</div>

<script>
    let masterData = [];
    let designMap = {};

    // 1. Dropdowns ne dynamic banavva mate
    function populateFilters() {
        const sizes = new Set();
        const grades = new Set();

        masterData.forEach(item => {
            if (item["Size"]) sizes.add(item["Size"].trim());
            if (item["Grade"]) grades.add(item["Grade"].trim());
        });

        // Size Dropdown bharo
        const sizeSelect = document.getElementById('filterSize');
        sizeSelect.innerHTML = '<option value="">All Sizes</option>';
        [...sizes].sort().forEach(s => sizeSelect.innerHTML += `<option value="${s}">${s}</option>`);

        // Grade Dropdown bharo
        const gradeSelect = document.getElementById('filterGrade');
        gradeSelect.innerHTML = '<option value="">All Grades</option>';
        [...grades].sort().forEach(g => gradeSelect.innerHTML += `<option value="${g}">${g}</option>`);

        updateSeriesDropdown(); // Sharuat ma badhi series batavva mate
    }

    // 2. SMART FILTER: Size mujab Series badlava mate
    function updateSeriesDropdown() {
        const selectedSize = document.getElementById('filterSize').value;
        const seriesSet = new Set();

        masterData.forEach(item => {
            const itemSize = (item["Size"] || "").trim();
            if (selectedSize === "" || itemSize === selectedSize) {
                if (item["Series"]) seriesSet.add(item["Series"].trim());
            }
        });

        const seriesSelect = document.getElementById('filterSeries');
        seriesSelect.innerHTML = '<option value="">All Series</option>';
        [...seriesSet].sort().forEach(sr => {
            seriesSelect.innerHTML += `<option value="${sr}">${sr}</option>`;
        });
    }

    // 3. APPLY FILTERS (Grade inclusion sathe)
    function applyFilters() {
        const nameVal = document.getElementById('searchName').value.toLowerCase();
        const sizeVal = document.getElementById('filterSize').value;
        const seriesVal = document.getElementById('filterSeries').value;
        const gradeVal = document.getElementById('filterGrade').value;

        const filteredGroups = {};

        masterData.forEach(item => {
            const name = (item["Item Description"] || "Unknown").trim();
            const surface = (item["Series"] || "N/A").trim();
            const size = (item["Size"] || "N/A").trim();
            const grade = (item["Grade"] || "PRE").trim();
            const qty = Number(item["Net Qty"] || 0);
            const lot = (item["Lot no."] || "N/A").trim();

            const matchName = name.toLowerCase().includes(nameVal);
            const matchSize = sizeVal === "" || size === sizeVal;
            const matchSeries = seriesVal === "" || surface === seriesVal;
            const matchGrade = gradeVal === "" || grade === gradeVal;

            if (matchName && matchSize && matchSeries && matchGrade) {
                const key = `${name}|${surface}|${size}|${grade}`.toLowerCase();
                if (!filteredGroups[key]) {
                    filteredGroups[key] = { name, surface, size, grade, lots: [], total: 0 };
                }
                filteredGroups[key].lots.push({ lot, qty });
                filteredGroups[key].total += qty;
            }
        });

        render(Object.values(filteredGroups));
    }

    // 4. RENDER UI (Grade badge sathe)
    function render(items) {
        const area = document.getElementById('reportList');
        area.innerHTML = items.map(item => {
            const imgUrl = designMap[item.name.toLowerCase().trim()] || 'https://via.placeholder.com/400x600?text=No+Photo';
            return `
            <div class="stock-card shadow-md relative">
                <div class="absolute top-2 right-[22%] bg-black text-white px-3 py-1 text-[10px] font-black uppercase z-10">
                    ${item.grade}
                </div>
                <div class="card-img" onclick="openFullImg('${imgUrl}')">
                    <img src="${imgUrl}">
                </div>
                <div class="card-info">
                    <div class="design-name">${item.name}</div>
                    <div class="design-meta">${item.surface} | ${item.size}</div>
                    <div class="flex-grow">
                        ${item.lots.map(l => `
                            <div class="lot-row">
                                <span class="text-slate-400 uppercase">LOT: ${l.lot}</span>
                                <span class="text-slate-900">${l.qty} Bx</span>
                            </div>`).join('')}
                    </div>
                </div>
                <div class="card-total">
                    <div class="total-label">Available</div>
                    <div class="total-val">${item.total}</div>
                    <div class="total-label">Boxes</div>
                </div>
            </div>`;
        }).join('');
    }
</script>
